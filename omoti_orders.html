function AliasesBlock({ aliases, onChange, clients, currentClientId }) {
  const [expanded, setExpanded] = useState(false);
  const arr = String(aliases || '').split('|').map(s => s.trim()).filter(Boolean);

  const conflicts = useMemo(() => {
    if (!clients || !arr.length) return [];
    return arr.filter(alias => {
      const a = alias.toLowerCase();
      return (clients || []).some(c => {
        if (c.client_id === currentClientId) return false;
        const cAliases = String(c.aliases || '').toLowerCase().split('|').map(s => s.trim());
        const cName = String(c.name || '').toLowerCase().trim();
        return cAliases.includes(a) || cName === a;
      });
    });
  }, [aliases, clients, currentClientId]);

  const countLabel = arr.length === 0 ? 'нет вариантов'
    : arr.length === 1 ? '1 вариант'
    : arr.length < 5 ? `${arr.length} варианта` : `${arr.length} вариантов`;

  return <div className="rounded-2xl border border-slate-100 bg-slate-50 p-3 space-y-2">
    <div className="flex items-center justify-between">
      <div className="text-sm text-slate-500">Дашборд запомнит, как клиент может написать себя в заказе.</div>
      <button type="button" onClick={() => setExpanded(e => !e)}
        className="text-xs text-slate-400 hover:text-slate-700 shrink-0 ml-3">
        {countLabel} {expanded ? '▲' : '▼'}
      </button>
    </div>
    {!expanded && arr.length > 0 && <div className="flex flex-wrap gap-1">
      {arr.map((a, i) => <span key={i} className={`rounded-lg px-2 py-0.5 text-xs border ${conflicts.includes(a) ? 'bg-amber-50 border-amber-200 text-amber-800' : 'bg-white border-slate-200 text-slate-700'}`}>{a}</span>)}
    </div>}
    {expanded && <div className="space-y-2">
      {arr.length > 0 && <div className="flex flex-wrap gap-1">
        {arr.map((a, i) => <span key={i} className={`rounded-lg px-2 py-0.5 text-xs border ${conflicts.includes(a) ? 'bg-amber-50 border-amber-200 text-amber-800' : 'bg-white border-slate-200 text-slate-700'}`}>{a}</span>)}
      </div>}
      {conflicts.length > 0 && <div className="text-xs text-amber-700">
        ⚠ {conflicts.map(c => `«${c}»`).join(', ')} уже {conflicts.length === 1 ? 'используется' : 'используются'} у другого клиента
      </div>}
      <details>
        <summary className="cursor-pointer text-xs text-slate-400 hover:text-slate-600">Расширенные настройки</summary>
        <div className="mt-2 space-y-1">
          <div className="text-xs text-slate-400">Варианты через | — только для Евгения</div>
          <Input value={aliases} onChange={onChange} placeholder="азер|azer|азер суши" />
        </div>
      </details>
    </div>}
  </div>;
}

function AddClientWizard({ clients, onDone, onCancel, showToast }) {
  const emptyPoint = () => ({ address: '', label: '', working_hours: '', contact_person: '', delivery_comment: '' });
  const emptyLegal = () => ({
    legal_name: '', inn: '', kpp: '', has_contract: false,
    needs_invoice: true, needs_waybill: true, payment_terms_days: 0, documents_comment: '',
  });

  const [step, setStep] = useState(1);
  const [clientData, setClientData] = useState({ name: '', aliases: '', main_contact: '', comment: '' });
  const [pointsData, setPointsData] = useState([emptyPoint()]);
  const [legalsData, setLegalsData] = useState([emptyLegal()]);
  const [saving, setSaving] = useState(false);
  const [aliasesEdited, setAliasesEdited] = useState(false);

  useEffect(() => {
    if (!aliasesEdited) {
      setClientData(prev => ({ ...prev, aliases: generateClientAliases(prev.name).join('|') }));
    }
  }, [clientData.name]);

  const filledPoints = pointsData.filter(p => String(p.address || '').trim());
  const legalTouched = (l) => Boolean(String(l.legal_name || '').trim() || String(l.inn || '').trim() || String(l.kpp || '').trim() || String(l.documents_comment || '').trim() || Number(l.payment_terms_days || 0) > 0);
  const touchedLegals = legalsData.filter(legalTouched);
  const filledLegals = touchedLegals.filter(l => String(l.legal_name || '').trim() && String(l.inn || '').trim());

  const updatePoint = (idx, updates) => setPointsData(prev => prev.map((p, i) => i === idx ? { ...p, ...updates } : p));
  const updateLegal = (idx, updates) => setLegalsData(prev => prev.map((l, i) => i === idx ? { ...l, ...updates } : l));
  const removePoint = (idx) => setPointsData(prev => prev.length > 1 ? prev.filter((_, i) => i !== idx) : [emptyPoint()]);
  const removeLegal = (idx) => setLegalsData(prev => prev.length > 1 ? prev.filter((_, i) => i !== idx) : [emptyLegal()]);

  const validate = () => {
    if (!String(clientData.name || '').trim()) return 'Укажи название клиента';
    for (let i = 0; i < pointsData.length; i++) {
      const p = pointsData[i];
      const touched = Object.values(p).some(v => String(v || '').trim());
      if (touched && !String(p.address || '').trim()) return `В адресе №${i + 1} не заполнен адрес`;
    }
    for (let i = 0; i < legalsData.length; i++) {
      const l = legalsData[i];
      const touched = legalTouched(l);
      if (touched && !String(l.legal_name || '').trim()) return `В юрлице №${i + 1} не заполнено название`;
      if (touched && !String(l.inn || '').trim()) return `В юрлице №${i + 1} не заполнен ИНН`;
    }
    return null;
  };

  const saveAll = async () => {
    const error = validate();
    if (error) { showToast(error, 'warn'); return; }
    if (saving) return;
    setSaving(true);
    try {
      const nameVal = String(clientData.name || '').trim();
      const aliasArr = String(clientData.aliases || '').split('|').map(s => s.trim()).filter(Boolean);
      if (nameVal && !aliasArr.some(a => a.toLowerCase() === nameVal.toLowerCase())) aliasArr.unshift(nameVal);
      const c = await api('addClient', { ...clientData, aliases: aliasArr.join('|'), created_by: CURRENT_USER });
      const clientId = c.client_id;

      for (const p of filledPoints) {
        await api('addPoint', { ...p, client_id: clientId, created_by: CURRENT_USER });
      }

      for (const l of filledLegals) {
        await api('addLegal', { ...l, client_id: clientId, created_by: CURRENT_USER });
      }

      showToast(`Клиент добавлен: ${clientData.name}`);
      onDone();
    } catch (err) {
      showToast('Ошибка: ' + err.message, 'error');
    }
    setSaving(false);
  };

  const stepClass = (n) => step === n ? 'bg-slate-950 text-white' : 'bg-slate-100 text-slate-600';

  return <div className="space-y-5">
    <div className="flex gap-2 rounded-2xl bg-slate-50 p-2">
      <button onClick={() => setStep(1)} className={`flex-1 rounded-xl px-4 py-2 text-sm font-medium ${stepClass(1)}`}>1. Клиент</button>
      <button onClick={() => setStep(2)} className={`flex-1 rounded-xl px-4 py-2 text-sm font-medium ${stepClass(2)}`}>2. Адреса <span className="opacity-70">({filledPoints.length})</span></button>
      <button onClick={() => setStep(3)} className={`flex-1 rounded-xl px-4 py-2 text-sm font-medium ${stepClass(3)}`}>3. ИП / ООО <span className="opacity-70">({filledLegals.length})</span></button>
      <button onClick={() => setStep(4)} className={`flex-1 rounded-xl px-4 py-2 text-sm font-medium ${stepClass(4)}`}>4. Проверка</button>
    </div>

    {step === 1 && <div className="space-y-4">
      <div className="rounded-2xl bg-slate-50 p-4 text-sm text-slate-600">
        Клиент - это бренд или сеть. Например: Sayori суши, Uji, Макитория. Адреса и ИП/ООО добавим следующими шагами.
      </div>
      <div><Label>Название клиента *</Label><Input value={clientData.name} onChange={(v) => setClientData({ ...clientData, name: v })} placeholder="Например: Азер" /></div>
      <AliasesBlock
        aliases={clientData.aliases}
        onChange={(v) => { setAliasesEdited(true); setClientData({ ...clientData, aliases: v }); }}
        clients={clients}
        currentClientId={null}
      />
      <div><Label>Основной контакт</Label><Input value={clientData.main_contact} onChange={(v) => setClientData({ ...clientData, main_contact: v })} placeholder="Имя, телефон" /></div>
      <div><Label>Комментарий по клиенту</Label><Input value={clientData.comment} onChange={(v) => setClientData({ ...clientData, comment: v })} placeholder="Например: часто пишет по адресам, проверять филиал" /></div>
    </div>}

    {step === 2 && <div className="space-y-4">
      <div className="flex items-center justify-between">
        <div>
          <h3 className="font-semibold">Адреса / филиалы</h3>
          <p className="text-sm text-slate-500">Можно добавить один адрес или несколько. Пустые строки не сохранятся.</p>
        </div>
        <Button variant="light" onClick={() => setPointsData(prev => [...prev, emptyPoint()])}>+ Адрес</Button>
      </div>
      <div className="space-y-3">
        {pointsData.map((p, idx) => <div key={idx} className="rounded-2xl border border-slate-200 bg-white p-4">
          <div className="mb-3 flex items-center justify-between">
            <div className="font-medium">Адрес №{idx + 1}</div>
            <button onClick={() => removePoint(idx)} className="text-xs text-slate-400 hover:text-red-600">убрать</button>
          </div>
          <div className="grid grid-cols-2 gap-4">
            <div><Label>Адрес *</Label><Input value={p.address} onChange={(v) => updatePoint(idx, { address: v })} placeholder="Например: Курчатова, 1" /></div>
            <div><Label>Короткое название</Label><Input value={p.label} onChange={(v) => updatePoint(idx, { label: v })} placeholder="Курчатова" /></div>
            <div><Label>Время работы</Label><Input value={p.working_hours} onChange={(v) => updatePoint(idx, { working_hours: v })} placeholder="с 10:00 до 21:00" /></div>
            <div><Label>Контакт на точке</Label><Input value={p.contact_person} onChange={(v) => updatePoint(idx, { contact_person: v })} placeholder="Имя, телефон" /></div>
            <div className="col-span-2"><Label>Комментарий по доставке</Label><Input value={p.delivery_comment} onChange={(v) => updatePoint(idx, { delivery_comment: v })} placeholder="Вход со двора, оставить у администратора" /></div>
          </div>
        </div>)}
      </div>
    </div>}

    {step === 3 && <div className="space-y-4">
      <div className="flex items-center justify-between">
        <div>
          <h3 className="font-semibold">ИП / ООО для документов</h3>
          <p className="text-sm text-slate-500">Можно не заполнять, если клиент работает без документов.</p>
        </div>
        <Button variant="light" onClick={() => setLegalsData(prev => [...prev, emptyLegal()])}>+ ИП / ООО</Button>
      </div>
      <div className="space-y-3">
        {legalsData.map((l, idx) => <div key={idx} className="rounded-2xl border border-slate-200 bg-white p-4">
          <div className="mb-3 flex items-center justify-between">
            <div className="font-medium">Юрлицо №{idx + 1}</div>
            <button onClick={() => removeLegal(idx)} className="text-xs text-slate-400 hover:text-red-600">убрать</button>
          </div>
          <div className="grid grid-cols-2 gap-4">
            <div className="col-span-2"><Label>Название ИП / ООО *</Label><Input value={l.legal_name} onChange={(v) => updateLegal(idx, { legal_name: v })} placeholder="ИП Иванов Иван Иванович" /></div>
            <div><Label>ИНН *</Label><Input value={l.inn} onChange={(v) => updateLegal(idx, { inn: v })} placeholder="540312345678" /></div>
            <div><Label>КПП</Label><Input value={l.kpp} onChange={(v) => updateLegal(idx, { kpp: v })} placeholder="для ООО" /></div>
            <div><Label>Отсрочка, дней</Label><Input type="number" value={l.payment_terms_days || 0} onChange={(v) => updateLegal(idx, { payment_terms_days: v })} /></div>
            <div className="flex items-end gap-4 pb-3 text-sm">
              <label className="flex items-center gap-2"><input type="checkbox" checked={l.has_contract || false} onChange={(e) => updateLegal(idx, { has_contract: e.target.checked })} /> договор</label>
              <label className="flex items-center gap-2"><input type="checkbox" checked={l.needs_invoice !== false} onChange={(e) => updateLegal(idx, { needs_invoice: e.target.checked })} /> счёт</label>
              <label className="flex items-center gap-2"><input type="checkbox" checked={l.needs_waybill !== false} onChange={(e) => updateLegal(idx, { needs_waybill: e.target.checked })} /> накладная</label>
            </div>
            <div className="col-span-2"><Label>Реквизиты / комментарий по документам</Label><Input value={l.documents_comment} onChange={(v) => updateLegal(idx, { documents_comment: v })} placeholder="Оригинальная подпись, договор, особые реквизиты" /></div>
          </div>
        </div>)}
      </div>
    </div>}

    {step === 4 && <div className="space-y-4">
      <div className="rounded-2xl border border-slate-200 bg-white p-4">
        <h3 className="mb-3 font-semibold">Проверка перед сохранением</h3>
        <div className="space-y-3 text-sm">
          <div><span className="text-slate-500">Клиент:</span> <b>{clientData.name || 'не заполнен'}</b></div>
          <div><span className="text-slate-500">Узнает клиента, если напишут:</span>{' '}
            {clientData.aliases ? clientData.aliases.split('|').map(s => s.trim()).filter(Boolean).join(', ') : '—'}
          </div>
          <div><span className="text-slate-500">Адреса:</span> {filledPoints.length ? filledPoints.map(p => p.address).join('; ') : 'нет'}</div>
          <div><span className="text-slate-500">ИП / ООО:</span> {filledLegals.length ? filledLegals.map(l => `${l.legal_name} · ИНН ${l.inn}`).join('; ') : 'нет'}</div>
        </div>
      </div>
      <div className="rounded-2xl bg-amber-50 p-4 text-sm text-amber-900">
        Сначала создаётся клиент, потом к нему добавляются адреса и юрлица. Если что-то забудешь, можно будет добавить позже из карточки клиента.
      </div>
    </div>}

    <div className="flex items-center justify-between border-t border-slate-100 pt-5">
      <Button variant="light" onClick={onCancel}>Отмена</Button>
      <div className="flex gap-2">
        {step > 1 && <Button variant="light" onClick={() => setStep(step - 1)}>Назад</Button>}
        {step < 4 && <Button onClick={() => {
          const error = validate();
          if (step === 1 && error === 'Укажи название клиента') { showToast(error, 'warn'); return; }
          setStep(step + 1);
        }}>Дальше</Button>}
        {step === 4 && <Button onClick={saveAll} disabled={saving}>{saving ? <><Spinner /> Сохранение...</> : 'Сохранить клиента'}</Button>}
      </div>
    </div>
  </div>;
}


function EditClientWizard({ clients, client, points, legals, onDone, onCancel, showToast }) {
  const emptyPoint = () => ({ address: '', label: '', working_hours: '', contact_person: '', delivery_comment: '' });
  const emptyLegal = () => ({
    legal_name: '', inn: '', kpp: '', has_contract: false,
    needs_invoice: true, needs_waybill: true, payment_terms_days: 0, documents_comment: '',
  });

  const [step, setStep] = useState(1);
  const [clientData, setClientData] = useState({
    client_id: client?.client_id || '',
    name: client?.name || '',
    aliases: client?.aliases || '',
    main_contact: client?.main_contact || '',
    comment: client?.comment || '',
  });
  const [pointsData, setPointsData] = useState((points && points.length ? points : [emptyPoint()]).map(p => ({
    point_id: p.point_id || '',
    address: p.address || '',
    label: p.label || '',
    working_hours: p.working_hours || '',
    contact_person: p.contact_person || '',
    delivery_comment: p.delivery_comment || '',
    is_active: p.is_active,
  })));
  const [legalsData, setLegalsData] = useState((legals && legals.length ? legals : [emptyLegal()]).map(l => ({
    legal_id: l.legal_id || '',
    legal_name: l.legal_name || '',
    inn: l.inn || '',
    kpp: l.kpp || '',
    has_contract: isTrue(l.has_contract),
    needs_invoice: l.needs_invoice !== false && String(l.needs_invoice).toUpperCase() !== 'FALSE',
    needs_waybill: l.needs_waybill !== false && String(l.needs_waybill).toUpperCase() !== 'FALSE',
    payment_terms_days: Number(l.payment_terms_days || 0),
    documents_comment: l.documents_comment || '',
    is_active: l.is_active,
  })));
  const [saving, setSaving] = useState(false);

  const filledPoints = pointsData.filter(p => String(p.address || '').trim());
  const legalTouched = (l) => Boolean(String(l.legal_name || '').trim() || String(l.inn || '').trim() || String(l.kpp || '').trim() || String(l.documents_comment || '').trim() || Number(l.payment_terms_days || 0) > 0);
  const touchedLegals = legalsData.filter(legalTouched);
  const filledLegals = touchedLegals.filter(l => String(l.legal_name || '').trim() && String(l.inn || '').trim());

  const updatePoint = (idx, updates) => setPointsData(prev => prev.map((p, i) => i === idx ? { ...p, ...updates } : p));
  const updateLegal = (idx, updates) => setLegalsData(prev => prev.map((l, i) => i === idx ? { ...l, ...updates } : l));
  const removePoint = (idx) => setPointsData(prev => prev.length > 1 ? prev.filter((_, i) => i !== idx) : [emptyPoint()]);
  const removeLegal = (idx) => setLegalsData(prev => prev.length > 1 ? prev.filter((_, i) => i !== idx) : [emptyLegal()]);

  const validate = () => {
    if (!String(clientData.name || '').trim()) return 'Укажи название клиента';
    for (let i = 0; i < pointsData.length; i++) {
      const p = pointsData[i];
      const touched = Object.keys(p).some(k => !['point_id', 'is_active'].includes(k) && String(p[k] || '').trim());
      if (touched && !String(p.address || '').trim()) return `В адресе №${i + 1} не заполнен адрес`;
    }
    for (let i = 0; i < legalsData.length; i++) {
      const l = legalsData[i];
      const touched = legalTouched(l);
      if (touched && !String(l.legal_name || '').trim()) return `В юрлице №${i + 1} не заполнено название`;
      if (touched && !String(l.inn || '').trim()) return `В юрлице №${i + 1} не заполнен ИНН`;
    }
    return null;
  };

  const saveAll = async () => {
    const error = validate();
    if (error) { showToast(error, 'warn'); return; }
    if (saving) return;
    setSaving(true);
    try {
      await api('updateRecord', {
        sheet: 'clients',
        id_field: 'client_id',
        id_value: clientData.client_id,
        updates: {
          name: clientData.name || '',
          aliases: clientData.aliases || '',
          main_contact: clientData.main_contact || '',
          comment: clientData.comment || '',
        },
      });

      for (const p of filledPoints) {
        const payload = {
          address: p.address || '',
          label: p.label || '',
          working_hours: p.working_hours || '',
          contact_person: p.contact_person || '',
          delivery_comment: p.delivery_comment || '',
        };
        if (p.point_id) {
          await api('updateRecord', { sheet: 'points', id_field: 'point_id', id_value: p.point_id, updates: payload });
        } else {
          await api('addPoint', { ...payload, client_id: clientData.client_id, created_by: CURRENT_USER });
        }
      }

      for (const l of filledLegals) {
        const payload = {
          legal_name: l.legal_name || '',
          inn: String(l.inn || ''),
          kpp: l.kpp || '',
          has_contract: l.has_contract === true,
          needs_invoice: l.needs_invoice !== false,
          needs_waybill: l.needs_waybill !== false,
          payment_terms_days: Number(l.payment_terms_days || 0),
          documents_comment: l.documents_comment || '',
        };
        if (l.legal_id) {
          await api('updateRecord', { sheet: 'legals', id_field: 'legal_id', id_value: l.legal_id, updates: payload });
        } else {
          await api('addLegal', { ...payload, client_id: clientData.client_id, created_by: CURRENT_USER });
        }
      }

      clearPageCache();
      showToast(`Клиент сохранён: ${clientData.name}`);
      onDone();
    } catch (err) {
      showToast('Ошибка: ' + err.message, 'error');
    }
    setSaving(false);
  };

  const stepClass = (n) => step === n ? 'bg-slate-950 text-white' : 'bg-slate-100 text-slate-600';

  return <div className="space-y-5">
    <div className="flex gap-2 rounded-2xl bg-slate-50 p-2">
      <button onClick={() => setStep(1)} className={`flex-1 rounded-xl px-4 py-2 text-sm font-medium ${stepClass(1)}`}>1. Клиент</button>
      <button onClick={() => setStep(2)} className={`flex-1 rounded-xl px-4 py-2 text-sm font-medium ${stepClass(2)}`}>2. Адреса <span className="opacity-70">({filledPoints.length})</span></button>
      <button onClick={() => setStep(3)} className={`flex-1 rounded-xl px-4 py-2 text-sm font-medium ${stepClass(3)}`}>3. ИП / ООО <span className="opacity-70">({filledLegals.length})</span></button>
      <button onClick={() => setStep(4)} className={`flex-1 rounded-xl px-4 py-2 text-sm font-medium ${stepClass(4)}`}>4. Проверка</button>
    </div>

    {step === 1 && <div className="space-y-4">
      <div className="rounded-2xl bg-slate-50 p-4 text-sm text-slate-600">Меняем данные клиента. ID не меняется, старые заказы не ломаются.</div>
      <div><Label>Название клиента *</Label><Input value={clientData.name} onChange={(v) => setClientData({ ...clientData, name: v })} /></div>
      <AliasesBlock
        aliases={clientData.aliases}
        onChange={(v) => setClientData({ ...clientData, aliases: v })}
        clients={clients}
        currentClientId={clientData.client_id}
      />
      <div><Label>Основной контакт</Label><Input value={clientData.main_contact} onChange={(v) => setClientData({ ...clientData, main_contact: v })} placeholder="Имя, телефон" /></div>
      <div><Label>Комментарий по клиенту</Label><Input value={clientData.comment} onChange={(v) => setClientData({ ...clientData, comment: v })} /></div>
    </div>}

    {step === 2 && <div className="space-y-4">
      <div className="flex items-center justify-between">
        <div><h3 className="font-semibold">Адреса / филиалы</h3><p className="text-sm text-slate-500">Можно редактировать текущие и добавить новые. Закрытые адреса отправляй в архив из карточки клиента.</p></div>
        <Button variant="light" onClick={() => setPointsData(prev => [...prev, emptyPoint()])}>+ Адрес</Button>
      </div>
      <div className="space-y-3">
        {pointsData.map((p, idx) => <div key={p.point_id || idx} className="rounded-2xl border border-slate-200 bg-white p-4">
          <div className="mb-3 flex items-center justify-between"><div className="font-medium">{p.point_id ? `Адрес №${idx + 1}` : `Новый адрес №${idx + 1}`}</div><button onClick={() => removePoint(idx)} className="text-xs text-slate-400 hover:text-red-600">убрать из формы</button></div>
          <div className="grid grid-cols-2 gap-4">
            <div><Label>Адрес *</Label><Input value={p.address} onChange={(v) => updatePoint(idx, { address: v })} /></div>
            <div><Label>Короткое название</Label><Input value={p.label} onChange={(v) => updatePoint(idx, { label: v })} /></div>
            <div><Label>Время работы</Label><Input value={p.working_hours} onChange={(v) => updatePoint(idx, { working_hours: v })} /></div>
            <div><Label>Контакт на точке</Label><Input value={p.contact_person} onChange={(v) => updatePoint(idx, { contact_person: v })} /></div>
            <div className="col-span-2"><Label>Комментарий по доставке</Label><Input value={p.delivery_comment} onChange={(v) => updatePoint(idx, { delivery_comment: v })} /></div>
          </div>
        </div>)}
      </div>
    </div>}

    {step === 3 && <div className="space-y-4">
      <div className="flex items-center justify-between">
        <div><h3 className="font-semibold">ИП / ООО для документов</h3><p className="text-sm text-slate-500">Можно редактировать текущие и добавить новые. Старые юрлица отправляй в архив из карточки клиента.</p></div>
        <Button variant="light" onClick={() => setLegalsData(prev => [...prev, emptyLegal()])}>+ ИП / ООО</Button>
      </div>
      <div className="space-y-3">
        {legalsData.map((l, idx) => <div key={l.legal_id || idx} className="rounded-2xl border border-slate-200 bg-white p-4">
          <div className="mb-3 flex items-center justify-between"><div className="font-medium">{l.legal_id ? `Юрлицо №${idx + 1}` : `Новое юрлицо №${idx + 1}`}</div><button onClick={() => removeLegal(idx)} className="text-xs text-slate-400 hover:text-red-600">убрать из формы</button></div>
          <div className="grid grid-cols-2 gap-4">
            <div className="col-span-2"><Label>Название ИП / ООО *</Label><Input value={l.legal_name} onChange={(v) => updateLegal(idx, { legal_name: v })} /></div>
            <div><Label>ИНН *</Label><Input value={l.inn} onChange={(v) => updateLegal(idx, { inn: v })} /></div>
            <div><Label>КПП</Label><Input value={l.kpp} onChange={(v) => updateLegal(idx, { kpp: v })} /></div>
            <div><Label>Отсрочка, дней</Label><Input type="number" value={l.payment_terms_days || 0} onChange={(v) => updateLegal(idx, { payment_terms_days: v })} /></div>
            <div className="flex items-end gap-4 pb-3 text-sm">
              <label className="flex items-center gap-2"><input type="checkbox" checked={l.has_contract || false} onChange={(e) => updateLegal(idx, { has_contract: e.target.checked })} /> договор</label>
              <label className="flex items-center gap-2"><input type="checkbox" checked={l.needs_invoice !== false} onChange={(e) => updateLegal(idx, { needs_invoice: e.target.checked })} /> счёт</label>
              <label className="flex items-center gap-2"><input type="checkbox" checked={l.needs_waybill !== false} onChange={(e) => updateLegal(idx, { needs_waybill: e.target.checked })} /> накладная</label>
            </div>
            <div className="col-span-2"><Label>Реквизиты / комментарий по документам</Label><Input value={l.documents_comment} onChange={(v) => updateLegal(idx, { documents_comment: v })} /></div>
          </div>
        </div>)}
      </div>
    </div>}

    {step === 4 && <div className="space-y-4">
      <div className="rounded-2xl border border-slate-200 bg-white p-4">
        <h3 className="mb-3 font-semibold">Проверка перед сохранением</h3>
        <div className="space-y-3 text-sm">
          <div><span className="text-slate-500">Клиент:</span> <b>{clientData.name || 'не заполнен'}</b></div>
          <div><span className="text-slate-500">Узнает клиента, если напишут:</span>{' '}
            {clientData.aliases ? clientData.aliases.split('|').map(s => s.trim()).filter(Boolean).join(', ') : '—'}
          </div>
          <div><span className="text-slate-500">Адреса:</span> {filledPoints.length ? filledPoints.map(p => p.address).join('; ') : 'нет'}</div>
          <div><span className="text-slate-500">ИП / ООО:</span> {filledLegals.length ? filledLegals.map(l => `${l.legal_name} · ИНН ${l.inn}`).join('; ') : 'нет'}</div>
        </div>
      </div>
      <div className="rounded-2xl bg-amber-50 p-4 text-sm text-amber-900">Сохраняем изменения в справочниках. Старые заказы останутся связаны через ID.</div>
    </div>}

    <div className="flex items-center justify-between border-t border-slate-100 pt-5">
      <Button variant="light" onClick={onCancel}>Отмена</Button>
      <div className="flex gap-2">
        {step > 1 && <Button variant="light" onClick={() => setStep(step - 1)}>Назад</Button>}
        {step < 4 && <Button onClick={() => { const error = validate(); if (step === 1 && error === 'Укажи название клиента') { showToast(error, 'warn'); return; } setStep(step + 1); }}>Дальше</Button>}
        {step === 4 && <Button onClick={saveAll} disabled={saving}>{saving ? <><Spinner /> Сохранение...</> : 'Сохранить изменения'}</Button>}
      </div>
    </div>
  </div>;
}

function AddClientForm({ data, setData, onSubmit, onCancel }) {
  return <div className="space-y-4">
    <div><Label>Название *</Label><Input value={data.name} onChange={(v) => setData({ ...data, name: v })} placeholder="Например: Имбирь" /></div>
    <div><Label>Алиасы (через |)</Label><Input value={data.aliases} onChange={(v) => setData({ ...data, aliases: v })} placeholder="имбирь|imbir" /></div>
    <div><Label>Основной контакт</Label><Input value={data.main_contact} onChange={(v) => setData({ ...data, main_contact: v })} placeholder="Имя, телефон" /></div>
    <div><Label>Комментарий</Label><Input value={data.comment} onChange={(v) => setData({ ...data, comment: v })} /></div>
    <FormActions onSubmit={onSubmit} onCancel={onCancel} />
  </div>;
}

function AddPointForm({ data, setData, clients, onSubmit, onCancel, submitLabel = 'Сохранить', lockClient = false }) {
  const clientName = clients.find(c => c.client_id === data.client_id)?.name || data.client_id || '—';
  return <div className="space-y-4">
    <div><Label>Клиент *</Label>{lockClient
      ? <div className="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-700">{clientName}</div>
      : <Combobox value={data.client_id} onChange={(v) => setData({ ...data, client_id: v })}
        options={clients.map(c => ({ value: c.client_id, label: c.name }))} placeholder="Выбрать клиента..." />}
    </div>
    <div><Label>Адрес *</Label><Input value={data.address} onChange={(v) => setData({ ...data, address: v })} placeholder="Например: Ватутина, 11/3" /></div>
    <div><Label>Время работы</Label><Input value={data.working_hours} onChange={(v) => setData({ ...data, working_hours: v })} placeholder="с 10:00 до 22:00" /></div>
    <div><Label>Контактное лицо</Label><Input value={data.contact_person} onChange={(v) => setData({ ...data, contact_person: v })} placeholder="Имя, телефон" /></div>
    <div><Label>Комментарий по доставке</Label><Input value={data.delivery_comment} onChange={(v) => setData({ ...data, delivery_comment: v })} /></div>
    <FormActions onSubmit={onSubmit} onCancel={onCancel} submitLabel={submitLabel} />
  </div>;
}

function AddLegalForm({ data, setData, clients, onSubmit, onCancel, submitLabel = 'Сохранить', lockClient = false }) {
  const clientName = clients.find(c => c.client_id === data.client_id)?.name || data.client_id || '—';
  return <div className="space-y-4">
    <div><Label>Клиент *</Label>{lockClient
      ? <div className="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-700">{clientName}</div>
      : <Combobox value={data.client_id} onChange={(v) => setData({ ...data, client_id: v })}
        options={clients.map(c => ({ value: c.client_id, label: c.name }))} placeholder="Выбрать клиента..." />}
    </div>
    <div><Label>Название юрлица *</Label><Input value={data.legal_name} onChange={(v) => setData({ ...data, legal_name: v })} placeholder="ИП Иванов И.И." /></div>
    <div className="grid grid-cols-2 gap-4">
      <div><Label>ИНН *</Label><Input value={data.inn} onChange={(v) => setData({ ...data, inn: v })} placeholder="540312345678" /></div>
      <div><Label>КПП</Label><Input value={data.kpp} onChange={(v) => setData({ ...data, kpp: v })} /></div>
    </div>
    <div className="flex gap-4 text-sm flex-wrap">
      <label className="flex items-center gap-2"><input type="checkbox" checked={data.has_contract || false} onChange={(e) => setData({ ...data, has_contract: e.target.checked })} /> Есть договор</label>
      <label className="flex items-center gap-2"><input type="checkbox" checked={data.needs_invoice !== false} onChange={(e) => setData({ ...data, needs_invoice: e.target.checked })} /> Нужен счёт</label>
      <label className="flex items-center gap-2"><input type="checkbox" checked={data.needs_waybill !== false} onChange={(e) => setData({ ...data, needs_waybill: e.target.checked })} /> Нужна накладная</label>
    </div>
    <div><Label>Отсрочка платежа (дней)</Label><Input type="number" value={data.payment_terms_days || 0} onChange={(v) => setData({ ...data, payment_terms_days: v })} /></div>
    <div><Label>Комментарий по документам</Label><Input value={data.documents_comment} onChange={(v) => setData({ ...data, documents_comment: v })} /></div>
    <FormActions onSubmit={onSubmit} onCancel={onCancel} submitLabel={submitLabel} />
  </div>;
}

function AddFlavorForm({ data, setData, onSubmit, onCancel }) {
  return <div className="space-y-4">
    <div><Label>Название *</Label><Input value={data.name} onChange={(v) => setData({ ...data, name: v })} placeholder="Например: Маракуйя-Манго" /></div>
    <div className="grid grid-cols-2 gap-4">
      <div><Label>Цена *</Label><Input type="number" value={data.default_price} onChange={(v) => setData({ ...data, default_price: v })} placeholder="100" /></div>
      <div><Label>Колонка в Excel</Label><Input value={data.excel_column} onChange={(v) => setData({ ...data, excel_column: v })} placeholder="AM, AN, AO" /></div>
    </div>
    <div><Label>Алиасы</Label><Input value={data.aliases} onChange={(v) => setData({ ...data, aliases: v })} placeholder="маракуйя|манго" /></div>
    <div className="flex gap-4 text-sm">
      <label className="flex items-center gap-2"><input type="checkbox" checked={data.is_premium || false} onChange={(e) => setData({ ...data, is_premium: e.target.checked })} /> Премиум</label>
      <label className="flex items-center gap-2"><input type="checkbox" checked={data.is_seasonal || false} onChange={(e) => setData({ ...data, is_seasonal: e.target.checked })} /> Сезонный</label>
    </div>
    <FormActions onSubmit={onSubmit} onCancel={onCancel} />
  </div>;
}

function AddExtraForm({ data, setData, onSubmit, onCancel }) {
  return <div className="space-y-4">
    <div><Label>Название *</Label><Input value={data.name} onChange={(v) => setData({ ...data, name: v })} placeholder="Например: Коробка на 10 шт" /></div>
    <div><Label>Цена *</Label><Input type="number" value={data.default_price} onChange={(v) => setData({ ...data, default_price: v })} placeholder="20" /></div>
    <FormActions onSubmit={onSubmit} onCancel={onCancel} />
  </div>;
}

function AddPriceForm({ data, setData, clients, points, legals, flavors, onSubmit, onCancel }) {
  const scope = data.scope || 'client';
  const scopeOptions = scope === 'point'
    ? points.filter(p => isTrue(p.is_active)).map(p => ({ value: p.point_id, label: p.address, hint: clients.find(c => c.client_id === p.client_id)?.name }))
    : scope === 'legal'
      ? legals.filter(l => isTrue(l.is_active)).map(l => ({ value: l.legal_id, label: l.legal_name, hint: clients.find(c => c.client_id === l.client_id)?.name }))
      : clients.filter(c => isTrue(c.is_active)).map(c => ({ value: c.client_id, label: c.name }));

  return <div className="space-y-4">
    <div>
      <Label>Уровень действия *</Label>
      <div className="flex gap-2">
        {[['client', 'Клиент'], ['legal', 'Юрлицо'], ['point', 'Точка']].map(([v, l]) => (
          <button key={v} onClick={() => setData({ ...data, scope: v, scope_id: '' })}
            className={`flex-1 rounded-2xl px-4 py-2 text-sm transition ${scope === v ? 'bg-slate-950 text-white' : 'bg-slate-100 text-slate-700 hover:bg-slate-200'}`}>{l}</button>
        ))}
      </div>
      <div className="mt-2 text-xs text-slate-500">Приоритет: точка → юрлицо → клиент → обычная цена</div>
    </div>
    <div><Label>{scope === 'point' ? 'Адрес' : scope === 'legal' ? 'Юрлицо' : 'Клиент'} *</Label>
      <Combobox value={data.scope_id} onChange={(v) => setData({ ...data, scope_id: v })} options={scopeOptions} placeholder="Выбрать..." /></div>
    <div><Label>Вкус (пусто = все вкусы)</Label>
      <Combobox value={data.flavor_id} onChange={(v) => setData({ ...data, flavor_id: v })}
        options={[{ value: '', label: 'Все вкусы' }, ...flavors.map(f => ({ value: f.flavor_id, label: f.name }))]} placeholder="Все вкусы" /></div>
    <div><Label>Цена *</Label><Input type="number" value={data.price} onChange={(v) => setData({ ...data, price: v })} placeholder="95" /></div>
    <div className="grid grid-cols-2 gap-4">
      <div><Label>Действует с</Label><Input type="date" value={data.valid_from} onChange={(v) => setData({ ...data, valid_from: v })} /></div>
      <div><Label>По (опционально)</Label><Input type="date" value={data.valid_to} onChange={(v) => setData({ ...data, valid_to: v })} /></div>
    </div>
    <div><Label>Комментарий</Label><Input value={data.comment} onChange={(v) => setData({ ...data, comment: v })} placeholder="По договору, скидка..." /></div>
    <FormActions onSubmit={onSubmit} onCancel={onCancel} />
  </div>;
}

// ===== Запуск =====
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
