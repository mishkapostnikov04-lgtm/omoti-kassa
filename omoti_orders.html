<script type="text/babel" data-type="module">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

// ===== Конфигурация =====
const API_URL = 'https://script.google.com/macros/s/AKfycbxeKUgd-cxwHruf9gSYQm9rVH1VDZIUHSeBMVdY7_VAMUxLh8qpAS3d3FZ5bXOK0tZSDg/exec';
const API_SECRET = 'omoti-2026-secret-key-do-not-share-publicly-7x3k9p2m';
const CURRENT_USER = 'Евгений';

// ===== API клиент =====
async function api(action, params = {}) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ secret: API_SECRET, action, params }),
  });
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || data.message || 'Unknown error');
  return data;
}

// ===== Утилиты =====
const money = (v) => new Intl.NumberFormat('ru-RU').format(Number(v || 0)) + ' ₽';
const today = () => new Date().toLocaleDateString('sv-SE', { timeZone: 'Asia/Novosibirsk' });
const tomorrow = () => {
  const [y, m, d] = today().split('-').map(Number);
  return new Date(Date.UTC(y, m - 1, d + 1)).toISOString().substring(0, 10);
};
const dateOnly = (v) => String(v || '').substring(0, 10);
const displayDate = (v) => {
  const s = dateOnly(v);
  if (!s) return '';
  if (!/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const [y, m, d] = s.split('-');
  return `${d}.${m}.${y}`;
};
const isTrue = (v) => v === true || ['TRUE', 'ИСТИНА', 'ДА', '1'].includes(String(v).trim().toUpperCase());

// ===== Алиасы клиентов =====
const ALIAS_LEGAL_PREFIXES_RE = /^(ООО|ИП|ЗАО|ПАО|АО|Inc\.?|Ltd\.?|LLC)\s+/i;
const ALIAS_LEGAL_SUFFIXES_RE = /\s+(ООО|ИП|ЗАО|ПАО|АО|Inc\.?|Ltd\.?|LLC)$/i;
const ALIAS_STOP_WORDS = new Set([
  'кафе','суши','ресторан','доставка','еда','бар','гриль','пицца','кухня',
  'food','cafe','sushi','bar','kitchen','delivery','store','shop',
]);
function generateClientAliases(name) {
  const clean = String(name || '').trim();
  if (!clean) return [];
  const variants = [clean];
  const stripped = clean.replace(ALIAS_LEGAL_PREFIXES_RE, '').replace(ALIAS_LEGAL_SUFFIXES_RE, '').trim();
  if (stripped && stripped !== clean) variants.push(stripped);
  const words = (stripped || clean).split(/\s+/);
  if (words.length > 1) {
    const w = words[0];
    if (w.length > 3 && !ALIAS_STOP_WORDS.has(w.toLowerCase())) variants.push(w);
  }
  return [...new Set(variants)];
}

// ===== Порядок вкусов (единый, как в экспорте Excel) =====
const EXPORT_FLAVOR_ORDER = [
  'Арбуз-Дыня', 'Бабл Гам', 'Банан-Нутелла', 'Вишня-Тонка', 'Мандарин',
  'Дубайский шоколад', 'Киви-Алоэ', 'Клубника', 'Кокос-Маракуйя',
  'Кокосовый пломбир', 'Кофе-Карамель', 'Малина-Ваниль', 'Матча-Манго',
  'Мохито', 'Печенье с топлёным молоком', 'Сливочный лимон', 'Смородина',
  'Сникерс', 'Твикс', 'Трюфель', 'Шоколад', 'Криспи', 'Пряник', 'Грибы',
  'Мункейки', 'Новый вкус 3', 'Новый вкус 4', 'Новый вкус 5',
];
function getFlavorOrderIndex(name) {
  const idx = EXPORT_FLAVOR_ORDER.indexOf(String(name || '').trim());
  return idx === -1 ? 9000 : idx;
}
// нет поля is_active или пусто = активен; явный false/0/нет = неактивен
function isCatalogActive(row) {
  const v = row && row.is_active;
  if (v === undefined || v === null || v === '') return true;
  return isTrue(v);
}
// Сортирует позиции для отображения: моти по EXPORT_FLAVOR_ORDER, упаковка после.
// Использует getOrderItemName — работает и с name, и с name_snapshot.
function sortItemsForDisplay(items) {
  return [...(items || [])].sort((a, b) => {
    if (a.type !== b.type) return a.type === 'moti' ? -1 : 1;
    if (a.type === 'moti') {
      return getFlavorOrderIndex(getOrderItemName(a)) - getFlavorOrderIndex(getOrderItemName(b));
    }
    return Number(a.line_no || 0) - Number(b.line_no || 0);
  });
}

// Лёгкий кеш внутри открытой вкладки браузера.
// Не заменяет Google Таблицу: показываем последние данные сразу,
// а потом всё равно обновляем их из Apps Script в фоне.
const pageCache = {};
const PAGE_CACHE_TTL_MS = 2 * 60 * 1000; // 2 минуты — фоновое обновление не нужно, если данные свежее
function getPageCache(key) {
  const cached = pageCache[key];
  if (!cached) return null;
  return cached.data;
}
function isPageCacheFresh(key) {
  const cached = pageCache[key];
  if (!cached) return false;
  return (Date.now() - cached.time) < PAGE_CACHE_TTL_MS;
}
function setPageCache(key, data) {
  pageCache[key] = { time: Date.now(), data };
}
function clearPageCache(prefix) {
  Object.keys(pageCache).forEach(k => { if (!prefix || k.startsWith(prefix)) delete pageCache[k]; });
}
function readLocalJson(key, fallback) {
  try { return JSON.parse(localStorage.getItem(key)) || fallback; } catch (e) { return fallback; }
}
function writeLocalJson(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
}

function getOrderItemQty(item) {
  return Number((item && (item.qty ?? item.quantity)) || 0);
}

function getOrderItemName(item) {
  return String((item && (item.name || item.title || item.productName || item.name_snapshot || item.ref_id)) || '').trim();
}

function getOrderItemKey(item) {
  const type = String((item && item.type) || 'moti').trim().toLowerCase();
  const refId = String((item && item.ref_id) || getOrderItemName(item).toLowerCase()).trim().toLowerCase();
  const priceRaw = item && (item.price ?? item.unitPrice ?? item.unit_price);
  const price = priceRaw === undefined || priceRaw === null || priceRaw === '' ? '' : Number(priceRaw);
  const pricePart = Number.isFinite(price) ? String(price) : '';
  return `${type}|${refId}|${pricePart}`;
}

function aggregateOrderItems(items) {
  const map = new Map();

  (items || []).forEach(item => {
    if (!item) return;

    const qty = getOrderItemQty(item);
    if (!Number.isFinite(qty) || qty <= 0) return;

    const key = getOrderItemKey(item);
    if (!key) return;

    if (!map.has(key)) {
      map.set(key, {
        ...item,
        qty,
        quantity: qty,
      });
      return;
    }

    const existing = map.get(key);
    const nextQty = getOrderItemQty(existing) + qty;
    map.set(key, {
      ...existing,
      qty: nextQty,
      quantity: nextQty,
    });
  });

  return Array.from(map.values());
}

function isServiceOrderText(text) {
  const s = String(text || '').trim().toLowerCase();
  return /(^|\s)заказ\s*№?\s*\d*/i.test(s);
}

function normalizeParseResultForUi(result) {
  if (!result) return result;

  const next = { ...result };

  if (next.draft) {
    next.draft = {
      ...next.draft,
      items: aggregateOrderItems(next.draft.items || []),
    };
  }

  const unresolved = next.unresolved || {};
  const cleanFlavors = (unresolved.flavors || []).filter(x => !isServiceOrderText(x?.raw_text || x));
  const cleanExtras = (unresolved.extras || []).filter(x => !isServiceOrderText(x?.raw_text || x));

  next.unresolved = {
    ...unresolved,
    flavors: cleanFlavors,
    extras: cleanExtras,
  };

  if (Array.isArray(next.warnings)) {
    next.warnings = next.warnings.filter(w => !isServiceOrderText(w?.raw_text || w?.message || w));
  }

  const hasUnresolved = cleanFlavors.length > 0 || cleanExtras.length > 0;
  const hasWarnings = (next.warnings || []).length > 0;

  if (next.success && !hasUnresolved && !hasWarnings) {
    next.needs_clarification = false;
  }

  return next;
}

function extractPackNoteFromRawText(rawText) {
  const matches = [];
  String(rawText || '').split(/\r?\n/).forEach(line => {
    const m = String(line || '').match(/заказ\s*№?\s*\d+/i);
    if (!m) return;

    const normalized = m[0]
      .replace(/\s+/g, ' ')
      .replace(/№\s*/i, '№')
      .trim();

    if (normalized && !matches.some(x => x.toLowerCase() === normalized.toLowerCase())) {
      matches.push(normalized);
    }
  });

  if (matches.length < 2) return '';
  return `Упаковать отдельно: ${matches.join(', ')}`;
}

function appendCommentNote(comment, note) {
  const base = String(comment || '').trim();
  const add = String(note || '').trim();
  if (!add) return base;
  if (base.toLowerCase().includes(add.toLowerCase())) return base;
  return base ? `${base}\n${add}` : add;
}

function itemsMapFromOrders(orders) {
  const out = {};
  (orders || []).forEach(o => {
    if (Array.isArray(o.items)) out[o.order_id] = o.items;
  });
  return out;
}

function isDeletedOrderForUi(order) {
  const comment = String((order && order.comment) || '').trim();
  const status = String((order && order.status) || '').trim().toLowerCase();

  return status === 'deleted' || /^\[УДАЛ[ЕЁ]Н\]/i.test(comment);
}

function filterDeletedOrdersForUi(orders) {
  return (orders || []).filter(o => !isDeletedOrderForUi(o));
}

// ===== Базовые UI =====

function Pill({ children, color = 'slate', size = 'sm' }) {
  const colors = {
    slate: 'bg-slate-100 text-slate-700',
    green: 'bg-emerald-100 text-emerald-700',
    amber: 'bg-amber-100 text-amber-800',
    red: 'bg-red-100 text-red-700',
    blue: 'bg-blue-100 text-blue-700',
    indigo: 'bg-indigo-100 text-indigo-700',
  };
  const sizes = { sm: 'px-3 py-1 text-xs', md: 'px-3 py-1.5 text-sm' };
  return <span className={`inline-flex rounded-full font-medium ${colors[color]} ${sizes[size]}`}>{children}</span>;
}

function Card({ children, className = '' }) {
  return <div className={`rounded-3xl bg-white shadow-sm ${className}`}>{children}</div>;
}

function Button({ children, onClick, variant = 'dark', className = '', disabled = false, type = 'button', size = 'md' }) {
  const base = 'rounded-2xl font-medium transition active:scale-[0.99] disabled:opacity-50 disabled:cursor-not-allowed disabled:active:scale-100 inline-flex items-center justify-center gap-2';
  const variants = {
    dark: 'bg-slate-950 text-white hover:bg-slate-800',
    light: 'bg-white text-slate-900 border border-slate-200 hover:bg-slate-50',
    ghost: 'bg-slate-100 text-slate-700 hover:bg-slate-200',
    danger: 'bg-red-50 text-red-700 border border-red-200 hover:bg-red-100',
    success: 'bg-emerald-600 text-white hover:bg-emerald-700',
    amber: 'bg-amber-500 text-white hover:bg-amber-600',
  };
  const sizes = {
    sm: 'px-3 py-1.5 text-xs',
    md: 'px-4 py-2 text-sm',
    lg: 'px-6 py-3 text-base',
  };
  return <button type={type} onClick={onClick} disabled={disabled} className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}>{children}</button>;
}

function Input({ value, onChange, placeholder = '', type = 'text', className = '' }) {
  return <input
    type={type}
    value={value ?? ''}
    onChange={(e) => onChange(e.target.value)}
    placeholder={placeholder}
    className={`w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm outline-none transition focus:border-slate-400 focus:ring-2 focus:ring-slate-100 ${className}`}
  />;
}

function Label({ children, className = '' }) {
  return <label className={`mb-2 block text-sm font-medium text-slate-700 ${className}`}>{children}</label>;
}

function Spinner({ small = false }) {
  const size = small ? 'h-4 w-4 border-2' : 'h-5 w-5 border-2';
  return <div className={`inline-block ${size} animate-spin rounded-full border-slate-300 border-t-slate-700`}></div>;
}

function Toast({ message, type = 'success', onClose }) {
  useEffect(() => {
    const t = setTimeout(onClose, 4500);
    return () => clearTimeout(t);
  }, [message]);
  const colors = type === 'error' ? 'bg-red-600' : type === 'warn' ? 'bg-amber-600' : 'bg-emerald-600';
  return <div className={`fixed bottom-6 right-6 z-50 ${colors} text-white rounded-2xl px-5 py-3 shadow-lg text-sm font-medium max-w-md`}>
    {message}
  </div>;
}

function Modal({ open, onClose, title, children, size = 'md' }) {
  if (!open) return null;
  const sizes = { sm: 'max-w-md', md: 'max-w-xl', lg: 'max-w-3xl', xl: 'max-w-5xl' };
  return <div className="modal-bg fixed inset-0 z-40 flex items-center justify-center bg-slate-900/50 backdrop-blur-sm p-4" onClick={onClose}>
    <div className={`modal-content w-full ${sizes[size]} max-h-[90vh] overflow-y-auto rounded-3xl bg-white shadow-xl`} onClick={(e) => e.stopPropagation()}>
      <div className="flex items-center justify-between border-b border-slate-100 px-6 py-4 sticky top-0 bg-white rounded-t-3xl z-10">
        <h2 className="text-lg font-semibold">{title}</h2>
        <button onClick={onClose} className="rounded-full p-1 hover:bg-slate-100 text-slate-500 hover:text-slate-900">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div className="p-6">{children}</div>
    </div>
  </div>;
}

function MenuItem({ active, children, onClick, icon }) {
  return <button onClick={onClick} className={`flex w-full items-center gap-3 rounded-2xl px-3 py-3 text-left text-sm transition ${active ? 'bg-white text-slate-950 font-medium shadow-sm' : 'text-slate-300 hover:bg-slate-900'}`}>
    <span className="opacity-80">{icon}</span>
    <span>{children}</span>
  </button>;
}

// ===== Combobox с поиском =====

function Combobox({ value, onChange, options, placeholder = 'Выбрать...', emptyText = 'Не найдено' }) {
  const [open, setOpen] = useState(false);
  const [query, setQuery] = useState('');
  const [highlightedIdx, setHighlightedIdx] = useState(0);
  const ref = useRef(null);
  const inputRef = useRef(null);

  const selected = options.find(o => o.value === value);

  useEffect(() => {
    const handleClick = (e) => {
      if (ref.current && !ref.current.contains(e.target)) {
        setOpen(false);
        setQuery('');
      }
    };
    document.addEventListener('mousedown', handleClick);
    return () => document.removeEventListener('mousedown', handleClick);
  }, []);

  const filtered = useMemo(() => {
    if (!query) return options;
    const q = query.toLowerCase();
    return options.filter(o =>
      o.label.toLowerCase().includes(q) ||
      (o.search && o.search.toLowerCase().includes(q))
    );
  }, [query, options]);

  useEffect(() => { setHighlightedIdx(0); }, [query]);

  const handleSelect = (opt) => {
    onChange(opt.value);
    setOpen(false);
    setQuery('');
  };

  const handleKeyDown = (e) => {
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      setHighlightedIdx(i => Math.min(i + 1, filtered.length - 1));
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      setHighlightedIdx(i => Math.max(i - 1, 0));
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (filtered[highlightedIdx]) handleSelect(filtered[highlightedIdx]);
    } else if (e.key === 'Escape') {
      setOpen(false);
      setQuery('');
    }
  };

  return <div ref={ref} className="relative">
    <button
      type="button"
      onClick={() => {
        setOpen(o => !o);
        setTimeout(() => inputRef.current?.focus(), 50);
      }}
      className={`w-full flex items-center justify-between rounded-2xl border bg-white px-4 py-3 text-sm outline-none transition text-left ${open ? 'border-slate-400 ring-2 ring-slate-100' : 'border-slate-200 hover:border-slate-300'}`}
    >
      <span className={selected ? 'text-slate-900' : 'text-slate-400'}>
        {selected ? selected.label : placeholder}
      </span>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={`text-slate-400 transition ${open ? 'rotate-180' : ''}`}><polyline points="6 9 12 15 18 9"/></svg>
    </button>

    {open && <div className="absolute z-30 mt-2 w-full rounded-2xl bg-white border border-slate-200 shadow-lg overflow-hidden">
      <div className="p-2 border-b border-slate-100">
        <input
          ref={inputRef}
          value={query}
          onChange={(e) => setQuery(e.target.value)}
          onKeyDown={handleKeyDown}
          placeholder="Поиск..."
          className="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-100"
        />
      </div>
      <div className="combo-dropdown">
        {filtered.length === 0 && <div className="px-4 py-6 text-center text-sm text-slate-400">{emptyText}</div>}
        {filtered.map((opt, idx) => (
          <div
            key={opt.value}
            onClick={() => handleSelect(opt)}
            onMouseEnter={() => setHighlightedIdx(idx)}
            className={`combo-option ${idx === highlightedIdx ? 'highlighted' : ''} ${opt.value === value ? 'selected' : ''}`}
          >
            {opt.label}
            {opt.hint && <span className="text-slate-400 ml-2">{opt.hint}</span>}
          </div>
        ))}
      </div>
    </div>}
  </div>;
}

// ===== Главный =====

function App() {
  const [data, setData] = useState({ clients: [], points: [], legals: [], flavors: [], extras: [], priceOverrides: [] });
  const [loading, setLoading] = useState(true);
  const [page, setPage] = useState('order');
  const [toast, setToast] = useState(null);
  const [editOrderId, setEditOrderId] = useState(null);
  const [editOrderData, setEditOrderData] = useState(null);
  const [mountedPages, setMountedPages] = useState(() => new Set(['order']));
  const [ordersRefreshKey, setOrdersRefreshKey] = useState(0);

  const showToast = (message, type = 'success') => setToast({ message, type });

  const markOrdersChanged = () => {
    clearPageCache('inwork');
    clearPageCache('history');
    clearPageCache('assembly');
    setOrdersRefreshKey(k => k + 1);
  };

  const loadCatalogs = useCallback(async () => {
    try {
      let bootstrap;

      try {
        bootstrap = await api('getBootstrap');
      } catch (bootstrapErr) {
        // Запасной путь, если Apps Script ещё не обновлён.
        const [c, p, l, f, e, ov] = await Promise.all([
          api('getClients'), api('getPoints'), api('getLegals'),
          api('getFlavors'), api('getExtras'), api('getPriceOverrides'),
        ]);
        bootstrap = {
          clients: c.clients || [],
          points: p.points || [],
          legals: l.legals || [],
          flavors: f.flavors || [],
          extras: e.extras || [],
          priceOverrides: ov.overrides || ov.priceOverrides || [],
        };
      }

      setData({
        clients: bootstrap.clients || [],
        points: bootstrap.points || [],
        legals: bootstrap.legals || [],
        flavors: bootstrap.flavors || [],
        extras: bootstrap.extras || [],
        priceOverrides: bootstrap.priceOverrides || bootstrap.price_overrides || bootstrap.overrides || [],
      });
    } catch (err) {
      showToast('Ошибка загрузки: ' + err.message, 'error');
    }
    setLoading(false);
  }, []);

  useEffect(() => { loadCatalogs(); }, [loadCatalogs]);

  useEffect(() => {
    setMountedPages(prev => {
      if (prev.has(page)) return prev;
      const next = new Set(prev);
      next.add(page);
      return next;
    });
  }, [page]);

  if (loading) return <div className="min-h-screen flex items-center justify-center">
    <div className="flex items-center gap-3 text-slate-600"><Spinner /><span>Загрузка...</span></div>
  </div>;

  return <div className="min-h-screen bg-slate-100 p-5 text-slate-900">
    <div className="mx-auto grid max-w-[1440px] grid-cols-[240px_minmax(0,1fr)] gap-5">
      <Sidebar page={page} setPage={setPage} />
      <main className="space-y-5 min-w-0">
        {mountedPages.has('order') && <div style={{display: page === 'order' ? '' : 'none'}}><NewOrderPage {...data} editOrderId={editOrderId} editOrderData={editOrderData} onClearEdit={() => { setEditOrderId(null); setEditOrderData(null); }} onSaved={loadCatalogs} showToast={showToast} markOrdersChanged={markOrdersChanged} /></div>}
        {mountedPages.has('inwork') && <div style={{display: page === 'inwork' ? '' : 'none'}}><InWorkPage clients={data.clients} points={data.points} legals={data.legals} flavors={data.flavors} extras={data.extras} priceOverrides={data.priceOverrides} showToast={showToast} onEditOrder={(order) => { setEditOrderId(order?.order_id || order); setEditOrderData(typeof order === 'object' ? order : null); setPage('order'); }} markOrdersChanged={markOrdersChanged} ordersRefreshKey={ordersRefreshKey} /></div>}
        {mountedPages.has('assembly') && <div style={{display: page === 'assembly' ? '' : 'none'}}><AssemblyPage clients={data.clients} points={data.points} showToast={showToast} onEditOrder={(order) => { setEditOrderId(order?.order_id || order); setEditOrderData(typeof order === 'object' ? order : null); setPage('order'); }} markOrdersChanged={markOrdersChanged} ordersRefreshKey={ordersRefreshKey} /></div>}
        {mountedPages.has('history') && <div style={{display: page === 'history' ? '' : 'none'}}><HistoryPage clients={data.clients} points={data.points} legals={data.legals} flavors={data.flavors} extras={data.extras} showToast={showToast} onEditOrder={(order) => { setEditOrderId(order?.order_id || order); setEditOrderData(typeof order === 'object' ? order : null); setPage('order'); }} markOrdersChanged={markOrdersChanged} ordersRefreshKey={ordersRefreshKey} /></div>}
        {mountedPages.has('help') && <div style={{display: page === 'help' ? '' : 'none'}}><UsagePage /></div>}
        {mountedPages.has('export') && <div style={{display: page === 'export' ? '' : 'none'}}><ExportPage showToast={showToast} /></div>}
        {mountedPages.has('catalog') && <div style={{display: page === 'catalog' ? '' : 'none'}}><CatalogPage {...data} reload={loadCatalogs} showToast={showToast} /></div>}
      </main>
    </div>
    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
  </div>;
}

// ===== Расчёт цены =====

function usePriceCalc(flavors, extras, priceOverrides, clientId, pointId, legalId) {
  return useCallback((type, refId) => {
    if (type === 'extra') {
      const ex = extras.find(e => e.extra_id === refId);
      return { price: Number(ex?.default_price || 0), basePrice: Number(ex?.default_price || 0), source: 'extra_default' };
    }
    const flavor = flavors.find(f => f.flavor_id === refId);
    if (!flavor) return { price: 0, basePrice: 0, source: 'flavor_default' };
    const base = Number(flavor.default_price);

    const todayStr = today();
    const isValid = (o) => {
      if (!isTrue(o.is_active)) return false;
      if (o.valid_from && dateOnly(o.valid_from) > todayStr) return false;
      if (o.valid_to && dateOnly(o.valid_to) < todayStr) return false;
      return true;
    };

    const findOverride = (scope, scopeId) => {
      if (!scopeId) return null;
      return priceOverrides.find(o =>
        isValid(o) && o.scope === scope && o.scope_id === scopeId &&
        (o.flavor_id === refId || !o.flavor_id)
      );
    };

    const pOver = findOverride('point', pointId);
    if (pOver) return { price: Number(pOver.price), basePrice: base, source: 'point_override' };
    const lOver = findOverride('legal', legalId);
    if (lOver) return { price: Number(lOver.price), basePrice: base, source: 'legal_override' };
    const cOver = findOverride('client', clientId);
    if (cOver) return { price: Number(cOver.price), basePrice: base, source: 'client_override' };

    return { price: base, basePrice: base, source: 'flavor_default' };
  }, [flavors, extras, priceOverrides, clientId, pointId, legalId]);
}

// ===== Новый заказ =====

function NewOrderPage({ clients, points, legals, flavors, extras, priceOverrides, onSaved, showToast, editOrderId, editOrderData, onClearEdit, markOrdersChanged }) {
  const [clientId, setClientId] = useState('');
  const [pointId, setPointId] = useState('');
  const [legalId, setLegalId] = useState('');
  const [deliveryDate, setDeliveryDate] = useState(today());
  const [comment, setComment] = useState('');
  const [items, setItems] = useState([]);
  const [history, setHistory] = useState([]);
  const [loadingHistory, setLoadingHistory] = useState(false);
  const [saving, setSaving] = useState(false);
  const [loadingEdit, setLoadingEdit] = useState(false);
  const [editingOrder, setEditingOrder] = useState(null); // полный объект редактируемого заказа
  const [quickText, setQuickText] = useState('');
  const [quickParsing, setQuickParsing] = useState(false);
  const [quickParseResult, setQuickParseResult] = useState(null);
  const skipClientAutofillRef = useRef(false);

  const isEditMode = !!editOrderId;

  // загрузка заказа для редактирования
  useEffect(() => {
    if (!editOrderId) {
      setEditingOrder(null);
      return;
    }

    const hydrateOrderForEdit = (o, rawItems = []) => {
      setEditingOrder(o);
      setClientId(o.client_id || '');
      setPointId(o.point_id || '');
      setLegalId(o.legal_id || '');
      setDeliveryDate(dateOnly(o.delivery_date) || today());
      setComment(o.comment || '');
      const loadedItems = (rawItems || [])
        .filter(it => Number(it.qty) > 0)
        .map(it => ({
          type: it.type,
          ref_id: it.ref_id,
          name: it.name_snapshot || it.name,
          qty: Number(it.qty),
          price: Number(it.price),
          basePrice: Number(it.base_price),
          source: it.price_source,
        }));
      setItems(loadedItems);
    };

    // Если пришли из «В работе», «Сборка» или «История», заказ уже лежит во фронте вместе с позициями.
    // Используем его сразу и не дёргаем медленный getOrder.
    if (editOrderData && editOrderData.order_id === editOrderId) {
      hydrateOrderForEdit(editOrderData, editOrderData.items || []);
      setLoadingEdit(false);
      return;
    }

    setLoadingEdit(true);
    (async () => {
      try {
        const res = await api('getOrder', { order_id: editOrderId });
        hydrateOrderForEdit(res.order, res.items || []);
      } catch (err) {
        showToast('Ошибка загрузки заказа: ' + err.message, 'error');
        onClearEdit();
      }
      setLoadingEdit(false);
    })();
  }, [editOrderId, editOrderData]);

  const client = clients.find(c => c.client_id === clientId);
  const point = points.find(p => p.point_id === pointId);
  const legal = legals.find(l => l.legal_id === legalId);

  const clientPoints = useMemo(() => points.filter(p => p.client_id === clientId), [points, clientId]);
  const clientLegals = useMemo(() => legals.filter(l => l.client_id === clientId), [legals, clientId]);

  const clientOptions = useMemo(() => clients.map(c => {
    const cPoints = points.filter(p => p.client_id === c.client_id);
    const cLegals = legals.filter(l => l.client_id === c.client_id);
    const search = [
      c.name, c.aliases, c.comment, c.main_contact,
      ...cPoints.flatMap(p => [p.address, p.label, p.working_hours, p.contact_person, p.delivery_comment]),
      ...cLegals.flatMap(l => [l.legal_name, l.inn, l.kpp, l.documents_comment])
    ].filter(Boolean).join(' ');
    const hintParts = [];
    if (cPoints.length) hintParts.push(`${cPoints.length} адр.`);
    if (cLegals.length) hintParts.push(`${cLegals.length} юр.`);
    return { value: c.client_id, label: c.name, search, hint: hintParts.join(' · ') };
  }), [clients, points, legals]);

  const calcPrice = usePriceCalc(flavors, extras, priceOverrides, clientId, pointId, legalId);

  const calcPriceForContext = useCallback((type, refId, ctx = {}) => {
    if (type === 'extra') {
      const ex = extras.find(e => e.extra_id === refId);
      return { price: Number(ex?.default_price || 0), basePrice: Number(ex?.default_price || 0), source: 'extra_default' };
    }

    const flavor = flavors.find(f => f.flavor_id === refId);
    if (!flavor) return { price: 0, basePrice: 0, source: 'flavor_default' };

    const base = Number(flavor.default_price || 0);
    const todayValue = today();
    const ctxClientId = ctx.client_id || clientId;
    const ctxPointId = ctx.point_id || pointId;
    const ctxLegalId = ctx.legal_id || legalId;

    const isValid = (o) => {
      if (!isTrue(o.is_active)) return false;
      if (o.valid_from && dateOnly(o.valid_from) > todayValue) return false;
      if (o.valid_to && dateOnly(o.valid_to) < todayValue) return false;
      return true;
    };

    const findOverride = (scope, scopeId) => {
      if (!scopeId) return null;
      return priceOverrides.find(o =>
        isValid(o) && o.scope === scope && o.scope_id === scopeId &&
        (o.flavor_id === refId || !o.flavor_id)
      );
    };

    const pOver = findOverride('point', ctxPointId);
    if (pOver) return { price: Number(pOver.price), basePrice: base, source: 'point_override' };

    const lOver = findOverride('legal', ctxLegalId);
    if (lOver) return { price: Number(lOver.price), basePrice: base, source: 'legal_override' };

    const cOver = findOverride('client', ctxClientId);
    if (cOver) return { price: Number(cOver.price), basePrice: base, source: 'client_override' };

    return { price: base, basePrice: base, source: 'flavor_default' };
  }, [flavors, extras, priceOverrides, clientId, pointId, legalId]);

  const applyParsedDraft = useCallback((draft, rawText = '') => {
    if (!draft) return;

    const nextClientId = draft.client_id || '';
    const nextPointId = draft.point_id || '';
    const nextLegalId = draft.legal_id || '';
    const ctx = { client_id: nextClientId, point_id: nextPointId, legal_id: nextLegalId };

    const mappedItems = (draft.items || [])
      .filter(i => i && i.ref_id && Number(i.qty) > 0)
      .map(i => {
        const priceInfo = calcPriceForContext(i.type, i.ref_id, ctx);
        const ref = i.type === 'extra'
          ? extras.find(e => e.extra_id === i.ref_id)
          : flavors.find(f => f.flavor_id === i.ref_id);

        return {
          type: i.type,
          ref_id: i.ref_id,
          name: ref?.name || i.name || i.ref_id,
          qty: Number(i.qty),
          price: priceInfo.price,
          basePrice: priceInfo.basePrice,
          source: priceInfo.source,
        };
      });

    const nextItems = aggregateOrderItems(mappedItems);
    const packNote = extractPackNoteFromRawText(rawText);
    const nextComment = appendCommentNote(draft.comment || '', packNote);

    skipClientAutofillRef.current = true;
    setClientId(nextClientId);
    setPointId(nextPointId);
    setLegalId(nextLegalId);
    if (draft.delivery_date) setDeliveryDate(dateOnly(draft.delivery_date));
    setComment(nextComment);
    setItems(nextItems);
  }, [calcPriceForContext, extras, flavors]);

  const parseQuickOrder = async () => {
    const raw = quickText.trim();
    if (!raw) {
      showToast('Вставь текст заказа', 'warn');
      return;
    }

    if (quickParsing) return;
    setQuickParsing(true);
    setQuickParseResult(null);

    try {
      const res = await api('parseOrderDraft', {
        raw_text: raw,
        source: 'dashboard',
        created_by: CURRENT_USER,
      });

      const parsedRes = normalizeParseResultForUi(res);
      setQuickParseResult(parsedRes);

      const draftItems = parsedRes?.draft?.items || [];
      const hasParsedItems = draftItems.some(i => i && i.ref_id && Number(i.qty || 0) > 0);

      // Если часть заказа разобралась, заполняем найденные позиции даже при warnings / needs_clarification.
      // Клиент может остаться пустым. Не найденные вкусы останутся в жёлтом предупреждении.
      // Сохранить заказ без клиента всё равно нельзя.
      if (parsedRes.is_assortment) {
        const hasCurrentData = clientId || pointId || legalId || items.length || comment;
        if (hasCurrentData && !window.confirm('Заменить текущую форму данными ассорти-заказа?')) {
          showToast('Разбор готов, форма не изменена', 'warn');
          return;
        }
        if (parsedRes.draft) applyParsedDraft(parsedRes.draft, raw);
        showToast('Ассорти-заказ: добавь вкусы вручную', 'warn');
        return;
      }

      if (parsedRes.draft && hasParsedItems) {
        const hasCurrentData = clientId || pointId || legalId || items.length || comment;

        if (hasCurrentData && !window.confirm('Заменить текущую форму найденными позициями из разбора?')) {
          showToast('Разбор готов, форма не изменена', 'warn');
          return;
        }

        applyParsedDraft(parsedRes.draft, raw);

        const parsedMotiItems = draftItems.filter(i => i.type === 'moti');
        const parsedExtraItems = draftItems.filter(i => i.type === 'extra');
        const totalParsedMoti = parsedMotiItems.reduce((sum, i) => sum + Number(i.qty || 0), 0);
        const totalParsedExtra = parsedExtraItems.reduce((sum, i) => sum + Number(i.qty || 0), 0);
        const parsedSummary = totalParsedExtra > 0
          ? `${parsedMotiItems.length} вкусов, ${totalParsedMoti} моти + упаковка ${totalParsedExtra} шт`
          : `${parsedMotiItems.length || draftItems.length} позиций, ${totalParsedMoti} шт`;
        const model = parsedRes.ai_model_used === 'fallback_js'
          ? 'без ИИ'
          : parsedRes.ai_model_used === 'openai/gpt-4.1-mini'
            ? 'GPT-4.1 mini'
            : parsedRes.ai_model_used === 'anthropic/claude-haiku-4.5'
              ? 'Haiku 4.5'
              : parsedRes.ai_model_used === 'anthropic/claude-sonnet-4.5'
                ? 'Sonnet 4.5'
                : parsedRes.ai_model_used || 'ИИ';

        if (parsedRes.success && !parsedRes.needs_clarification) {
          showToast(`Заказ разобран: ${parsedSummary} · ${model}`);
        } else {
          showToast(`Частично разобрано: ${parsedSummary}. Проверь предупреждения.`, 'warn');
        }

        return;
      }

      // Если позиций нет вообще, форму не трогаем.
      showToast(parsedRes.message || 'Нужно проверить текст вручную', 'warn');

    } catch (err) {
      setQuickParseResult({
        success: false,
        needs_clarification: true,
        message: err.message,
        warnings: [],
        unresolved: {},
      });
      showToast('Ошибка разбора: ' + err.message, 'error');
    } finally {
      setQuickParsing(false);
    }
  };

  // При смене клиента подставляем первый адрес/юрлицо, но не затираем загруженные значения при редактировании
  const prevClientIdRef = useRef(clientId);
  useEffect(() => {
    if (!clientId) {
      skipClientAutofillRef.current = false;
      setPointId('');
      setLegalId('');
      setHistory([]);
      prevClientIdRef.current = '';
      return;
    }

    if (skipClientAutofillRef.current) {
      skipClientAutofillRef.current = false;
      loadHistory(clientId);
      prevClientIdRef.current = clientId;
      return;
    }

    const firstPoint = points.find(p => p.client_id === clientId);
    const firstLegal = legals.find(l => l.client_id === clientId);
    const clientChanged = prevClientIdRef.current !== clientId;
    const pointBelongsToClient = pointId && points.some(p => p.point_id === pointId && p.client_id === clientId);
    const legalBelongsToClient = legalId && legals.some(l => l.legal_id === legalId && l.client_id === clientId);

    // Новый заказ: при первом выборе клиента сразу ставим первый адрес и первое юрлицо.
    // Редактирование: если пользователь сам сменил клиента, тоже ставим первый адрес/юрлицо нового клиента.
    if (clientChanged) {
      if (!pointBelongsToClient) setPointId(firstPoint?.point_id || '');
      if (!legalBelongsToClient) setLegalId(firstLegal?.legal_id || '');
    }

    loadHistory(clientId);
    prevClientIdRef.current = clientId;
  }, [clientId, points, legals]);

  const loadHistory = async (cid) => {
    setLoadingHistory(true);
    try {
      const res = await api('getClientHistory', { client_id: cid, limit: 5 });
      setHistory(filterDeletedOrdersForUi(res.orders || []));
    } catch (err) { console.error(err); }
    setLoadingHistory(false);
  };

  const mergeOrAppendItem = (newItem) => {
    setItems(prev => {
      const idx = prev.findIndex(it => it.type === newItem.type && it.ref_id === newItem.ref_id);
      if (idx === -1) return [...prev, newItem];

      showToast(`${newItem.name} уже есть в заказе — прибавил количество`);
      return prev.map((it, i) => i === idx
        ? { ...it, qty: Number(it.qty || 0) + Number(newItem.qty || 0) }
        : it
      );
    });
  };

  const addMoti = (flavorId, qty) => {
    const q = Number(qty);
    if (!flavorId || !q || q <= 0) return;
    const flavor = flavors.find(f => f.flavor_id === flavorId);
    if (!flavor) return;
    const priceInfo = calcPrice('moti', flavorId);
    mergeOrAppendItem({
      type: 'moti', ref_id: flavorId, name: flavor.name,
      qty: q, price: priceInfo.price, basePrice: priceInfo.basePrice, source: priceInfo.source,
    });
  };

  const setMotiQuantityFromGrid = (flavorId, qtyValue, priceDraftValue) => {
    const q = Number(qtyValue);
    const flavor = flavors.find(f => f.flavor_id === flavorId);
    if (!flavor) return;

    // Пустое поле или 0 = вкус не входит в заказ
    if (!qtyValue || !Number.isFinite(q) || q <= 0) {
      setItems(prev => prev.filter(it => !(it.type === 'moti' && it.ref_id === flavorId)));
      return;
    }

    const priceInfo = calcPrice('moti', flavorId);
    const draftPrice = priceDraftValue !== undefined && priceDraftValue !== '' ? Number(priceDraftValue) : NaN;

    setItems(prev => {
      const existing = prev.find(it => it.type === 'moti' && it.ref_id === flavorId);
      const price = Number.isFinite(draftPrice) ? draftPrice : (existing ? Number(existing.price) : Number(priceInfo.price));
      const source = price !== Number(priceInfo.price) ? 'manual' : priceInfo.source;
      const nextItem = {
        type: 'moti',
        ref_id: flavorId,
        name: flavor.name,
        qty: q,
        price,
        basePrice: priceInfo.basePrice,
        source,
      };

      if (existing) {
        return prev.map(it => it.type === 'moti' && it.ref_id === flavorId ? nextItem : it);
      }
      return [...prev, nextItem];
    });
  };

  const setMotiPriceFromGrid = (flavorId, priceValue) => {
    const priceInfo = calcPrice('moti', flavorId);
    setItems(prev => prev.map(it => {
      if (!(it.type === 'moti' && it.ref_id === flavorId)) return it;
      const price = priceValue === '' ? '' : Number(priceValue);
      return {
        ...it,
        price,
        basePrice: priceInfo.basePrice,
        source: Number(price) !== Number(priceInfo.price) ? 'manual' : priceInfo.source,
      };
    }));
  };

  const addExtra = (extraId, qty) => {
    const q = Number(qty);
    if (!extraId || !q || q <= 0) return;
    const extra = extras.find(e => e.extra_id === extraId);
    if (!extra) return;
    mergeOrAppendItem({
      type: 'extra', ref_id: extraId, name: extra.name,
      qty: q, price: Number(extra.default_price), basePrice: Number(extra.default_price), source: 'extra_default',
    });
  };

  const updateItem = (idx, field, value) => {
    setItems(prev => prev.map((it, i) => i === idx
      ? { ...it, [field]: value, ...(field === 'price' && Number(value) !== it.basePrice ? { source: 'manual' } : {}) }
      : it));
  };
  const removeItem = (idx) => setItems(prev => prev.filter((_, i) => i !== idx));

  const totalMoti = items.filter(i => i.type === 'moti').reduce((s, i) => s + Number(i.qty || 0), 0);
  const totalExtra = items.filter(i => i.type === 'extra').reduce((s, i) => s + Number(i.qty || 0), 0);
  const totalAmount = items.reduce((s, i) => s + Number(i.qty || 0) * Number(i.price || 0), 0);

  const repeatOrder = (order) => {
    if (order.point_id) setPointId(order.point_id);
    if (order.legal_id) setLegalId(order.legal_id);
    setItems((order.items || []).map(it => {
      const priceInfo = calcPrice(it.type, it.ref_id);
      return {
        type: it.type, ref_id: it.ref_id,
        name: it.name_snapshot || it.name,
        qty: Number(it.qty),
        price: priceInfo.price, basePrice: priceInfo.basePrice, source: priceInfo.source,
      };
    }));
    showToast(`Заказ ${order.order_no} скопирован`);
  };

  const getSaveError = () => {
    if (!clientId) return 'Выбери клиента';

    // Если у клиента есть адреса в справочнике, адрес обязателен.
    // Если адресов у клиента нет вообще — заказ можно сохранить без адреса.
    if (clientPoints.length > 0 && !pointId) {
      return 'Выбери адрес / филиал';
    }

    if (!deliveryDate) return 'Укажи дату доставки';
    if (items.length === 0) return 'Добавь хотя бы одну позицию';

    const badQty = items.find(i => !Number.isFinite(Number(i.qty)) || Number(i.qty) <= 0);
    if (badQty) return `Проверь количество: ${badQty.name}`;

    const badPrice = items.find(i => !Number.isFinite(Number(i.price)) || Number(i.price) <= 0);
    if (badPrice) return `Проверь цену: ${badPrice.name}`;

    return '';
  };

  const getEditedOrderStatus = () => {
    if (!editingOrder) return 'new';
    if (editingOrder.status === 'shipped' || editingOrder.status === 'cancelled') return 'new';
    return editingOrder.status || 'new';
  };

  const saveOrder = async () => {
    const saveError = getSaveError();
    if (saveError) { showToast(saveError, 'warn'); return; }
    if (saving) return;
    setSaving(true);
    try {
      if (isEditMode && editingOrder) {
        const res = await api('replaceOrder', {
          order_id: editingOrder.order_id,
          client_id: clientId,
          point_id: pointId || undefined,
          legal_id: legalId || undefined,
          delivery_date: deliveryDate,
          comment: comment,
          items: items.map(i => ({ type: i.type, ref_id: i.ref_id, qty: Number(i.qty), price: Number(i.price) })),
          status: getEditedOrderStatus(),
        });
        showToast(`Заказ ${editingOrder.order_no} обновлён`);
        markOrdersChanged();
        // выходим из режима редактирования
        setItems([]); setComment(''); setClientId(''); setPointId(''); setLegalId('');
        onClearEdit();
      } else {
        const res = await api('createOrder', {
          client_id: clientId,
          point_id: pointId || undefined,
          legal_id: legalId || undefined,
          delivery_date: deliveryDate,
          comment,
          items: items.map(i => ({ type: i.type, ref_id: i.ref_id, qty: Number(i.qty), price: Number(i.price) })),
          source: 'manual',
          status: 'new',
          created_by: CURRENT_USER,
        });
        showToast(`Заказ ${res.order_no} сохранён · ${money(res.total_amount)}`);
        markOrdersChanged();
        setItems([]); setComment('');
        loadHistory(clientId);
      }
    } catch (err) {
      showToast('Ошибка сохранения: ' + err.message, 'error');
    }
    setSaving(false);
  };

  const cancelEdit = () => {
    setItems([]); setComment(''); setClientId(''); setPointId(''); setLegalId('');
    setDeliveryDate(today());
    onClearEdit();
  };

  return <>
    <header className={`flex items-center justify-between rounded-3xl p-5 shadow-sm ${isEditMode ? 'bg-amber-50 ring-2 ring-amber-200' : 'bg-white'}`}>
      <div>
        <h1 className="text-2xl font-semibold tracking-tight">
          {isEditMode ? `Редактирование заказа ${editingOrder?.order_no || ''}` : 'Новый заказ'}
        </h1>
        <p className="mt-1 text-sm text-slate-500">
          {isEditMode
            ? 'Старый заказ будет помечен отменённым, создан новый с теми же данными.'
            : 'Внесение B2B-заказа. Сохранение в Google Таблице.'}
        </p>
      </div>
      {isEditMode && <Button onClick={cancelEdit} variant="light">Отменить редактирование</Button>}
    </header>

    {loadingEdit && <div className="text-center py-12"><Spinner /></div>}
    {!loadingEdit && <div className="grid grid-cols-[1.45fr_0.75fr] gap-5">
      <Card className="p-5 min-w-0">
        <div className="space-y-5">
          {!isEditMode && <QuickParseBlock
            value={quickText}
            onChange={setQuickText}
            onParse={parseQuickOrder}
            loading={quickParsing}
            result={quickParseResult}
            onClear={() => { setQuickText(''); setQuickParseResult(null); }}
          />}

          {/* Клиент / дата */}
          <div className="grid grid-cols-2 gap-4">
            <div>
              <Label>Клиент</Label>
              <Combobox
                value={clientId}
                onChange={setClientId}
                options={clientOptions}
                placeholder="Выбрать клиента, адрес или ИП..."
              />
            </div>
            <div>
              <Label>Дата доставки</Label>
              <Input type="date" value={deliveryDate} onChange={setDeliveryDate} />
            </div>
          </div>

          {clientId && <>
            <div className="grid grid-cols-2 gap-4">
              <div>
                <Label>Адрес / филиал</Label>
                <Combobox
                  value={pointId}
                  onChange={setPointId}
                  options={clientPoints.map(p => ({ value: p.point_id, label: p.address }))}
                  placeholder={clientPoints.length ? 'Выбрать адрес...' : 'Нет адресов'}
                />
              </div>
              <div>
                <Label>Юрлицо</Label>
                <Combobox
                  value={legalId}
                  onChange={setLegalId}
                  options={clientLegals.map(l => ({ value: l.legal_id, label: l.legal_name, hint: `ИНН ${l.inn}` }))}
                  placeholder={clientLegals.length ? 'Выбрать юрлицо...' : 'Без юрлица'}
                />
              </div>
            </div>

            <div className="grid grid-cols-3 gap-3 rounded-2xl bg-slate-50 p-4">
              <div>
                <div className="text-xs text-slate-500">ИНН</div>
                <div className="mt-1 text-sm font-medium">{legal?.inn || '—'}</div>
              </div>
              <div>
                <div className="text-xs text-slate-500">Время работы</div>
                <div className="mt-1 text-sm font-medium">{point?.working_hours || '—'}</div>
              </div>
              <div>
                <div className="text-xs text-slate-500">Контакт</div>
                <div className="mt-1 text-sm font-medium">{point?.contact_person || '—'}</div>
              </div>
            </div>
          </>}

          <AddItemBlock
            flavors={flavors}
            extras={extras}
            items={items}
            calcPrice={calcPrice}
            priceContextKey={`${clientId}|${pointId}|${legalId}`}
            onSetMotiQuantity={setMotiQuantityFromGrid}
            onSetMotiPrice={setMotiPriceFromGrid}
            onAddExtra={addExtra}
          />

          {items.length > 0 && <div className="space-y-2">
            {items
              .map((it, idx) => ({ it, idx }))
              .sort((a, b) => {
                if (a.it.type !== b.it.type) return a.it.type === 'moti' ? -1 : 1;
                if (a.it.type === 'moti') {
                  return getFlavorOrderIndex(getOrderItemName(a.it)) - getFlavorOrderIndex(getOrderItemName(b.it));
                }
                return a.idx - b.idx;
              })
              .map(({ it, idx }) => (
                <ItemRow key={idx} item={it} idx={idx} onUpdate={updateItem} onRemove={removeItem} />
              ))}
          </div>}

          <div>
            <Label>Комментарий к заказу</Label>
            <textarea
              value={comment}
              onChange={(e) => setComment(e.target.value)}
              rows={2}
              placeholder="Без соусников, упаковать на 15..."
              className="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm outline-none transition focus:border-slate-400 focus:ring-2 focus:ring-slate-100 resize-none"
            />
          </div>

          <div className="grid grid-cols-3 gap-3 rounded-2xl bg-slate-950 p-4 text-white">
            <div><div className="text-sm text-slate-400">Итого моти</div><div className="text-2xl font-bold">{totalMoti} шт</div></div>
            <div><div className="text-sm text-slate-400">Упаковка</div><div className="text-2xl font-bold">{totalExtra} шт</div></div>
            <div><div className="text-sm text-slate-400">Сумма заказа</div><div className="text-2xl font-bold">{money(totalAmount)}</div></div>
          </div>

          <Button onClick={saveOrder} disabled={saving || items.length === 0 || !clientId} size="lg" className="w-full">
            {saving ? <><Spinner /> Сохранение...</> : (isEditMode ? 'Сохранить изменения' : 'Сохранить заказ')}
          </Button>
        </div>
      </Card>

      <div className="space-y-5 min-w-0">
        {client && <ClientCard client={client} point={point} legal={legal} points={points} history={history} loadingHistory={loadingHistory} onRepeat={repeatOrder} />}
        {!client && <Card className="p-8">
          <div className="text-center text-slate-500">
            <svg className="mx-auto mb-3 text-slate-300" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><path d="M20 8v6M23 11h-6"/></svg>
            <div className="text-sm">Выбери клиента слева,<br />чтобы увидеть карточку и историю заказов</div>
          </div>
        </Card>}
      </div>
    </div>}
  </>;
}

function QuickParseBlock({ value, onChange, onParse, loading, result, onClear }) {
  const parsedItems = result?.draft?.items || [];
  const motiItems = parsedItems.filter(i => i.type === 'moti');
  const extraItems = parsedItems.filter(i => i.type === 'extra');
  const itemCount = parsedItems.length || 0;
  const motiCount = motiItems.length;
  const extraCount = extraItems.length;
  const totalMotiQty = motiItems.reduce((sum, i) => sum + Number(i.qty || 0), 0);
  const totalExtraQty = extraItems.reduce((sum, i) => sum + Number(i.qty || 0), 0);
  const parseSummaryText = totalExtraQty > 0
    ? `${motiCount} вкусов, ${totalMotiQty} моти + упаковка ${totalExtraQty} шт`
    : `${motiCount || itemCount} позиций, ${totalMotiQty || 0} шт`;
  const hasUnresolved = !!(result && (
    (result.unresolved?.flavors?.length || 0) > 0 ||
    (result.unresolved?.extras?.length || 0) > 0
  ));
  const isCleanResult = !!(result && result.success && !result.needs_clarification && !hasUnresolved);
  const isPartialResult = !!(result && itemCount > 0 && hasUnresolved);
  const modelLabel = result?.ai_model_used === 'fallback_js'
    ? 'без ИИ'
    : result?.ai_model_used === 'openai/gpt-4.1-mini'
      ? 'GPT-4.1 mini'
      : result?.ai_model_used === 'anthropic/claude-haiku-4.5'
        ? 'Haiku 4.5'
        : result?.ai_model_used === 'anthropic/claude-sonnet-4.5'
          ? 'Sonnet 4.5'
          : result?.ai_model_used || '';

  return <div className="rounded-3xl border border-slate-200 bg-slate-50 p-4">
    <div className="mb-3 flex items-start justify-between gap-3">
      <div>
        <div className="text-sm font-semibold text-slate-900">Быстрый ввод из сообщения</div>
        <div className="mt-1 text-xs text-slate-500">Вставь заказ как прислал клиент. Форма заполнится автоматически, но перед сохранением всё равно проверь.</div>
      </div>
      {modelLabel && <span className="rounded-full bg-white px-3 py-1 text-xs font-medium text-slate-500 border border-slate-200">{modelLabel}</span>}
    </div>

    <textarea
      value={value}
      onChange={(e) => onChange(e.target.value)}
      rows={5}
      placeholder={`Например:\nДао\nБанан нутелла\nСникерс\nТвикс\nПо 15`}
      className="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm outline-none transition focus:border-slate-400 focus:ring-2 focus:ring-slate-100 resize-y"
    />

    <div className="mt-3 flex flex-wrap items-center gap-2">
      <Button onClick={onParse} disabled={loading || !value.trim()} variant="dark">
        {loading ? <><Spinner /> Разбираю...</> : 'Разобрать и заполнить'}
      </Button>
      <Button onClick={onClear} disabled={loading || (!value && !result)} variant="light">Очистить</Button>
      <div className="text-xs text-slate-500">Сложные заказы “как обычно” и несколько точек лучше вносить руками.</div>
    </div>

    {result && <div className={`mt-3 rounded-2xl border p-3 text-sm ${
      result.is_assortment ? 'border-blue-200 bg-blue-50 text-blue-900' :
      isCleanResult ? 'border-emerald-200 bg-emerald-50 text-emerald-900' :
      'border-amber-200 bg-amber-50 text-amber-900'
    }`}>
      <div className="font-semibold">
        {result.is_assortment
          ? `Ассорти-заказ: ${result.assortment_note || 'добавь вкусы вручную'}`
          : isCleanResult
            ? `Разбор готов: ${parseSummaryText}`
            : isPartialResult
              ? `Частично разобрано: ${parseSummaryText}. Проверь ниже.`
              : (result.message || 'Нужно проверить вручную')}
      </div>

      {result.is_assortment && <div className="mt-2 text-xs">
        Клиент и адрес подставлены если найдены в тексте. Вкусы добавь вручную.
      </div>}

      {!result.is_assortment && result.warnings?.length > 0 && <div className="mt-2 space-y-1">
        {result.warnings.map((w, i) => <div key={i}>• {w.message}</div>)}
      </div>}

      {!result.is_assortment && (result.unresolved?.flavors?.length > 0 || result.unresolved?.extras?.length > 0) && <div className="mt-2 text-xs">
        Не найдено: {[...(result.unresolved.flavors || []), ...(result.unresolved.extras || [])].map(x => x.raw_text).join(', ')}
      </div>}
    </div>}
  </div>;
}

function FlavorLine({ flavor, item, priceInfo, draftPrice, hidden, onHide, onPriceChange, onQtyChange }) {
  const displayPrice = item ? item.price : (draftPrice ?? priceInfo.price);
  const displayQty = item ? item.qty : '';
  const currentSource = item ? item.source : priceInfo.source;
  const hasQty = item && Number(item.qty || 0) > 0;
  const isManual = item && Number(item.price) !== Number(priceInfo.price);
  const sourceText = {
    point_override: 'точка',
    legal_override: 'юрлицо',
    client_override: 'клиент',
    manual: 'ручная',
    flavor_default: '',
    extra_default: '',
  }[isManual ? 'manual' : currentSource] || '';

  return <div className={`group relative grid grid-cols-[minmax(0,1fr)_62px_62px] items-center gap-2 rounded-xl border py-1 pl-2 pr-9 transition ${hasQty ? 'border-emerald-300 bg-emerald-50' : 'border-transparent hover:bg-slate-50'}`}>
    <div className="min-w-0">
      <div className={`${hasQty ? 'font-semibold text-slate-950' : 'font-medium text-slate-900'} text-sm leading-tight`} title={flavor.name}>{flavor.name}</div>
      {(sourceText || (hidden && item)) && <div className="mt-0.5 flex flex-wrap gap-1 text-[10px] leading-none">
        {sourceText && <span className={`rounded-full px-1.5 py-0.5 font-medium ${isManual ? 'bg-amber-100 text-amber-800' : 'bg-emerald-100 text-emerald-700'}`}>{sourceText}</span>}
        {hidden && item && <span className="rounded-full bg-slate-100 px-1.5 py-0.5 font-medium text-slate-500">скрытый</span>}
      </div>}
    </div>

    <input
      value={displayPrice ?? ''}
      onChange={(e) => onPriceChange(flavor.flavor_id, e.target.value)}
      inputMode="numeric"
      className={`h-9 w-full rounded-lg border bg-white px-2 text-right text-sm font-semibold outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-100 ${hasQty ? 'border-emerald-200' : 'border-slate-200'}`}
      title="Цена"
    />

    <input
      value={displayQty}
      onChange={(e) => onQtyChange(flavor.flavor_id, e.target.value, draftPrice)}
      placeholder=""
      inputMode="numeric"
      className={`h-9 w-full rounded-lg border bg-white px-2 text-right text-sm font-semibold outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-100 ${hasQty ? 'border-emerald-300 text-emerald-900' : 'border-slate-200'}`}
      title="Количество"
    />

    <button
      type="button"
      onClick={() => onHide(flavor.flavor_id)}
      disabled={!!item}
      className={`absolute right-1 top-1/2 h-7 w-7 -translate-y-1/2 rounded-lg text-sm transition ${item ? 'pointer-events-none text-transparent' : 'text-slate-300 hover:bg-slate-100 hover:text-slate-700 group-hover:text-slate-500'}`}
      title={item ? '' : 'Скрыть вкус'}
    >
      ×
    </button>
  </div>;
}

function AddItemBlock({ flavors, extras, items, calcPrice, priceContextKey, onSetMotiQuantity, onSetMotiPrice, onAddExtra }) {
  const [tab, setTab] = useState('moti');
  const [selectedExtra, setSelectedExtra] = useState('');
  const [extraQty, setExtraQty] = useState('');
  const [draftPrices, setDraftPrices] = useState({});
  const [hiddenFlavorIds, setHiddenFlavorIds] = useState(() => {
    try {
      const raw = localStorage.getItem('omoti_hidden_flavor_ids');
      const parsed = raw ? JSON.parse(raw) : [];
      return Array.isArray(parsed) ? parsed : [];
    } catch (e) {
      return [];
    }
  });
  const [showHiddenFlavors, setShowHiddenFlavors] = useState(false);

  useEffect(() => {
    setDraftPrices({});
  }, [priceContextKey]);

  useEffect(() => {
    try {
      localStorage.setItem('omoti_hidden_flavor_ids', JSON.stringify(hiddenFlavorIds));
    } catch (e) {}
  }, [hiddenFlavorIds]);

  const motiByFlavorId = useMemo(() => {
    const map = {};
    (items || []).forEach(it => {
      if (it.type === 'moti') map[it.ref_id] = it;
    });
    return map;
  }, [items]);

  const activeFlavors = useMemo(
    () => flavors
      .filter(f => isCatalogActive(f))
      .sort((a, b) => getFlavorOrderIndex(a.name) - getFlavorOrderIndex(b.name)),
    [flavors]
  );

  const hiddenSet = useMemo(() => new Set(hiddenFlavorIds), [hiddenFlavorIds]);

  const visibleFlavors = useMemo(() => activeFlavors.filter(f => {
    if (motiByFlavorId[f.flavor_id]) return true;
    return !hiddenSet.has(f.flavor_id);
  }), [activeFlavors, hiddenSet, motiByFlavorId]);

  const hiddenFlavors = useMemo(() => activeFlavors.filter(f => {
    if (motiByFlavorId[f.flavor_id]) return false;
    return hiddenSet.has(f.flavor_id);
  }), [activeFlavors, hiddenSet, motiByFlavorId]);

  const hideFlavor = (flavorId) => {
    setHiddenFlavorIds(prev => prev.includes(flavorId) ? prev : [...prev, flavorId]);
  };

  const showFlavor = (flavorId) => {
    setHiddenFlavorIds(prev => prev.filter(id => id !== flavorId));
  };

  const handlePriceChange = useCallback((flavorId, value) => {
    setDraftPrices(prev => ({ ...prev, [flavorId]: value }));
    onSetMotiPrice(flavorId, value);
  }, [onSetMotiPrice]);

  const submitExtra = () => {
    onAddExtra(selectedExtra, extraQty);
    setSelectedExtra(''); setExtraQty('');
  };

  return <div className="rounded-3xl border border-slate-100 bg-white p-4">
    <div className="mb-3 flex items-center justify-between gap-3">
      <div className="flex gap-2 rounded-2xl bg-slate-100 p-1 w-fit">
        <button onClick={() => setTab('moti')} className={`rounded-xl px-4 py-1.5 text-sm transition ${tab === 'moti' ? 'bg-white shadow-sm font-medium' : 'text-slate-500'}`}>Моти</button>
        <button onClick={() => setTab('extra')} className={`rounded-xl px-4 py-1.5 text-sm transition ${tab === 'extra' ? 'bg-white shadow-sm font-medium' : 'text-slate-500'}`}>Упаковка</button>
      </div>
      {tab === 'moti' && <div className="text-xs text-slate-500">Цена и количество вводятся сразу. Пустое количество = не добавлять.</div>}
    </div>

    {tab === 'moti' && <div className="space-y-3">
      <div className="flex flex-wrap items-center justify-between gap-2 rounded-2xl bg-slate-50 px-3 py-2 text-xs text-slate-500">
        <div>Первое поле — цена, второе — количество. Пустое количество = не добавлять.</div>
        {hiddenFlavors.length > 0 && <button
          type="button"
          onClick={() => setShowHiddenFlavors(v => !v)}
          className="rounded-xl bg-white px-3 py-1 font-medium text-slate-700 border border-slate-200 hover:bg-slate-100"
        >
          {showHiddenFlavors ? 'Скрыть список' : `Скрытые вкусы (${hiddenFlavors.length})`}
        </button>}
      </div>

      {showHiddenFlavors && hiddenFlavors.length > 0 && <div className="rounded-2xl border border-slate-200 bg-white p-3">
        <div className="mb-2 text-xs font-medium uppercase tracking-wide text-slate-400">Скрытые вкусы</div>
        <div className="flex flex-wrap gap-2">
          {hiddenFlavors.map(flavor => <button
            key={flavor.flavor_id}
            type="button"
            onClick={() => showFlavor(flavor.flavor_id)}
            className="rounded-full border border-slate-200 bg-slate-50 px-3 py-1.5 text-xs text-slate-700 hover:bg-slate-100"
          >
            {flavor.name} · вернуть
          </button>)}
        </div>
      </div>}

      <div className="grid grid-cols-1 xl:grid-cols-2 gap-x-8 gap-y-1">
        {visibleFlavors.map(flavor => {
          const item = motiByFlavorId[flavor.flavor_id];
          const priceInfo = calcPrice('moti', flavor.flavor_id);
          return <FlavorLine
            key={flavor.flavor_id}
            flavor={flavor}
            item={item}
            priceInfo={priceInfo}
            draftPrice={draftPrices[flavor.flavor_id]}
            hidden={hiddenSet.has(flavor.flavor_id)}
            onHide={hideFlavor}
            onPriceChange={handlePriceChange}
            onQtyChange={onSetMotiQuantity}
          />;
        })}
      </div>
    </div>}

}

// ===== Сегодня / завтра =====

function InWorkPage({ clients, points, legals, flavors, extras, priceOverrides, showToast, onEditOrder, markOrdersChanged, ordersRefreshKey }) {
  const initialInworkCache = getPageCache('inwork_all');
  const [orders, setOrders] = useState(() => filterDeletedOrdersForUi(initialInworkCache || []));
  const [loading, setLoading] = useState(() => !initialInworkCache);
  const [expandedId, setExpandedId] = useState(null);
  const [expandedItems, setExpandedItems] = useState(() => initialInworkCache ? itemsMapFromOrders(initialInworkCache) : {});
  const [statusFilter, setStatusFilter] = useState(''); // '', 'new', 'assembled'

  const load = async (force = false) => {
    const cacheKey = 'inwork_all';
    const cached = getPageCache(cacheKey);
    if (!force && cached) {
      setOrders(cached);
      setExpandedItems(prev => ({ ...prev, ...itemsMapFromOrders(cached) }));
      setLoading(false);
      if (isPageCacheFresh(cacheKey)) return;
    } else {
      setLoading(true);
    }
    try {
      let all = [];
      try {
        const res = await api('getInWorkWithItems', { limit: 500 });
        all = res.orders || [];
      } catch (fastErr) {
        // Старый режим, если новый метод в Apps Script ещё не добавлен.
        const [resNew, resAssembled] = await Promise.all([
          api('listOrders', { status: 'new', limit: 500 }),
          api('listOrders', { status: 'assembled', limit: 500 }),
        ]);
        all = [...(resNew.orders || []), ...(resAssembled.orders || [])];
      }
      all = filterDeletedOrdersForUi(all);
      setOrders(all);
      setExpandedItems(prev => ({ ...prev, ...itemsMapFromOrders(all) }));
      setPageCache(cacheKey, all);
    } catch (err) {
      showToast('Ошибка: ' + err.message, 'error');
    }
    setLoading(false);
  };

  useEffect(() => { load(); }, []);

  useEffect(() => {
    if (ordersRefreshKey > 0) load(true);
  }, [ordersRefreshKey]);

  const clientById = useMemo(() => { const m = {}; clients.forEach(c => { m[c.client_id] = c; }); return m; }, [clients]);
  const pointById = useMemo(() => { const m = {}; points.forEach(p => { m[p.point_id] = p; }); return m; }, [points]);
  const legalById = useMemo(() => { const m = {}; (legals || []).forEach(l => { m[l.legal_id] = l; }); return m; }, [legals]);

  // фильтр по статусу
  const filteredOrders = useMemo(() => {
    if (!statusFilter) return orders;
    return orders.filter(o => o.status === statusFilter);
  }, [orders, statusFilter]);

  // группировка по дате доставки + просрочка
  const groups = useMemo(() => {
    const todayStr = today();
    const tomorrowStr = tomorrow();

    const overdue = [];
    const todayList = [];
    const tomorrowList = [];
    const later = [];
    const noDate = [];

    filteredOrders.forEach(o => {
      const dDate = dateOnly(o.delivery_date);

      // Просрочено = дата доставки уже прошла, а заказ ещё не отгружен.
      // Старые заказы без даты не красим, чтобы не засорять просрочку.
      if (dDate && dDate < todayStr) {
        overdue.push(o);
        return;
      }

      if (!dDate) noDate.push(o);
      else if (dDate === todayStr) todayList.push(o);
      else if (dDate === tomorrowStr) tomorrowList.push(o);
      else later.push(o);
    });

    // сортировка внутри: по дате доставки, потом по статусу (new раньше assembled)
    const statusRank = { new: 0, assembled: 1 };
    const sortFn = (a, b) => {
      const d = dateOnly(a.delivery_date).localeCompare(dateOnly(b.delivery_date));
      if (d !== 0) return d;
      return (statusRank[a.status] ?? 99) - (statusRank[b.status] ?? 99);
    };
    overdue.sort(sortFn); todayList.sort(sortFn); tomorrowList.sort(sortFn);
    later.sort(sortFn); noDate.sort(sortFn);

    return [
      { key: 'overdue', label: 'Просрочено', subtitle: 'дата доставки уже прошла, заказ не отгружен', orders: overdue, color: 'red' },
      { key: 'today', label: 'Сегодня', subtitle: displayDate(todayStr), orders: todayList, color: 'blue' },
      { key: 'tomorrow', label: 'Завтра', subtitle: displayDate(tomorrowStr), orders: tomorrowList, color: 'amber' },
      { key: 'later', label: 'Позже', subtitle: 'будущие даты', orders: later, color: 'slate' },
      { key: 'nodate', label: 'Без даты', subtitle: 'дата доставки не задана', orders: noDate, color: 'slate' },
    ].filter(g => g.orders.length > 0);
  }, [filteredOrders]);

  const totalCount = filteredOrders.length;
  const totalAmount = filteredOrders.reduce((s, o) => s + Number(o.total_amount || 0), 0);

  const toggleExpand = async (orderId) => {
    if (expandedId === orderId) { setExpandedId(null); return; }
    setExpandedId(orderId);
    if (!expandedItems[orderId]) {
      try {
        const res = await api('getOrder', { order_id: orderId });
        setExpandedItems(prev => ({ ...prev, [orderId]: res.items }));
      } catch (err) {
        showToast('Ошибка загрузки: ' + err.message, 'error');
      }
    }
  };

  const updateStatus = async (orderId, newStatus) => {
    const order = orders.find(o => o.order_id === orderId);
    const updates = { status: newStatus };

    // Если возвращаем старый заказ в работу, старая дата доставки оставит его в «Просрочено».
    // Поэтому предлагаем сразу поставить сегодняшнюю дату.
    if ((newStatus === 'new' || newStatus === 'assembled') && order) {
      const oldDeliveryDate = dateOnly(order.delivery_date);
      const todayStr = today();
      if (oldDeliveryDate && oldDeliveryDate < todayStr) {
        const ok = confirm(`У заказа ${order.order_no || ''} старая дата доставки ${displayDate(oldDeliveryDate)}.\nПоставить дату доставки на сегодня ${displayDate(todayStr)}?`);
        if (ok) updates.delivery_date = todayStr;
      }
    }

    // оптимистично
    setOrders(prev => prev.map(o => o.order_id === orderId ? { ...o, ...updates } : o));
    try {
      await api('updateOrder', { order_id: orderId, updates });
      clearPageCache('inwork');
      clearPageCache('history');
      showToast('Статус обновлён');
      // если стал shipped/cancelled — убираем из списка
      if (newStatus === 'shipped' || newStatus === 'cancelled') {
        setOrders(prev => prev.filter(o => o.order_id !== orderId));
      }
    } catch (err) {
      showToast('Ошибка: ' + err.message, 'error');
      load(true);
    }
  };

  const deleteOrder = async (order) => {
    const client = clientById[order.client_id];
    const hasDocs = !!(order.invoice_id || order.invoice_number || order.invoice_url || order.waybill_id || order.waybill_number || order.waybill_url);

    if (hasDocs) {
      showToast('У заказа есть документы Эльбы. Полное удаление запрещено.', 'error');
      return;
    }

    if (!confirm(`Полностью удалить тестовый заказ ${order.order_no} (${client?.name || order.client_id})?\n\nОн исчезнет из листов Заказы и Позиции. Это действие нельзя отменить.`)) return;

    const typed = window.prompt('Для подтверждения введи: УДАЛИТЬ');
    if (typed !== 'УДАЛИТЬ') {
      showToast('Удаление отменено', 'warn');
      return;
    }

    try {
      await api('deleteOrderPermanent', {
        order_id: order.order_id,
        confirm: true,
        reason: 'test order cleanup',
        deleted_by: CURRENT_USER,
      });
      clearPageCache('inwork');
      clearPageCache('history');
      clearPageCache('assembly');
      setOrders(prev => prev.filter(o => o.order_id !== order.order_id));
      showToast(`Заказ ${order.order_no} полностью удалён`);
    } catch (err) {
      showToast('Ошибка удаления: ' + err.message, 'error');
      load(true);
    }
  };

  const applyElbaResult = (orderId, res) => {
    const updates = {
      documents_status: res.documents_status || 'full',
      waybill_id: res.waybill_id || '',
      waybill_number: res.waybill_number || '',
      waybill_url: res.waybill_url || '',
      invoice_id: res.invoice_id || '',
      invoice_number: res.invoice_number || '',
      invoice_url: res.invoice_url || '',
      documents_error: res.link_error || '',
      documents_created_at: new Date().toISOString(),
    };
    setOrders(prev => prev.map(o => o.order_id === orderId ? { ...o, ...updates } : o));
  };

  return <>
    <header className="flex items-center justify-between rounded-3xl bg-white p-5 shadow-sm">
      <div>
        <h1 className="text-2xl font-semibold tracking-tight">В работе</h1>
        <p className="mt-1 text-sm text-slate-500">
          {totalCount > 0 ? <>{totalCount} заказов · {money(totalAmount)}</> : 'Заказов в работе нет'}
        </p>
      </div>
      <div className="flex items-center gap-2">
        <Button variant="light" onClick={() => load(true)} disabled={loading}>
          {loading ? <><Spinner small /> Обновляю...</> : '↻ Обновить'}
        </Button>
        <div className="flex gap-1 rounded-2xl bg-slate-100 p-1">
          {[['', 'Все'], ['new', 'Новые'], ['assembled', 'Собранные']].map(([k, l]) => (
            <button key={k} onClick={() => setStatusFilter(k)} className={`rounded-xl px-4 py-2 text-sm transition ${statusFilter === k ? 'bg-white shadow-sm font-medium' : 'text-slate-500'}`}>{l}</button>
          ))}
        </div>
      </div>
    </header>

    {loading && <div className="text-center py-12"><Spinner /></div>}

    {!loading && totalCount === 0 && <Card className="p-12 text-center text-slate-500">
      Заказов в работе нет. Молодцы 🎉
    </Card>}

    {!loading && groups.map(group => (
      <Card key={group.key} className={`p-5 ${group.key === 'overdue' ? 'ring-2 ring-red-200' : ''}`}>
        <div className="flex items-center justify-between mb-4">
          <div>
            <div className="flex items-center gap-2">
              <h2 className={`text-lg font-semibold ${group.key === 'overdue' ? 'text-red-700' : ''}`}>{group.label}</h2>
              <Pill color={group.color}>{group.orders.length}</Pill>
            </div>
            <p className="text-xs text-slate-500 mt-0.5">{group.subtitle}</p>
          </div>
          <div className="text-sm font-semibold">{money(group.orders.reduce((s, o) => s + Number(o.total_amount || 0), 0))}</div>
        </div>

        <div className="space-y-2">
          {group.orders.map(o => (
            <InWorkOrderRow
              key={o.order_id}
              order={o}
              client={clientById[o.client_id]}
              point={pointById[o.point_id]}
              legal={legalById[o.legal_id]}
              expanded={expandedId === o.order_id}
              items={expandedItems[o.order_id]}
              onToggle={() => toggleExpand(o.order_id)}
              onChangeStatus={updateStatus}
              onEdit={() => onEditOrder({ ...o, items: expandedItems[o.order_id] || o.items || [] })}
              onDelete={() => deleteOrder(o)}
              onDocumentsCreated={applyElbaResult}
              showToast={showToast}
              isOverdue={group.key === 'overdue'}
            />
          ))}
        </div>
      </Card>
    ))}
  </>;
}
