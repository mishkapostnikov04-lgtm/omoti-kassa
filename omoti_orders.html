function ElbaDocumentsBlock({ order, client, point, legal, onCreated, showToast }) {
  const [creating, setCreating] = useState(false);

  const hasDocs = !!(order.invoice_id || order.waybill_id || order.invoice_url || order.waybill_url);
  const status = order.documents_status || (hasDocs ? 'full' : '');
  const statusMap = {
    full: ['Документы созданы', 'green'],
    waybill_only: ['Создана только ТН', 'amber'],
    invoice_only: ['Создан только счёт', 'amber'],
    error: ['Ошибка документов', 'red'],
  };
  const [statusLabel, statusColor] = statusMap[status] || ['Не созданы', 'slate'];

  const handleCreate = async () => {
    if (creating) return;

    const force = hasDocs;
    if (force) {
      const ok = confirm(`У заказа ${order.order_no || ''} уже есть документы.\n\nСоздать новый счёт и новую накладную повторно?`);
      if (!ok) return;
    }

    setCreating(true);
    try {
      const res = await api('elbaCreateDocuments', {
        order_id: order.order_id,
        force,
      });

      onCreated(order.order_id, res);
      clearPageCache('inwork');
      clearPageCache('history');

      const invoiceText = res.invoice_number ? `Счёт №${res.invoice_number}` : 'Счёт';
      showToast(`${invoiceText} и накладная созданы`);
    } catch (err) {
      showToast('Ошибка Эльбы: ' + err.message, 'error');
    }
    setCreating(false);
  };

  const copyTextToClipboard = async (text) => {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(text);
      return;
    }

    const textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.setAttribute('readonly', '');
    textarea.style.position = 'fixed';
    textarea.style.left = '-9999px';
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    document.body.removeChild(textarea);
  };

  const handleCopyInvoice = async () => {
    if (!order.invoice_url) {
      showToast('Ссылка на счёт не найдена', 'warn');
      return;
    }

    const clientName = client?.name || order.client_name || order.client_id || 'Оптовик';
    const legalName = legal?.legal_name || order.legal_name || '';
    const pointAddress = point?.address || order.point_address || '';
    const invoiceNumber = order.invoice_number ? `№${order.invoice_number}` : 'без номера';
    const invoiceDate = displayDate(order.invoice_date || order.documents_created_at || order.created_at || today());

    const text = [
      clientName,
      legalName ? `Юрлицо: ${legalName}` : '',
      pointAddress ? `Адрес: ${pointAddress}` : '',
      '',
      `Счёт ${invoiceNumber} от ${invoiceDate}`,
      `Сумма: ${money(order.total_amount)}`,
      '',
      'Ссылка на оплату:',
      order.invoice_url,
    ].filter(line => line !== '').join('\n');

    try {
      await copyTextToClipboard(text);
      showToast('Сообщение со счётом скопировано');
    } catch (err) {
      showToast('Не удалось скопировать: ' + err.message, 'error');
    }
  };

  const handlePrintWaybill = () => {
    if (!order.waybill_url) {
      showToast('Ссылка на ТН не найдена', 'warn');
      return;
    }
    window.open(order.waybill_url, '_blank', 'noopener,noreferrer');
  };

  return <div className="rounded-2xl border border-slate-200 bg-white p-4">
    <div className="mb-3 flex items-start justify-between gap-3">
      <div>
        <h4 className="font-semibold text-sm text-slate-700">Документы Эльбы</h4>
        <div className="mt-1 flex flex-wrap items-center gap-2">
          <Pill color={statusColor}>{statusLabel}</Pill>
          {order.invoice_number && <span className="text-xs text-slate-500">Счёт №{order.invoice_number}</span>}
          {order.waybill_number && <span className="text-xs text-slate-500">ТН №{order.waybill_number}</span>}
        </div>
      </div>
      <Button onClick={handleCreate} variant={hasDocs ? 'light' : 'success'} size="sm" disabled={creating}>
        {creating ? <><Spinner small /> Создаю...</> : (hasDocs ? 'Создать повторно' : 'Создать документы')}
      </Button>
    </div>

    <div className="space-y-2 text-xs text-slate-600">
      <div className="flex flex-wrap gap-2">
        {order.invoice_url && <button
          type="button"
          onClick={handleCopyInvoice}
          className="inline-flex rounded-xl bg-slate-950 px-3 py-2 font-medium text-white hover:bg-slate-800"
        >
          Скопировать счёт
        </button>}

        {order.waybill_url && <button
          type="button"
          onClick={handlePrintWaybill}
          className="inline-flex rounded-xl bg-white px-3 py-2 font-medium text-slate-900 border border-slate-200 hover:bg-slate-50"
        >
          Распечатать ТН
        </button>}
      </div>

      {order.waybill_number && !order.waybill_url && <div>
        <span className="text-slate-400">ТН:</span> №{order.waybill_number} создана. Ссылку можно открыть в Эльбе.
      </div>}

      {order.documents_created_at && <div>
        <span className="text-slate-400">Создано:</span> {displayDate(order.documents_created_at)}
      </div>}

      {order.documents_error && <div className="rounded-xl bg-red-50 px-3 py-2 text-red-700">
        {order.documents_error}
      </div>}
    </div>
  </div>;
}


// ===== Сборка / печать =====

function AssemblyPage({ clients, points, showToast, onEditOrder, markOrdersChanged, ordersRefreshKey }) {
  const initialCache = getPageCache('assembly_new');
  const [orders, setOrders] = useState(() => filterDeletedOrdersForUi(initialCache || []));
  const [loading, setLoading] = useState(() => !initialCache);
  const [selectedIds, setSelectedIds] = useState(() => new Set());
  const [dateFilter, setDateFilter] = useState('all'); // all / today / tomorrow / overdue / later

  const clientById = useMemo(() => { const m = {}; clients.forEach(c => { m[c.client_id] = c; }); return m; }, [clients]);
  const pointById = useMemo(() => { const m = {}; points.forEach(p => { m[p.point_id] = p; }); return m; }, [points]);

  const load = async (force = false) => {
    const cacheKey = 'assembly_new';
    const cached = getPageCache(cacheKey);
    if (!force && cached) {
      setOrders(cached);
      setLoading(false);
      if (isPageCacheFresh(cacheKey)) return;
    } else {
      setLoading(true);
    }
    try {
      let all = [];
      try {
        const res = await api('getInWorkWithItems', { limit: 500 });
        all = res.orders || [];
      } catch (fastErr) {
        const res = await api('listOrders', { status: 'new', limit: 500 });
        const headers = res.orders || [];
        all = await Promise.all(headers.map(async (o) => {
          try {
            const full = await api('getOrder', { order_id: o.order_id });
            return { ...o, items: full.items || [] };
          } catch (e) {
            return { ...o, items: [] };
          }
        }));
      }
      all = filterDeletedOrdersForUi(all);
      const newOrders = all
        .filter(o => o.status === 'new')
        .sort((a, b) => {
          const d = dateOnly(a.delivery_date).localeCompare(dateOnly(b.delivery_date));
          if (d !== 0) return d;
          return String(a.order_no || '').localeCompare(String(b.order_no || ''));
        });
      setOrders(newOrders);
      setPageCache(cacheKey, newOrders);
      setSelectedIds(prev => {
        const valid = new Set(newOrders.map(o => o.order_id));
        return new Set([...prev].filter(id => valid.has(id)));
      });
    } catch (err) {
      showToast('Ошибка загрузки сборки: ' + err.message, 'error');
    }
    setLoading(false);
  };

  useEffect(() => { load(); }, []);

  useEffect(() => {
    if (ordersRefreshKey > 0) load(true);
  }, [ordersRefreshKey]);

  const filteredOrders = useMemo(() => {
    const t = today();
    const tm = tomorrow();
    return orders.filter(o => {
      const d = dateOnly(o.delivery_date);
      if (dateFilter === 'today') return d === t;
      if (dateFilter === 'tomorrow') return d === tm;
      if (dateFilter === 'overdue') return d && d < t;
      if (dateFilter === 'later') return d && d > tm;
      return true;
    });
  }, [orders, dateFilter]);

  const selectedVisible = filteredOrders.filter(o => selectedIds.has(o.order_id));
  const printOrders = selectedVisible.length ? selectedVisible : filteredOrders;
  const totalMoti = filteredOrders.reduce((s, o) => s + Number(o.total_qty_moti || 0), 0);
  const printMoti = printOrders.reduce((s, o) => s + Number(o.total_qty_moti || 0), 0);

  const toggleSelected = (orderId) => {
    setSelectedIds(prev => {
      const next = new Set(prev);
      if (next.has(orderId)) next.delete(orderId);
      else next.add(orderId);
      return next;
    });
  };

  const selectAllVisible = () => setSelectedIds(new Set(filteredOrders.map(o => o.order_id)));
  const clearSelection = () => setSelectedIds(new Set());

  const markAssembled = async (order) => {
    try {
      await api('updateOrder', { order_id: order.order_id, updates: { status: 'assembled' } });
      clearPageCache('assembly');
      clearPageCache('inwork');
      clearPageCache('history');
      setOrders(prev => prev.filter(o => o.order_id !== order.order_id));
      setSelectedIds(prev => { const next = new Set(prev); next.delete(order.order_id); return next; });
      showToast(`Заказ ${order.order_no} отмечен как собран`);
    } catch (err) {
      showToast('Ошибка: ' + err.message, 'error');
    }
  };

  const printAssembly = () => {
    if (printOrders.length === 0) {
      showToast('Нет заказов для печати', 'warn');
      return;
    }
    setTimeout(() => window.print(), 50);
  };

  return <>
    <header className="screen-only flex items-center justify-between rounded-3xl bg-white p-5 shadow-sm">
      <div>
        <h1 className="text-2xl font-semibold tracking-tight">Сборка / печать</h1>
        <p className="mt-1 text-sm text-slate-500">
          Новые заказы для сборки. Собранные, отгруженные и отменённые сюда не попадают.
        </p>
      </div>
      <div className="flex gap-2">
        <Button variant="light" onClick={() => load(true)} disabled={loading}>
          {loading ? <><Spinner small /> Обновляю...</> : '↻ Обновить'}
        </Button>
        <Button onClick={printAssembly}>Распечатать A4</Button>
      </div>
    </header>

    <Card className="screen-only p-5">
      <div className="flex flex-wrap items-center justify-between gap-4">
        <div className="flex gap-2 rounded-2xl bg-slate-100 p-1">
          {[
            ['all', 'Все'],
            ['overdue', 'Просрочено'],
            ['today', 'Сегодня'],
            ['tomorrow', 'Завтра'],
            ['later', 'Позже'],
          ].map(([k, l]) => (
            <button key={k} onClick={() => setDateFilter(k)} className={`rounded-xl px-4 py-2 text-sm transition ${dateFilter === k ? 'bg-white shadow-sm font-medium' : 'text-slate-500'}`}>{l}</button>
          ))}
        </div>
        <div className="text-sm text-slate-500">
          {filteredOrders.length} заказов · {totalMoti} моти · к печати {printOrders.length} заказов / {printMoti} моти
        </div>
      </div>
      <div className="mt-4 flex flex-wrap items-center gap-2">
        <Button variant="light" size="sm" onClick={selectAllVisible}>Выбрать все видимые</Button>
        <Button variant="light" size="sm" onClick={clearSelection}>Снять выбор</Button>
        <div className="text-xs text-slate-500">Если ничего не отмечено, печатаются все видимые заказы.</div>
      </div>
    </Card>

    {loading && <div className="screen-only text-center py-12"><Spinner /></div>}

    {!loading && filteredOrders.length === 0 && <Card className="screen-only p-12 text-center text-slate-500">
      Заказов для сборки нет.
    </Card>}

    {!loading && filteredOrders.length > 0 && <div className="screen-only space-y-3">
      {filteredOrders.map(order => (
        <AssemblyOrderCard
          key={order.order_id}
          order={order}
          client={clientById[order.client_id]}
          point={pointById[order.point_id]}
          selected={selectedIds.has(order.order_id)}
          onSelect={() => toggleSelected(order.order_id)}
          onAssembled={() => markAssembled(order)}
          onEdit={() => onEditOrder(order)}
        />
      ))}
    </div>}

    <div className="print-area">
      <PrintAssemblySheet orders={printOrders} clientById={clientById} pointById={pointById} />
    </div>
  </>;
}

function AssemblyOrderCard({ order, client, point, selected, onSelect, onAssembled, onEdit }) {
  const motiItems = sortItemsForDisplay((order.items || []).filter(i => i.type === 'moti' && Number(i.qty) > 0));
  const extraItems = (order.items || []).filter(i => i.type === 'extra' && Number(i.qty) > 0);
  const isOverdue = dateOnly(order.delivery_date) && dateOnly(order.delivery_date) < today();
  return <Card className={`p-4 ${selected ? 'ring-2 ring-slate-400' : ''} ${isOverdue ? 'border border-red-200' : ''}`}>
    <div className="flex items-start gap-4">
      <input type="checkbox" checked={selected} onChange={onSelect} className="mt-1 h-5 w-5 rounded border-slate-300" />
      <div className="min-w-0 flex-1">
        <div className="flex flex-wrap items-center gap-2">
          <div className="font-semibold">{order.order_no}</div>
          <Pill color={isOverdue ? 'red' : 'blue'}>{displayDate(order.delivery_date) || 'без даты'}</Pill>
          <div className="text-sm font-medium truncate">{client?.name || order.client_id}</div>
        </div>
        <div className="mt-1 text-sm text-slate-500 truncate">{point?.address || 'Адрес не указан'}</div>
        {order.comment && <div className="mt-2 rounded-xl bg-amber-50 px-3 py-2 text-xs text-amber-900">{order.comment}</div>}
        <div className="mt-3 grid grid-cols-2 gap-3">
          <div>
            <div className="mb-1 text-xs font-medium uppercase tracking-wide text-slate-400">Моти</div>
            <div className="space-y-1">
              {motiItems.map((it, idx) => (
                <div key={it.item_id || idx} className="flex justify-between rounded-lg bg-slate-50 px-2 py-1 text-sm">
                  <span className="truncate">{it.name_snapshot}</span>
                  <span className="font-semibold">{it.qty}</span>
                </div>
              ))}
              {motiItems.length === 0 && <div className="text-sm text-slate-400">Позиции не найдены</div>}
            </div>
          </div>
          <div>
            <div className="mb-1 text-xs font-medium uppercase tracking-wide text-slate-400">Упаковка</div>
            {extraItems.length > 0 ? <div className="space-y-1">
              {extraItems.map((it, idx) => <div key={it.item_id || idx} className="flex justify-between rounded-lg bg-slate-50 px-2 py-1 text-sm"><span className="truncate">{it.name_snapshot}</span><span className="font-semibold">{it.qty}</span></div>)}
            </div> : <div className="text-sm text-slate-400">—</div>}
          </div>
        </div>
      </div>
      <div className="flex shrink-0 flex-col gap-2">
        <Button size="sm" variant="amber" onClick={onAssembled}>Собран</Button>
        <Button size="sm" variant="light" onClick={onEdit}>Редактировать</Button>
      </div>
    </div>
  </Card>;
}

function PrintAssemblySheet({ orders, clientById, pointById }) {
  const printedAt = new Date().toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  const totalMoti = (orders || []).reduce((s, o) => s + Number(o.total_qty_moti || 0), 0);

  const makePrintRows = (items) => {
    const rows = [];
    for (let i = 0; i < items.length; i += 2) {
      rows.push([items[i], items[i + 1] || null]);
    }
    return rows;
  };

  return <div>
    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 8 }}>
      <div>
        <div style={{ fontSize: 19, fontWeight: 700 }}>OMOTI · Лист сборки</div>
        <div className="print-muted" style={{ fontSize: 11 }}>Распечатано: {printedAt}</div>
      </div>
      <div style={{ textAlign: 'right', fontSize: 11 }}>
        <div><b>Заказов:</b> {orders.length}</div>
        <div><b>Моти:</b> {totalMoti} шт</div>
      </div>
    </div>

    {(orders || []).map(order => {
      const client = clientById[order.client_id];
      const point = pointById[order.point_id];
      const motiItems = sortItemsForDisplay((order.items || []).filter(i => i.type === 'moti' && Number(i.qty) > 0));
      const extraItems = (order.items || []).filter(i => i.type === 'extra' && Number(i.qty) > 0);
      const rows = makePrintRows(motiItems);
      const extraText = extraItems.length
        ? extraItems.map(it => `${it.name_snapshot} × ${it.qty}`).join('; ')
        : '';

      return <div key={order.order_id} className="print-card">
        <div style={{ display: 'grid', gridTemplateColumns: '1fr auto', gap: 8, marginBottom: 5 }}>
          <div>
            <div style={{ fontSize: 14, fontWeight: 700, lineHeight: 1.15 }}>{client?.name || order.client_id}</div>
            <div style={{ fontSize: 10.5 }}><b>Адрес:</b> {point?.address || '—'}</div>
            {order.comment && <div style={{ fontSize: 10.5, marginTop: 2 }}><b>Комм.:</b> {order.comment}</div>}
            {extraText && <div style={{ fontSize: 10.5, marginTop: 2 }}><b>Упаковка:</b> {extraText}</div>}
          </div>
          <div style={{ textAlign: 'right', minWidth: 96, fontSize: 10.5 }}>
            <div style={{ fontWeight: 700, fontSize: 13 }}>{order.order_no}</div>
            <div>доставка: {displayDate(order.delivery_date) || '—'}</div>
            <div>моти: <b>{order.total_qty_moti || 0} шт</b></div>
          </div>
        </div>

        <table className="print-table">
          <thead>
            <tr>
              <th>Вкус</th><th style={{ width: 40, textAlign: 'right' }}>Кол</th><th style={{ width: 54 }}>Отм.</th>
              <th>Вкус</th><th style={{ width: 40, textAlign: 'right' }}>Кол</th><th style={{ width: 54 }}>Отм.</th>
            </tr>
          </thead>
          <tbody>
            {rows.map((pair, idx) => <tr key={idx}>
              <td className="print-item-name">{pair[0]?.name_snapshot || ''}</td>
              <td style={{ textAlign: 'right', fontWeight: 700 }}>{pair[0]?.qty || ''}</td>
              <td></td>
              <td className="print-item-name">{pair[1]?.name_snapshot || ''}</td>
              <td style={{ textAlign: 'right', fontWeight: 700 }}>{pair[1]?.qty || ''}</td>
              <td></td>
            </tr>)}
            {motiItems.length === 0 && <tr><td colSpan="6">Позиции не найдены</td></tr>}
          </tbody>
        </table>
      </div>;
    })}
  </div>;
}

// ===== История =====

function HistoryPage({ clients, points, legals, flavors, extras, showToast, onEditOrder, markOrdersChanged, ordersRefreshKey }) {
  const savedFilters = readLocalJson('omoti_history_filters_v1', null);
  const [dateFrom, setDateFrom] = useState(() => savedFilters?.dateFrom || (() => { const d = new Date(); d.setDate(d.getDate() - 14); return d.toISOString().substring(0, 10); })());
  const [dateTo, setDateTo] = useState(() => savedFilters?.dateTo || today());
  const [filterClient, setFilterClient] = useState(() => savedFilters?.filterClient || '');
  const [filterStatus, setFilterStatus] = useState(() => savedFilters?.filterStatus || '');
  const initialHistoryCache = getPageCache(`history_${dateFrom}_${dateTo}_${filterClient || 'all'}_${filterStatus || 'all'}`);
  const [orders, setOrders] = useState(() => filterDeletedOrdersForUi(initialHistoryCache || []));
  const [loading, setLoading] = useState(() => !initialHistoryCache);
  const [expandedId, setExpandedId] = useState(null);
  const [expandedItems, setExpandedItems] = useState(() => initialHistoryCache ? itemsMapFromOrders(initialHistoryCache) : {});

  const load = async (force = false) => {
    const cacheKey = `history_${dateFrom}_${dateTo}_${filterClient || 'all'}_${filterStatus || 'all'}`;
    const cached = getPageCache(cacheKey);
    if (!force && cached) {
      setOrders(cached);
      setExpandedItems(prev => ({ ...prev, ...itemsMapFromOrders(cached) }));
      setLoading(false);
      if (isPageCacheFresh(cacheKey)) return;
    } else {
      setLoading(true);
    }
    try {
      let nextOrders = [];
      try {
        const res = await api('getHistoryWithItems', {
          delivery_from: dateFrom, delivery_to: dateTo,
          client_id: filterClient || undefined,
          status: filterStatus || undefined,
          limit: 200,
        });
        nextOrders = res.orders || [];
      } catch (fastErr) {
        const res = await api('listOrders', {
          delivery_from: dateFrom, delivery_to: dateTo,
          client_id: filterClient || undefined,
          status: filterStatus || undefined,
          limit: 200,
        });
        nextOrders = res.orders || [];
      }
      nextOrders = filterDeletedOrdersForUi(nextOrders);
      setOrders(nextOrders);
      setExpandedItems(prev => ({ ...prev, ...itemsMapFromOrders(nextOrders) }));
      setPageCache(cacheKey, nextOrders);
    } catch (err) {
      showToast('Ошибка: ' + err.message, 'error');
    }
    setLoading(false);
  };

  useEffect(() => {
    writeLocalJson('omoti_history_filters_v1', { dateFrom, dateTo, filterClient, filterStatus });
    load();
  }, [dateFrom, dateTo, filterClient, filterStatus]);

  useEffect(() => {
    if (ordersRefreshKey > 0) load(true);
  }, [ordersRefreshKey]);

  const clientById = useMemo(() => { const m = {}; clients.forEach(c => { m[c.client_id] = c; }); return m; }, [clients]);
  const pointById = useMemo(() => { const m = {}; points.forEach(p => { m[p.point_id] = p; }); return m; }, [points]);
  const legalById = useMemo(() => { const m = {}; (legals || []).forEach(l => { m[l.legal_id] = l; }); return m; }, [legals]);

  const toggleExpand = async (orderId) => {
    if (expandedId === orderId) { setExpandedId(null); return; }
    setExpandedId(orderId);
    if (!expandedItems[orderId]) {
      try {
        const res = await api('getOrder', { order_id: orderId });
        setExpandedItems(prev => ({ ...prev, [orderId]: res.items }));
      } catch (err) {
        showToast('Ошибка загрузки заказа: ' + err.message, 'error');
      }
    }
  };

  const updateStatus = async (orderId, newStatus) => {
    const order = orders.find(o => o.order_id === orderId);
    const updates = { status: newStatus };

    // Если возвращаем старый заказ в работу из истории, предлагаем сразу поставить сегодняшнюю дату.
    if ((newStatus === 'new' || newStatus === 'assembled') && order) {
      const oldDeliveryDate = dateOnly(order.delivery_date);
      const todayStr = today();
      if (oldDeliveryDate && oldDeliveryDate < todayStr) {
        const ok = confirm(`У заказа ${order.order_no || ''} старая дата доставки ${displayDate(oldDeliveryDate)}.\nПоставить дату доставки на сегодня ${displayDate(todayStr)}?`);
        if (ok) updates.delivery_date = todayStr;
      }
    }

    setOrders(prev => prev.map(o => o.order_id === orderId ? { ...o, ...updates } : o));
    try {
      await api('updateOrder', { order_id: orderId, updates });
      clearPageCache('history');
      clearPageCache('inwork');
      showToast('Статус обновлён');
    } catch (err) {
      showToast('Ошибка: ' + err.message, 'error');
    }
  };

  const deleteOrder = async (order) => {
    const client = clientById[order.client_id];
    const hasDocs = !!(order.invoice_id || order.invoice_number || order.invoice_url || order.waybill_id || order.waybill_number || order.waybill_url);

    if (hasDocs) {
      showToast('У заказа есть документы Эльбы. Полное удаление запрещено.', 'error');
      return;
    }

    if (!confirm(`Полностью удалить тестовый заказ ${order.order_no} (${client?.name || order.client_id})?\n\nОн исчезнет из листов Заказы и Позиции. Это действие нельзя отменить.`)) return;

    const typed = window.prompt('Для подтверждения введи: УДАЛИТЬ');
    if (typed !== 'УДАЛИТЬ') {
      showToast('Удаление отменено', 'warn');
      return;
    }

    try {
      await api('deleteOrderPermanent', {
        order_id: order.order_id,
        confirm: true,
        reason: 'test order cleanup',
        deleted_by: CURRENT_USER,
      });
      clearPageCache('history');
      clearPageCache('inwork');
      clearPageCache('assembly');
      setOrders(prev => prev.filter(o => o.order_id !== order.order_id));
      showToast(`Заказ ${order.order_no} полностью удалён`);
    } catch (err) {
      showToast('Ошибка удаления: ' + err.message, 'error');
      load(true);
    }
  };

  const applyElbaResult = (orderId, res) => {
    const updates = {
      documents_status: res.documents_status || 'full',
      waybill_id: res.waybill_id || '',
      waybill_number: res.waybill_number || '',
      waybill_url: res.waybill_url || '',
      invoice_id: res.invoice_id || '',
      invoice_number: res.invoice_number || '',
      invoice_url: res.invoice_url || '',
      documents_error: res.link_error || '',
      documents_created_at: new Date().toISOString(),
    };
    setOrders(prev => prev.map(o => o.order_id === orderId ? { ...o, ...updates } : o));
  };

  return <>
    <header className="flex items-center justify-between rounded-3xl bg-white p-5 shadow-sm">
      <div>
        <h1 className="text-2xl font-semibold tracking-tight">История заказов</h1>
        <p className="mt-1 text-sm text-slate-500">Все заказы за выбранный период · {orders.length} {orders.length === 1 ? 'заказ' : orders.length < 5 ? 'заказа' : 'заказов'}</p>
      </div>
    </header>

    <Card className="p-5">
      <div className="grid grid-cols-[1fr_1fr_2fr_1fr_auto] gap-4 mb-5">
        <div><Label>С</Label><Input type="date" value={dateFrom} onChange={setDateFrom} /></div>
        <div><Label>По</Label><Input type="date" value={dateTo} onChange={setDateTo} /></div>
        <div><Label>Клиент</Label><Combobox value={filterClient} onChange={setFilterClient}
          options={[{ value: '', label: 'Все клиенты' }, ...clients.map(c => ({ value: c.client_id, label: c.name }))]} placeholder="Все клиенты" /></div>
        <div><Label>Статус</Label><Combobox value={filterStatus} onChange={setFilterStatus}
          options={[{ value: '', label: 'Все' }, ...STATUS_OPTIONS]} placeholder="Все статусы" /></div>
        <div className="self-end"><Button onClick={() => load(true)} variant="light" disabled={loading}>
          {loading ? <><Spinner small /> Обновляю...</> : 'Обновить'}
        </Button></div>
      </div>

      {loading && <div className="text-center py-12"><Spinner /></div>}
      {!loading && orders.length === 0 && <div className="text-center py-12 text-slate-500">Заказов за этот период нет</div>}
      {!loading && orders.length > 0 && <div className="space-y-2">
        {orders.map(o => (
          <HistoryOrderRow key={o.order_id}
            order={o}
            client={clientById[o.client_id]}
            point={pointById[o.point_id]}
            legal={legalById[o.legal_id]}
            expanded={expandedId === o.order_id}
            items={expandedItems[o.order_id]}
            onToggle={() => toggleExpand(o.order_id)}
            onChangeStatus={updateStatus}
            onEdit={() => onEditOrder({ ...o, items: expandedItems[o.order_id] || o.items || [] })}
            onDelete={() => deleteOrder(o)}
            onDocumentsCreated={applyElbaResult}
            showToast={showToast}
          />
        ))}
      </div>}
    </Card>
  </>;
}

function StatusPill({ status }) {
  const map = {
    draft: ['Черновик', 'slate'],
    new: ['Новый', 'blue'],
    assembled: ['Собран', 'amber'],
    shipped: ['Отгружен', 'green'],
    cancelled: ['Отменён', 'red'],
  };
  const [label, color] = map[status] || [status, 'slate'];
  return <Pill color={color}>{label}</Pill>;
}

function ExportPage({ showToast }) {
  const [rows, setRows] = useState([]);
  const [columns, setColumns] = useState([]);
  const [selectedKeys, setSelectedKeys] = useState({});
  const [loading, setLoading] = useState(false);
  const [dateFrom, setDateFrom] = useState(today());
  const [dateTo, setDateTo] = useState(today());

  const rowKey = (row, index) => row.meta_order_id || row.order_id || `${index}_${row['L_Заказчик'] || ''}_${row['K_Примечание'] || ''}_${row['M_На какое число'] || ''}`;

  const load = async () => {
    setLoading(true);
    try {
      const res = await api('getOrdersForExport', { delivery_from: dateFrom, delivery_to: dateTo });
      const nextRows = res.rows || [];
      setRows(nextRows);
      setColumns(res.columns || []);
      const nextSelected = {};
      nextRows.forEach((row, index) => { nextSelected[rowKey(row, index)] = false; });
      setSelectedKeys(nextSelected);
    } catch (err) {
      showToast('Ошибка: ' + err.message, 'error');
    }
    setLoading(false);
  };

  useEffect(() => { load(); }, [dateFrom, dateTo]);

  const visibleColumns = columns.filter(c => !c.startsWith('meta_') && c !== 'AR_Стоимость');
  const selectedRows = rows.filter((row, index) => selectedKeys[rowKey(row, index)]);
  const allSelected = rows.length > 0 && selectedRows.length === rows.length;

  const toggleRow = (row, index) => {
    const key = rowKey(row, index);
    setSelectedKeys(prev => ({ ...prev, [key]: !prev[key] }));
  };

  const setAllRows = (checked) => {
    const next = {};
    rows.forEach((row, index) => { next[rowKey(row, index)] = checked; });
    setSelectedKeys(next);
  };

  const copyToClipboard = () => {
    if (selectedRows.length === 0) {
      showToast('Отметь хотя бы одну строку для экспорта', 'warn');
      return;
    }
    const lines = selectedRows.map(row => visibleColumns.map(c => row[c] ?? '').join('\t'));
    navigator.clipboard.writeText(lines.join('\n')).then(
      () => showToast(`Скопировано ${selectedRows.length} строк. Вставь в Excel в колонку I.`),
      () => showToast('Не удалось скопировать. Попробуй вручную.', 'error')
    );
  };

  return <>
    <header className="flex items-center justify-between rounded-3xl bg-white p-5 shadow-sm">
      <div>
        <h1 className="text-2xl font-semibold tracking-tight">Экспорт в Excel</h1>
        <p className="mt-1 text-sm text-slate-500">
          Строки под текущую вкладку «Заказы» · выбрано {selectedRows.length} из {rows.length}
        </p>
      </div>
      <Button onClick={copyToClipboard} disabled={selectedRows.length === 0} size="lg">
        Скопировать выбранные
      </Button>
    </header>

    <Card className="p-5">
      <div className="grid grid-cols-[1fr_1fr_auto] gap-4 mb-5">
        <div><Label>Доставка с</Label><Input type="date" value={dateFrom} onChange={setDateFrom} /></div>
        <div><Label>По</Label><Input type="date" value={dateTo} onChange={setDateTo} /></div>
        <div className="self-end"><Button onClick={load} variant="light">Обновить</Button></div>
      </div>

      <div className="rounded-2xl bg-amber-50 p-4 text-sm text-amber-900 mb-5">
        Колонки идут в порядке Excel: I, J, K, L, M, N..AO, AP, AR. AQ «Количество» пропущена — её считает формула.
        Галочки по умолчанию сняты. Отметь только нужные строки, скопируй и вставь в Excel начиная с пустой строки в колонку I.
      </div>

      {!loading && rows.length > 0 && <div className="mb-3 flex items-center justify-between gap-3">
        <label className="inline-flex items-center gap-2 text-sm text-slate-600 select-none">
          <input
            type="checkbox"
            checked={allSelected}
            onChange={(e) => setAllRows(e.target.checked)}
            className="h-4 w-4 rounded border-slate-300"
          />
          Выбрать все строки
        </label>
        <div className="text-sm text-slate-500">Копируется только то, что отмечено</div>
      </div>}

      {loading && <div className="text-center py-12"><Spinner /></div>}
      {!loading && rows.length === 0 && <div className="text-center py-12 text-slate-500">Заказов на эти даты нет</div>}
      {!loading && rows.length > 0 && <div className="overflow-x-auto rounded-2xl border border-slate-200">
        <table className="w-full text-left text-xs whitespace-nowrap">
          <thead className="bg-slate-50 text-slate-500">
            <tr>
              <th className="p-2 border-r border-slate-100 w-10 text-center">✓</th>
              {visibleColumns.map(c => <th key={c} className="p-2 border-r border-slate-100 last:border-r-0">{c.replace(/^[A-Z]+_/, '')}</th>)}
            </tr>
          </thead>
          <tbody>
            {rows.map((row, i) => {
              const key = rowKey(row, i);
              const checked = !!selectedKeys[key];
              return (
                <tr key={key} className={`border-t border-slate-100 ${checked ? 'bg-white' : 'bg-slate-50 text-slate-400'}`}>
                  <td className="p-2 border-r border-slate-100 text-center">
                    <input
                      type="checkbox"
                      checked={checked}
                      onChange={() => toggleRow(row, i)}
                      className="h-4 w-4 rounded border-slate-300"
                    />
                  </td>
                  {visibleColumns.map(c => <td key={c} className="p-2 border-r border-slate-100 last:border-r-0">{row[c] || ''}</td>)}
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>}
    </Card>
  </>;
}

// ===== Справочники =====

function CatalogPage({ clients, points, legals, flavors, extras, priceOverrides, reload, showToast }) {
  const [tab, setTab] = useState('clients');
  const [modalType, setModalType] = useState(null);
  const [modalData, setModalData] = useState({});
  const [search, setSearch] = useState('');
  const [refreshing, setRefreshing] = useState(false);

  const closeModal = () => { setModalType(null); setModalData({}); };

  const pointUpdates = (d) => ({
    address: d.address || '',
    label: d.label || '',
    working_hours: d.working_hours || '',
    contact_person: d.contact_person || '',
    delivery_comment: d.delivery_comment || '',
  });

  const legalUpdates = (d) => ({
    legal_name: d.legal_name || '',
    inn: String(d.inn || ''),
    kpp: d.kpp || '',
    has_contract: d.has_contract === true,
    needs_invoice: d.needs_invoice !== false,
    needs_waybill: d.needs_waybill !== false,
    payment_terms_days: Number(d.payment_terms_days || 0),
    documents_comment: d.documents_comment || '',
  });

  const clientUpdates = (d) => ({
    name: d.name || '',
    aliases: d.aliases || '',
    main_contact: d.main_contact || '',
    comment: d.comment || '',
  });

  const submitModal = async () => {
    try {
      if (modalType === 'client') await api('addClient', { ...modalData, created_by: CURRENT_USER });
      else if (modalType === 'edit_client') await api('updateRecord', {
        sheet: 'clients',
        id_field: 'client_id',
        id_value: modalData.client_id,
        updates: clientUpdates(modalData),
      });
      else if (modalType === 'point') await api('addPoint', { ...modalData, created_by: CURRENT_USER });
      else if (modalType === 'legal') await api('addLegal', { ...modalData, created_by: CURRENT_USER });
      else if (modalType === 'edit_point') await api('updateRecord', {
        sheet: 'points',
        id_field: 'point_id',
        id_value: modalData.point_id,
        updates: pointUpdates(modalData),
      });
      else if (modalType === 'edit_legal') await api('updateRecord', {
        sheet: 'legals',
        id_field: 'legal_id',
        id_value: modalData.legal_id,
        updates: legalUpdates(modalData),
      });
      else if (modalType === 'flavor') await api('addFlavor', { ...modalData, created_by: CURRENT_USER });
      else if (modalType === 'extra') await api('addExtra', { ...modalData, created_by: CURRENT_USER });
      showToast(modalType && modalType.startsWith('edit_') ? 'Сохранено' : 'Добавлено');
      closeModal();
      reload();
    } catch (err) {
      showToast('Ошибка: ' + err.message, 'error');
    }
  };

  const deactivate = async (sheet, id_field, id_value, name) => {
    if (!confirm(`Перевести "${name}" в архив? Запись не удалится из таблицы и истории.`)) return;
    try {
      await api('deactivateRecord', { sheet, id_field, id_value });
      showToast(`"${name}" в архиве`);
      reload();
    } catch (err) {
      showToast('Ошибка: ' + err.message, 'error');
    }
  };

  const restore = async (sheet, id_field, id_value, name) => {
    try {
      await api('updateRecord', { sheet, id_field, id_value, updates: { is_active: true } });
      showToast(`"${name}" снова активен`);
      reload();
    } catch (err) {
      showToast('Ошибка: ' + err.message, 'error');
    }
  };

  const handleRefreshCatalogs = async () => {
    if (refreshing) return;
    setRefreshing(true);
    try {
      await api('flushCache');
      await reload();
      showToast('Справочники обновлены');
    } catch (err) {
      showToast('Ошибка обновления: ' + err.message, 'error');
    } finally {
      setRefreshing(false);
    }
  };

  return <>
    <header className="flex items-center justify-between rounded-3xl bg-white p-5 shadow-sm">
      <div>
        <h1 className="text-2xl font-semibold tracking-tight">Справочники</h1>
        <p className="mt-1 text-sm text-slate-500">Клиенты и их данные · вкусы · упаковка</p>
      </div>
      <Button onClick={handleRefreshCatalogs} variant="light" disabled={refreshing}>
        {refreshing ? <><Spinner small /> Обновляю...</> : '↻ Обновить справочники'}
      </Button>
    </header>

    <Card className="p-5">
      <div className="mb-5 flex items-center gap-3 flex-wrap">
        <div className="flex gap-1 rounded-2xl bg-slate-100 p-1">
          {[
            ['clients', `Клиенты (${clients.length})`],
            ['flavors', `Вкусы (${flavors.length})`],
            ['extras', `Упаковка (${extras.length})`],
            ['prices', `Цены (${priceOverrides.length})`],
          ].map(([k, label]) => (
            <button key={k} onClick={() => { setTab(k); setSearch(''); }}
              className={`rounded-xl px-4 py-2 text-sm transition ${tab === k ? 'bg-white shadow-sm font-medium' : 'text-slate-500 hover:text-slate-900'}`}>
              {label}
            </button>
          ))}
        </div>
        <div className="ml-auto flex gap-2">
          <Input value={search} onChange={setSearch} placeholder="Поиск..." className="w-64" />
          {tab === 'clients' && <Button onClick={() => setModalType('client_wizard')}>+ Клиент</Button>}
          {tab === 'flavors' && <Button onClick={() => setModalType('flavor')}>+ Вкус</Button>}
          {tab === 'extras' && <Button onClick={() => setModalType('extra')}>+ Упаковка</Button>}
          {tab === 'prices' && <Button onClick={() => setModalType('price')}>+ Индив. цена</Button>}
        </div>
      </div>

      {tab === 'clients' && <ClientsCatalog
        clients={clients} points={points} legals={legals} search={search}
        onEditClient={(client) => {
          setModalData({
            client,
            points: points.filter(p => p.client_id === client.client_id),
            legals: legals.filter(l => l.client_id === client.client_id),
          });
          setModalType('edit_client_wizard');
        }}
        onAddPoint={(cid) => { setModalData({ client_id: cid }); setModalType('point'); }}
        onAddLegal={(cid) => { setModalData({ client_id: cid }); setModalType('legal'); }}
        onEditPoint={(point) => { setModalData({ ...point }); setModalType('edit_point'); }}
        onEditLegal={(legal) => { setModalData({ ...legal }); setModalType('edit_legal'); }}
        onDeactivate={deactivate}
        onRestore={restore}
      />}

      {tab === 'flavors' && <FlavorsTable flavors={flavors} search={search} onDeactivate={deactivate} />}
      {tab === 'extras' && <ExtrasTable extras={extras} search={search} onDeactivate={deactivate} />}
      {tab === 'prices' && <PricesTable overrides={priceOverrides} clients={clients} points={points} legals={legals} flavors={flavors} search={search} onDeactivate={deactivate} />}
    </Card>

    {modalType === 'client_wizard' && <Modal open={true} onClose={closeModal} title="Новый клиент" size="xl"><AddClientWizard clients={clients} onDone={() => { closeModal(); reload(); }} onCancel={closeModal} showToast={showToast} /></Modal>}
    {modalType === 'edit_client_wizard' && <Modal open={true} onClose={closeModal} title="Редактировать клиента" size="xl"><EditClientWizard clients={clients} client={modalData.client} points={modalData.points || []} legals={modalData.legals || []} onDone={() => { closeModal(); reload(); }} onCancel={closeModal} showToast={showToast} /></Modal>}
    {modalType === 'client' && <Modal open={true} onClose={closeModal} title="Новый клиент"><AddClientForm data={modalData} setData={setModalData} onSubmit={submitModal} onCancel={closeModal} /></Modal>}
    {modalType === 'point' && <Modal open={true} onClose={closeModal} title="Новый адрес"><AddPointForm data={modalData} setData={setModalData} clients={clients} onSubmit={submitModal} onCancel={closeModal} /></Modal>}
    {modalType === 'edit_point' && <Modal open={true} onClose={closeModal} title="Редактировать адрес"><AddPointForm data={modalData} setData={setModalData} clients={clients} onSubmit={submitModal} onCancel={closeModal} submitLabel="Сохранить" lockClient={true} /></Modal>}
    {modalType === 'legal' && <Modal open={true} onClose={closeModal} title="Новое юрлицо"><AddLegalForm data={modalData} setData={setModalData} clients={clients} onSubmit={submitModal} onCancel={closeModal} /></Modal>}
    {modalType === 'edit_legal' && <Modal open={true} onClose={closeModal} title="Редактировать юрлицо"><AddLegalForm data={modalData} setData={setModalData} clients={clients} onSubmit={submitModal} onCancel={closeModal} submitLabel="Сохранить" lockClient={true} /></Modal>}
    {modalType === 'flavor' && <Modal open={true} onClose={closeModal} title="Новый вкус"><AddFlavorForm data={modalData} setData={setModalData} onSubmit={submitModal} onCancel={closeModal} /></Modal>}
    {modalType === 'extra' && <Modal open={true} onClose={closeModal} title="Новая упаковка"><AddExtraForm data={modalData} setData={setModalData} onSubmit={submitModal} onCancel={closeModal} /></Modal>}
    {modalType === 'price' && <Modal open={true} onClose={closeModal} title="Индивидуальная цена"><AddPriceForm data={modalData} setData={setModalData} clients={clients} points={points} legals={legals} flavors={flavors} onSubmit={submitModal} onCancel={closeModal} /></Modal>}
  </>;
}

function ClientsCatalog({ clients, points, legals, search, onEditClient, onAddPoint, onAddLegal, onEditPoint, onEditLegal, onDeactivate, onRestore }) {
  const [manualExpandedId, setManualExpandedId] = useState(null);
  const [showArchive, setShowArchive] = useState(false);

  const q = (search || '').toLowerCase().trim();

  // ищем по клиенту, его адресам, юрлицам и комментарию
  const { filtered, autoExpand } = useMemo(() => {
    let list = showArchive ? clients : clients.filter(c => isTrue(c.is_active));

    if (!q) return { filtered: [...list].sort((a, b) => a.name.localeCompare(b.name, 'ru')), autoExpand: new Set() };

    const auto = new Set();
    const result = list.filter(c => {
      const inClient = c.name.toLowerCase().includes(q) ||
        (c.aliases || '').toLowerCase().includes(q) ||
        (c.comment || '').toLowerCase().includes(q) ||
        (c.main_contact || '').toLowerCase().includes(q);

      const cPoints = points.filter(p => p.client_id === c.client_id);
      const inPoint = cPoints.some(p =>
        (p.address || '').toLowerCase().includes(q) ||
        (p.contact_person || '').toLowerCase().includes(q) ||
        (p.working_hours || '').toLowerCase().includes(q) ||
        (p.delivery_comment || '').toLowerCase().includes(q)
      );

      const cLegals = legals.filter(l => l.client_id === c.client_id);
      const inLegal = cLegals.some(l =>
        (l.legal_name || '').toLowerCase().includes(q) ||
        String(l.inn || '').includes(q) ||
        String(l.kpp || '').includes(q) ||
        (l.documents_comment || '').toLowerCase().includes(q)
      );

      if (inPoint || inLegal) auto.add(c.client_id);
      return inClient || inPoint || inLegal;
    });

    return { filtered: result.sort((a, b) => a.name.localeCompare(b.name, 'ru')), autoExpand: auto };
  }, [clients, points, legals, q, showArchive]);

  const expandedId = q ? (manualExpandedId || (autoExpand.size > 0 ? [...autoExpand][0] : null)) : manualExpandedId;
  const isExpanded = (cid) => expandedId === cid || (q && autoExpand.has(cid));

  const highlight = (text) => {
    if (!q || !text) return text;
    const str = String(text);
    const idx = str.toLowerCase().indexOf(q);
    if (idx === -1) return str;
    return <>{str.substring(0, idx)}<mark className="bg-amber-200 rounded px-0.5">{str.substring(idx, idx + q.length)}</mark>{str.substring(idx + q.length)}</>;
  };

  return <div>
    <div className="mb-3 flex items-center justify-between text-sm">
      <span className="text-slate-500">{filtered.length} {filtered.length === 1 ? 'клиент' : filtered.length < 5 ? 'клиента' : 'клиентов'}</span>
      <label className="flex items-center gap-2 cursor-pointer">
        <input type="checkbox" checked={showArchive} onChange={(e) => setShowArchive(e.target.checked)} />
        <span className="text-slate-600">Показать архив</span>
      </label>
    </div>
    <div className="space-y-2">
      {filtered.length === 0 && <div className="text-center py-12 text-slate-400 text-sm">Ничего не найдено</div>}
      {filtered.map(c => {
        const cPoints = points.filter(p => p.client_id === c.client_id);
        const cLegals = legals.filter(l => l.client_id === c.client_id);
        const expanded = isExpanded(c.client_id);
        const active = isTrue(c.is_active);
        return <div key={c.client_id} className={`rounded-2xl border overflow-hidden ${active ? 'border-slate-200 bg-white' : 'border-slate-200 bg-slate-50'}`}>
          <button onClick={() => setManualExpandedId(expanded ? null : c.client_id)} className={`w-full flex items-center gap-3 p-3 text-left transition ${active ? 'hover:bg-slate-50' : 'opacity-70'}`}>
            <svg className={`text-slate-400 transition flex-shrink-0 ${expanded ? 'rotate-90' : ''}`} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="9 18 15 12 9 6"/></svg>
            <div className="flex-1 min-w-0">
              <div className="font-medium truncate">{highlight(c.name)}</div>
              {c.comment && <div className="text-xs text-slate-500 truncate">{highlight(c.comment)}</div>}
            </div>
            <div className="text-xs text-slate-400 flex-shrink-0">
              {cPoints.length} {cPoints.length === 1 ? 'адрес' : cPoints.length < 5 ? 'адреса' : 'адресов'} · {cLegals.length} {cLegals.length === 1 ? 'юрлицо' : 'юрлиц'}
            </div>
            {!active && <Pill color="red">архив</Pill>}
          </button>

          {expanded && <div className="border-t border-slate-100 bg-slate-50/50 p-4 space-y-3">
            {c.aliases && <div className="text-xs"><span className="text-slate-500">Алиасы:</span> {highlight(c.aliases)}</div>}
            {c.main_contact && <div className="text-xs"><span className="text-slate-500">Контакт:</span> {highlight(c.main_contact)}</div>}
            <div className="flex gap-2">
              <Button onClick={() => onEditClient(c)} variant="light" size="sm">Редактировать клиента</Button>
            </div>

            <div>
              <div className="flex items-center justify-between mb-2">
                <h4 className="text-sm font-semibold">Адреса</h4>
                <Button onClick={() => onAddPoint(c.client_id)} variant="light" size="sm">+ Адрес</Button>
              </div>
              {cPoints.length === 0 && <div className="text-xs text-slate-400 py-2">Адресов нет</div>}
              <div className="space-y-1">
                {cPoints.map(p => {
                  const pointActive = isTrue(p.is_active);
                  return <div key={p.point_id} className={`flex items-center gap-3 rounded-xl px-3 py-2 text-sm ${pointActive ? 'bg-white' : 'bg-slate-100 text-slate-400'}`}>
                    <div className="flex-1 min-w-0">
                      <div className="truncate">{highlight(p.address)}</div>
                      {(p.working_hours || p.contact_person || p.delivery_comment) && (
                        <div className="text-xs text-slate-500 truncate">
                          {p.working_hours && highlight(p.working_hours)} {p.contact_person && <>· {highlight(p.contact_person)}</>} {p.delivery_comment && <>· {highlight(p.delivery_comment)}</>}
                        </div>
                      )}
                    </div>
                    <div className="flex items-center gap-3 flex-shrink-0">
                      <button onClick={() => onEditPoint(p)} className="text-xs text-slate-500 hover:text-slate-900">изменить</button>
                      {pointActive
                        ? <button onClick={() => onDeactivate('points', 'point_id', p.point_id, p.address)} className="text-xs text-slate-400 hover:text-red-600">в архив</button>
                        : <button onClick={() => onRestore('points', 'point_id', p.point_id, p.address)} className="text-xs text-emerald-600 hover:underline">вернуть</button>
                      }
                    </div>
                  </div>;
                })}
              </div>
            </div>

            <div>
              <div className="flex items-center justify-between mb-2">
                <h4 className="text-sm font-semibold">Юрлица</h4>
                <Button onClick={() => onAddLegal(c.client_id)} variant="light" size="sm">+ Юрлицо</Button>
              </div>
              {cLegals.length === 0 && <div className="text-xs text-slate-400 py-2">Юрлиц нет</div>}
              <div className="space-y-1">
                {cLegals.map(l => {
                  const legalActive = isTrue(l.is_active);
                  return <div key={l.legal_id} className={`flex items-center gap-3 rounded-xl px-3 py-2 text-sm ${legalActive ? 'bg-white' : 'bg-slate-100 text-slate-400'}`}>
                    <div className="flex-1 min-w-0">
                      <div className="truncate">{highlight(l.legal_name)}</div>
                      <div className="text-xs text-slate-500">ИНН {highlight(String(l.inn || ''))}{l.kpp ? ` · КПП ${l.kpp}` : ''}{isTrue(l.has_contract) ? ' · договор' : ''}</div>
                    </div>
                    <div className="flex items-center gap-3 flex-shrink-0">
                      <button onClick={() => onEditLegal(l)} className="text-xs text-slate-500 hover:text-slate-900">изменить</button>
                      {legalActive
                        ? <button onClick={() => onDeactivate('legals', 'legal_id', l.legal_id, l.legal_name)} className="text-xs text-slate-400 hover:text-red-600">в архив</button>
                        : <button onClick={() => onRestore('legals', 'legal_id', l.legal_id, l.legal_name)} className="text-xs text-emerald-600 hover:underline">вернуть</button>
                      }
                    </div>
                  </div>;
                })}
              </div>
            </div>

            {active && <div className="pt-2 border-t border-slate-200">
              <button onClick={() => onDeactivate('clients', 'client_id', c.client_id, c.name)} className="text-xs text-red-600 hover:underline">Перевести клиента в архив</button>
            </div>}
          </div>}
        </div>;
      })}
    </div>
  </div>;
}

function FlavorsTable({ flavors, search, onDeactivate }) {
  const filtered = useMemo(() => {
    const q = search.toLowerCase();
    return [...flavors]
      .filter(f => !q || f.name.toLowerCase().includes(q))
      .sort((a, b) => (Number(a.sort_order) || 0) - (Number(b.sort_order) || 0));
  }, [flavors, search]);

  return <SimpleTable items={filtered} columns={[
    { key: 'name', label: 'Название', flex: 2 },
    { key: 'default_price', label: 'Цена', format: (v) => `${v} ₽` },
    { key: 'excel_column', label: 'Excel' },
    { key: 'is_premium', label: 'Премиум', format: (v) => isTrue(v) ? '⭐' : '' },
    { key: 'is_seasonal', label: 'Сезонный', format: (v) => isTrue(v) ? '🍂' : '' },
  ]} onDeactivate={(it) => onDeactivate('flavors', 'flavor_id', it.flavor_id, it.name)} />;
}

function ExtrasTable({ extras, search, onDeactivate }) {
  const filtered = useMemo(() => {
    const q = search.toLowerCase();
    return [...extras]
      .filter(e => !q || e.name.toLowerCase().includes(q))
      .sort((a, b) => (Number(a.sort_order) || 0) - (Number(b.sort_order) || 0));
  }, [extras, search]);

  return <SimpleTable items={filtered} columns={[
    { key: 'name', label: 'Название', flex: 2 },
    { key: 'default_price', label: 'Цена', format: (v) => `${v} ₽` },
  ]} onDeactivate={(it) => onDeactivate('extras', 'extra_id', it.extra_id, it.name)} />;
}

function PricesTable({ overrides, clients, points, legals, flavors, search, onDeactivate }) {
  const clientById = useMemo(() => Object.fromEntries(clients.map(c => [c.client_id, c.name])), [clients]);
  const pointById = useMemo(() => Object.fromEntries(points.map(p => [p.point_id, p.address])), [points]);
  const legalById = useMemo(() => Object.fromEntries(legals.map(l => [l.legal_id, l.legal_name])), [legals]);
  const flavorById = useMemo(() => Object.fromEntries(flavors.map(f => [f.flavor_id, f.name])), [flavors]);

  const filtered = useMemo(() => {
    const q = search.toLowerCase();
    return overrides.filter(o => {
      if (!q) return true;
      const scopeName = o.scope === 'point' ? pointById[o.scope_id] : o.scope === 'legal' ? legalById[o.scope_id] : clientById[o.scope_id];
      return (scopeName || '').toLowerCase().includes(q) || (flavorById[o.flavor_id] || '').toLowerCase().includes(q);
    });
  }, [overrides, search, clientById, pointById, legalById, flavorById]);

  return <div className="overflow-x-auto rounded-2xl border border-slate-200">
    <table className="w-full text-left text-sm">
      <thead className="bg-slate-50 text-slate-500">
        <tr>
          <th className="p-3">Тип</th>
          <th className="p-3">Кому</th>
          <th className="p-3">Вкус</th>
          <th className="p-3 text-right">Цена</th>
          <th className="p-3">Действует</th>
          <th className="p-3">Комментарий</th>
          <th className="p-3 w-32">Статус</th>
        </tr>
      </thead>
      <tbody>
        {filtered.map((o, i) => {
          const scopeName = o.scope === 'point' ? pointById[o.scope_id] : o.scope === 'legal' ? legalById[o.scope_id] : clientById[o.scope_id];
          const scopeLabel = { point: 'Точка', legal: 'Юрлицо', client: 'Клиент' }[o.scope] || o.scope;
          const flavorName = o.flavor_id ? flavorById[o.flavor_id] : 'Все вкусы';
          const active = isTrue(o.is_active);
          return <tr key={o.override_id} className={`border-t border-slate-100 ${!active ? 'bg-slate-50 text-slate-400' : ''}`}>
            <td className="p-3"><Pill color="indigo">{scopeLabel}</Pill></td>
            <td className="p-3">{scopeName || o.scope_id}</td>
            <td className="p-3">{flavorName}</td>
            <td className="p-3 text-right font-semibold">{o.price} ₽</td>
