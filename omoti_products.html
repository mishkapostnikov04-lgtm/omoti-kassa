<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OMOTI · Умная закупка</title>
<meta name="theme-color" content="#2d7a3a">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f0f4f0; --card:#fff; --border:#d6e4d6; --text:#1c2b1c;
  --muted:#7a967a; --muted2:#b8ccb8;
  --green:#2d7a3a; --green-light:#e8f5e9; --green-mid:#4caf62;
  --teal:#1a8c78; --teal-light:#e0f5f1;
  --amber:#e07c1a; --amber-light:#fff3e0;
  --red:#c0392b; --red-light:#fdecea;
  --radius:16px; --shadow:0 2px 12px rgba(0,0,0,.07);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:520px;margin:0 auto;padding-bottom:60px}

/* HEADER */
.header{background:var(--green);padding:18px 18px 0;position:sticky;top:0;z-index:20}
.header-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.18);border-radius:999px;padding:4px 10px;margin-bottom:8px}
.header-badge span{font-size:11px;font-weight:800;color:#fff;letter-spacing:.06em;text-transform:uppercase}
.header-dot{width:6px;height:6px;border-radius:999px;background:#7dff9a}
.header-title{font-size:22px;font-weight:700;color:#fff;line-height:1}
.header-sub{font-size:12px;color:rgba(255,255,255,.65);margin-top:4px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.refresh-btn{background:rgba(255,255,255,.18);border:none;color:#fff;font-family:inherit;font-size:11px;font-weight:600;padding:6px 12px;border-radius:999px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:.15s}
.refresh-btn:active{background:rgba(255,255,255,.3)}
.refresh-btn.loading svg{animation:spin 1s linear infinite}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.plan-status{font-size:11px;color:rgba(255,255,255,.6)}
.tab-row{display:flex;gap:4px;background:rgba(0,0,0,.18);border-radius:12px;padding:3px}
.tab-btn{flex:1;border:none;background:transparent;border-radius:10px;padding:9px 6px;font-size:13px;font-weight:600;font-family:inherit;color:rgba(255,255,255,.6);cursor:pointer;transition:.15s}
.tab-btn.active{background:#fff;color:var(--green)}

/* SCREENS */
.screen{display:none}.screen.active{display:block}

/* SUMMARY-BAR */
.summary-bar{margin:12px 14px 0;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:12px 14px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.sb-left{flex:1;min-width:0}
.sb-period{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.sb-total{font-size:18px;font-weight:800;color:var(--text);margin-top:2px}
.sb-cost{text-align:right}
.sb-cost-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.sb-cost-val{font-size:17px;font-weight:800;color:var(--green);margin-top:2px;white-space:nowrap}

/* DAYS PICKER */
.days-row{display:flex;gap:6px;padding:12px 14px 0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.day-pill{flex-shrink:0;min-width:62px;border:1.5px solid var(--border);background:#fff;border-radius:12px;padding:8px 4px;font-family:inherit;cursor:pointer;text-align:center;transition:.15s}
.day-pill.active{background:var(--green);border-color:var(--green)}
.day-pill.empty{opacity:.45}
.dp-name{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.day-pill.active .dp-name{color:rgba(255,255,255,.8)}
.dp-date{font-size:15px;font-weight:800;color:var(--text);margin-top:2px}
.day-pill.active .dp-date{color:#fff}
.dp-qty{font-size:10px;font-weight:600;color:var(--muted);margin-top:2px}
.day-pill.active .dp-qty{color:rgba(255,255,255,.85)}

/* SECTION */
.section{margin:14px 14px 0}
.sec-head{display:flex;justify-content:space-between;align-items:baseline;padding:0 4px;margin-bottom:8px}
.sec-title{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.sec-meta{font-size:11px;font-weight:600;color:var(--muted2)}

/* BASE/INGREDIENT ROW */
.ing-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.ing-row{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:10px}
.ing-row:last-child{border-bottom:none}
.ing-left{flex:1;min-width:0}
.ing-name{font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ing-grams{font-size:12px;font-weight:600;color:var(--muted);margin-top:2px}
.ing-right{text-align:right;flex-shrink:0}
.ing-packs{font-size:15px;font-weight:800;color:var(--green);white-space:nowrap}
.ing-pack-meta{font-size:11px;color:var(--muted2);margin-top:1px;white-space:nowrap}
.ing-row.has-stock .ing-packs{color:var(--text)}
.ing-row.covered{background:var(--green-light)}
.ing-row.covered .ing-packs{color:var(--green)}

/* FLAVOR ACCORDION */
.flav-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:8px}
.flav-head{padding:13px 14px;display:flex;justify-content:space-between;align-items:center;gap:8px;cursor:pointer;-webkit-user-select:none;user-select:none}
.flav-head:active{background:#f7faf7}
.flav-name{font-size:15px;font-weight:700;color:var(--text);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.flav-name.premium{color:var(--amber)}
.flav-tag{display:inline-block;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:2px 6px;border-radius:4px;margin-left:6px;vertical-align:1px}
.flav-tag.mono{background:var(--teal-light);color:var(--teal)}
.flav-tag.dual{background:#fef3e8;color:var(--amber)}

/* OVERPAY WARNING */
.ing-row.overpay .ing-grams::after{content:" ⚠";color:var(--amber);font-weight:700}
.ing-overpay-note{font-size:10px;color:var(--amber);font-weight:600;margin-top:1px;white-space:nowrap}

/* SUMMARY EXTRA */
.sb-cost-sub{font-size:10px;color:var(--muted);font-weight:600;margin-top:2px;white-space:nowrap}
.sb-stat{font-size:11px;font-weight:600;color:var(--muted);margin-top:3px}
.sb-stat .prem{color:var(--amber);font-weight:700}
.flav-meta{font-size:12px;font-weight:700;color:var(--muted);white-space:nowrap}
.flav-chev{color:var(--muted2);font-size:14px;flex-shrink:0;transition:transform .2s}
.flav-card.open .flav-chev{transform:rotate(180deg)}
.flav-body{display:none;border-top:1px solid var(--border);background:#fafdfa}
.flav-card.open .flav-body{display:block}
.flav-body .ing-row{padding:9px 14px 9px 22px;background:transparent}
.flav-body .ing-row:last-child{border-bottom:none}
.flav-body .ing-name{font-size:13px;font-weight:600}
.flav-body .ing-packs{font-size:14px}

/* COPY BTN */
.copy-btn{width:calc(100% - 28px);margin:18px 14px 0;background:var(--text);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.copy-btn:active{opacity:.85}
.copy-btn.copied{background:var(--green)}

/* SUPPLIER BLOCKS */
.suppliers-wrap{margin:14px 14px 0;display:flex;flex-direction:column;gap:8px}
.sup-card{background:var(--card);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;border-left:4px solid var(--border)}
.sup-card.sasha{border-left-color:var(--green)}
.sup-card.ashan{border-left-color:var(--amber)}
.sup-card.ozon{border-left-color:var(--teal)}
.sup-card.other{border-left-color:var(--muted2)}
.sup-head{display:flex;align-items:stretch;min-height:54px}
.sup-toggle{flex:1;display:flex;align-items:center;gap:10px;padding:10px 12px;background:transparent;border:none;font-family:inherit;cursor:pointer;text-align:left;-webkit-tap-highlight-color:transparent}
.sup-toggle:active{background:#f7faf7}
.sup-toggle-info{flex:1;min-width:0}
.sup-name{font-size:14px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:6px}
.sup-total{margin-left:auto;font-size:12px;font-weight:800;color:var(--text);background:#f5f8f5;padding:2px 7px;border-radius:999px;white-space:nowrap}
.sup-meta{font-size:11px;font-weight:600;color:var(--muted);margin-top:2px}
.sup-chev{color:var(--muted2);font-size:12px;flex-shrink:0;transition:transform .2s}
.sup-card.open .sup-chev{transform:rotate(180deg)}
.sup-copy{background:var(--text);color:#fff;border:none;padding:0 16px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;border-radius:0;-webkit-tap-highlight-color:transparent;min-width:90px;justify-content:center}
.sup-card.sasha .sup-copy{background:var(--green)}
.sup-card.ashan .sup-copy{background:var(--amber)}
.sup-card.ozon .sup-copy{background:var(--teal)}
.sup-copy:active{opacity:.85}
.sup-copy.copied{background:var(--green)!important}
.sup-body{display:none;border-top:1px solid var(--border);padding:8px 0}
.sup-card.open .sup-body{display:block}
.sup-item{display:flex;justify-content:space-between;gap:10px;padding:8px 14px;border-bottom:1px solid var(--border);font-size:13px}
.sup-item:last-child{border-bottom:none}
.sup-item.total{background:#fafdfa}
.sup-item.total .sup-item-name,.sup-item.total .sup-item-pack{font-weight:800;color:var(--text)}
.sup-item-name{flex:1;color:var(--text);font-weight:600;min-width:0}
.sup-item-pack{color:var(--muted);font-weight:700;white-space:nowrap;flex-shrink:0}

/* STOCK PANEL */
.stock-panel{margin:14px 14px 0;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.stock-head{padding:13px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;-webkit-user-select:none;user-select:none}
.stock-head:active{background:#f7faf7}
.stock-title{font-size:13px;font-weight:700;color:var(--text)}
.stock-title-sub{font-size:11px;color:var(--muted);margin-top:2px}
.stock-chev{color:var(--muted2);font-size:14px;transition:transform .2s}
.stock-panel.open .stock-chev{transform:rotate(180deg)}
.stock-body{display:none;border-top:1px solid var(--border);padding:10px 12px}
.stock-panel.open .stock-body{display:block}
.stock-list{display:flex;flex-direction:column;gap:6px}
.stock-item{display:flex;align-items:center;gap:8px;padding:6px 4px;border-bottom:1px solid var(--border)}
.stock-item:last-child{border-bottom:none}
.si-name{flex:1;font-size:12px;font-weight:600;color:var(--text);min-width:0}
.si-name-sub{font-size:10px;color:var(--muted);font-weight:500}
.si-inp{width:64px;border:1.5px solid var(--border);background:#fff;border-radius:6px;padding:5px 6px;font-size:13px;font-weight:700;font-family:inherit;color:var(--text);outline:none;text-align:center}
.si-inp:focus{border-color:var(--green)}
.si-unit{font-size:10px;color:var(--muted2);font-weight:600;min-width:18px}

/* MANUAL */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin:12px 14px 0;padding:14px 14px 10px}
.card .sec-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.manual-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.manual-row:last-child{border-bottom:none}
.manual-num{font-size:12px;font-weight:700;color:var(--muted2);min-width:18px}
.ac-wrap{position:relative;flex:2}
.manual-name-inp{width:100%;border:1.5px solid var(--border);background:#fff;border-radius:8px;padding:7px 10px;font-size:13px;font-weight:600;font-family:inherit;color:var(--text);outline:none}
.manual-name-inp:focus{border-color:var(--green)}
.manual-qty-inp{width:72px;border:1.5px solid var(--border);background:#fff;border-radius:8px;padding:7px 8px;font-size:13px;font-weight:700;font-family:inherit;color:var(--text);outline:none;text-align:center}
.manual-qty-inp:focus{border-color:var(--green)}
.manual-del{width:28px;height:28px;border:none;background:none;color:var(--muted2);cursor:pointer;font-size:16px;border-radius:6px;display:flex;align-items:center;justify-content:center}
.manual-del:active{background:var(--red-light);color:var(--red)}
.add-row-btn{width:100%;border:1.5px dashed var(--border);background:transparent;border-radius:10px;padding:10px;font-size:13px;font-weight:600;font-family:inherit;color:var(--green);cursor:pointer;margin-top:8px}
.add-row-btn:active{background:var(--green-light)}
.ac-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid var(--green);border-radius:8px;box-shadow:var(--shadow);z-index:50;max-height:180px;overflow-y:auto;margin-top:2px}
.ac-item{padding:8px 12px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text);border-bottom:1px solid var(--border)}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.selected{background:var(--green-light);color:var(--green)}
.calc-btn{width:calc(100% - 28px);margin:12px 14px 0;background:var(--green);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer}
.calc-btn:active{opacity:.85}

.empty-msg{padding:32px 16px;text-align:center;color:var(--muted);font-size:14px}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1c2b1c;color:#fff;padding:10px 20px;border-radius:999px;font-size:13px;font-weight:600;opacity:0;transition:.25s;pointer-events:none;z-index:99;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--red)}
.toast.ok{background:var(--green)}


/* SMART PURCHASE */
.smart-tabs .tab-btn{font-size:12px;padding:9px 4px}
.period-chips{display:flex;gap:6px;padding:12px 14px 0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.period-chip{flex-shrink:0;border:1.5px solid var(--border);background:#fff;border-radius:999px;padding:8px 12px;font-size:12px;font-weight:800;font-family:inherit;color:var(--muted);cursor:pointer;white-space:nowrap}
.period-chip.active{background:var(--green);border-color:var(--green);color:#fff}
.now-hero{margin:12px 14px 0;background:linear-gradient(135deg,#fff,#f6fbf6);border-radius:20px;box-shadow:var(--shadow);padding:15px 15px 13px;border:1px solid rgba(45,122,58,.08)}
.now-label{font-size:10px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px}
.now-title{font-size:20px;font-weight:900;color:var(--text);line-height:1.1}
.now-sub{font-size:12px;font-weight:650;color:var(--muted);margin-top:5px;line-height:1.35}
.now-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.now-mini{background:#fff;border:1px solid var(--border);border-radius:14px;padding:10px}
.now-mini .n{font-size:19px;font-weight:950;color:var(--green);line-height:1}
.now-mini .t{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:4px}
.alert-box{margin:10px 14px 0;border-radius:16px;padding:12px 14px;border:1.5px solid var(--amber);background:var(--amber-light)}
.alert-title{font-size:11px;font-weight:900;color:var(--amber);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.alert-line{font-size:12px;font-weight:650;color:#7a4b12;line-height:1.55}
.smart-section{margin:14px 14px 0}
.smart-head{display:flex;justify-content:space-between;align-items:baseline;margin:0 4px 8px}
.smart-title{font-size:11px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.09em}
.smart-meta{font-size:11px;font-weight:700;color:var(--muted2)}
.action-card{background:#fff;border-radius:16px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:8px;border-left:4px solid var(--border)}
.action-card.urgent{border-left-color:var(--red)}
.action-card.later{border-left-color:var(--amber)}
.action-card.closed{border-left-color:var(--green)}
.action-row{padding:11px 12px;border-bottom:1px solid var(--border)}
.action-row:last-child{border-bottom:none}
.action-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.action-name{font-size:14px;font-weight:850;color:var(--text);line-height:1.2;min-width:0;overflow:hidden;text-overflow:ellipsis}
.action-pack{font-size:14px;font-weight:950;color:var(--green);white-space:nowrap;text-align:right;flex-shrink:0}
.action-sub{font-size:11px;font-weight:650;color:var(--muted);margin-top:3px;line-height:1.35}
.action-status{font-size:10px;font-weight:850;color:var(--amber);margin-top:4px;line-height:1.35}
.action-btns{display:flex;gap:5px;margin-top:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:1px}
.action-btn{flex-shrink:0;border:none;background:#f2f7f2;color:var(--text);border-radius:9px;padding:7px 9px;font-size:11px;font-weight:850;font-family:inherit;cursor:pointer;white-space:nowrap}
.action-btn.green{background:var(--green-light);color:var(--green)}
.action-btn.amber{background:var(--amber-light);color:var(--amber)}
.action-btn.red{background:var(--red-light);color:var(--red)}
.supplier-actions{display:flex;gap:6px;padding:8px 10px 10px;border-top:1px solid var(--border);overflow-x:auto}
.supplier-actions button{flex-shrink:0;border:none;border-radius:10px;padding:8px 10px;font-size:11px;font-weight:850;font-family:inherit;cursor:pointer;background:#f3f7f3;color:var(--text);white-space:nowrap}
.supplier-actions button.primary{background:var(--text);color:#fff}
.supplier-actions button.green{background:var(--green-light);color:var(--green)}
.supplier-actions button.amber{background:var(--amber-light);color:var(--amber)}
.state-box{margin:12px 14px 0;background:#fff;border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
.state-head{display:flex;justify-content:space-between;align-items:center;padding:11px 13px;border-bottom:1px solid var(--border)}
.state-title{font-size:12px;font-weight:900;color:var(--text)}
.state-sub{font-size:10px;color:var(--muted);font-weight:650;margin-top:1px}
.state-add{border:none;background:var(--green-light);color:var(--green);border-radius:10px;padding:8px 10px;font-size:11px;font-weight:900;font-family:inherit;cursor:pointer;white-space:nowrap}
.state-list{padding:5px 0}.state-row{display:flex;justify-content:space-between;gap:8px;padding:7px 13px;border-bottom:1px solid var(--border);font-size:12px}.state-row:last-child{border-bottom:none}.state-name{font-weight:800;color:var(--text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.state-val{font-weight:800;color:var(--muted);text-align:right;white-space:nowrap}.state-empty{font-size:12px;color:var(--muted);padding:10px 13px}
.item-actions{display:flex;gap:5px;margin-top:7px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:1px}
.item-actions button{flex-shrink:0;border:none;border-radius:8px;padding:6px 8px;font-size:10px;font-weight:900;font-family:inherit;cursor:pointer;white-space:nowrap;background:#f2f7f2;color:var(--text)}
.item-actions button.green{background:var(--green-light);color:var(--green)}
.item-actions button.amber{background:var(--amber-light);color:var(--amber)}
.item-actions button.red{background:var(--red-light);color:var(--red)}
.item-actions button.dark{background:var(--text);color:#fff}
.need-note{font-size:10px;color:var(--muted);font-weight:650;margin-top:3px;line-height:1.35}

.day-status{font-size:9px;font-weight:800;margin-top:2px;color:var(--muted2)}
.day-pill.ready{border-color:var(--green);background:var(--green-light)}
.day-pill.need{border-color:var(--amber);background:var(--amber-light)}
.check-note{font-size:12px;color:var(--muted);line-height:1.5;margin:0 14px 8px;background:#fff;border-radius:14px;padding:11px 12px;box-shadow:var(--shadow)}
.danger-reset{width:calc(100% - 28px);margin:14px 14px 0;border:1.5px solid var(--red-light);background:#fff;color:var(--red);border-radius:12px;padding:12px;font-family:inherit;font-size:13px;font-weight:800;cursor:pointer}

</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-badge"><div class="header-dot"></div><span>OMOTI · Продукты</span></div>
    <div class="header-title">Умная закупка</div>
    <div class="header-sub">

function escHtml(s){return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');}

// ── РАСЧЁТ ─────────────────────────────────────────────────────────────────
function calcNeeds(flavors){
  // { 'Творожный сыр': 22050, ... }
  const needs={};
  Object.entries(flavors).forEach(([fname,qty])=>{
    if(qty<=0)return;
    const r=RECIPES[fname];if(!r)return;
    r.forEach(({n,w})=>{needs[n]=(needs[n]||0)+w*qty;});
  });
  return needs;
}

function calcByFlavor(flavors){
  // { 'Дубайский шоколад': [{name, grams}, ...], ... }
  const out={};
  Object.entries(flavors).forEach(([fname,qty])=>{
    if(qty<=0)return;
    const r=RECIPES[fname];if(!r)return;
    out[fname]={qty, items: r.map(({n,w})=>({name:n,grams:w*qty})).filter(x=>x.grams>0.01)};
  });
  return out;
}

function packMath(name,grams){
  // Учитываем остатки
  const pr=PRICES[name];
  const stockPacks=stockMap[name]||0;
  const stockG=pr?stockPacks*pr.pack:stockPacks;
  const remG=Math.max(0,grams-stockG);
  if(!pr) return {grams,packs:null,packLabel:null,buyG:remG,buyPacks:null,cost:0,actualCost:remG,leftover:0,weeksLeft:0,covered:remG<=0,overpay:false};
  const buyPacks=Math.ceil(remG/pr.pack);
  const cost=buyPacks*pr.pack*pr.p;            // во что обойдётся закупка
  const actualCost=remG*pr.p;                   // фактически уйдёт на этот план
  const leftover=Math.max(0,buyPacks*pr.pack-remG); // остаток на склад в граммах
  // На сколько недель хватит этой закупки (включая текущую)
  const weeksLeft=remG>0 ? (buyPacks*pr.pack)/remG : 0;
  const overpay = weeksLeft >= 2.5; // подсветка, если закупка покрывает 2.5+ недель
  return {grams,packs:Math.ceil(grams/pr.pack),packLabel:fmtPack(pr.pack),buyG:remG,buyPacks,cost,actualCost,leftover,weeksLeft,covered:remG<=0,overpay};
}

function renderIngredientRow(name,grams,opts={}){
  const m=packMath(name,grams);
  const hasStock=(stockMap[name]||0)>0;
  const cls=`ing-row${m.covered?' covered':''}${hasStock?' has-stock':''}${m.overpay&&!m.covered?' overpay':''}`;
  let right;
  if(m.packs===null){
    right=`<div class="ing-packs">${fmtG(m.buyG)}</div><div class="ing-pack-meta">россыпь</div>`;
  } else if(m.covered){
    right=`<div class="ing-packs">✓ есть</div><div class="ing-pack-meta">${m.packs} уп нужно</div>`;
  } else {
    let meta=`×${m.packLabel}`;
    if(m.overpay) meta+=` · хватит на ~${m.weeksLeft.toFixed(1).replace('.0','')} нед`;
    right=`<div class="ing-packs">${m.buyPacks} уп</div><div class="ing-pack-meta">${meta}</div>`;
  }
  return `<div class="${cls}">
    <div class="ing-left">
      <div class="ing-name">${escHtml(name)}</div>
      <div class="ing-grams">${fmtG(m.grams)}${hasStock?` · есть ${stockMap[name]} уп`:''}</div>
    </div>
    <div class="ing-right">${right}</div>
  </div>`;
}

function renderPlanContent(flavors, containerId, totalQty, periodLabel){
  const needs=calcNeeds(flavors);
  const byFlavor=calcByFlavor(flavors);

  // Разделяем основу и вкусовые
  const baseItems=[],flavorOnlyNeeds={};
  Object.entries(needs).forEach(([n,g])=>{
    if(BASE_INGREDIENTS.has(n)) baseItems.push({name:n,grams:g});
    else flavorOnlyNeeds[n]=g;
  });
  baseItems.sort((a,b)=>a.name.localeCompare(b.name,'ru'));

  // Считаем суммы и стат
  let totalCost=0,actualCost=0,buyCount=0;
  Object.entries(needs).forEach(([n,g])=>{
    const m=packMath(n,g);
    if(!m.covered){totalCost+=m.cost;actualCost+=m.actualCost;buyCount++;}
  });
  const leftover=totalCost-actualCost;
  const perPiece = totalQty>0 ? actualCost/totalQty : 0;
  const premQty=Object.entries(flavors).filter(([n])=>PREMIUM.has(n)).reduce((s,[,q])=>s+q,0);

  // Обновляем summary-bar
  const setSummary=(periodEl,totalEl,costEl)=>{
    document.getElementById(periodEl).textContent=periodLabel;
    document.getElementById(totalEl).innerHTML=`${totalQty} шт · ${Object.keys(flavors).length} вкус(ов)
      <div class="sb-stat">~${perPiece.toFixed(1)} ₽/моти${premQty?` · <span class="prem">${premQty} премиум</span>`:''}</div>`;
    document.getElementById(costEl).innerHTML=`${fmtMoney(totalCost)}
      ${leftover>500?`<div class="sb-cost-sub">в запас ~${fmtMoney(leftover)}</div>`:''}`;
  };
  if(containerId==='wk-content') setSummary('wk-period','wk-total','wk-cost');
  else if(containerId==='dy-content') setSummary('dy-period','dy-total','dy-cost');

  let html='';

  // Основа
  if(baseItems.length){
    html+=`<div class="section">
      <div class="sec-head"><span class="sec-title">Основа</span><span class="sec-meta">${baseItems.length} позиций · в каждом замесе</span></div>
      <div class="ing-card">${baseItems.map(({name,grams})=>renderIngredientRow(name,grams)).join('')}</div>
    </div>`;
  }

  // На неделе главный блок — закупка по поставщикам. Его ставим выше вкусов.
  if(containerId==='wk-content'){
    const blocks=renderSupplierBlocks(needs, containerId);
    if(blocks){
      html+=`<div class="section">
        <div class="sec-head"><span class="sec-title">Что заказать</span><span class="sec-meta">${buyCount} ${buyCount===1?'позиция':buyCount<5?'позиции':'позиций'} по поставщикам</span></div>
      </div>`+blocks;
    }
  }

  // Вкусы (аккордеон)
  const flavorEntries=Object.entries(byFlavor);
  if(flavorEntries.length){
    html+=`<div class="section">
      <div class="sec-head"><span class="sec-title">По вкусам</span><span class="sec-meta">ниже, если нужно проверить состав</span></div>
      <div>`;
    flavorEntries.sort((a,b)=>a[0].localeCompare(b[0],'ru')).forEach(([fname,{qty,items}],idx)=>{
      const specific=items.filter(it=>!BASE_INGREDIENTS.has(it.name));
      const isPrem=PREMIUM.has(fname);
      const isMono=MONO.has(fname);
      const tag=isMono?'<span class="flav-tag mono">моно</span>':'<span class="flav-tag dual">двойная</span>';
      html+=`<div class="flav-card" id="flav-${containerId}-${idx}">
        <div class="flav-head" onclick="toggleFlav('flav-${containerId}-${idx}')">
          <div class="flav-name${isPrem?' premium':''}">${escHtml(fname)}${tag}</div>
          <div class="flav-meta">${qty} шт · ${specific.length} ингр.</div>
          <div class="flav-chev">▾</div>
        </div>
        <div class="flav-body">${
          specific.length
            ? specific.map(({name,grams})=>renderIngredientRow(name,grams)).join('')
            : '<div style="padding:14px;font-size:12px;color:var(--muted);text-align:center">Только основа</div>'
        }</div>
      </div>`;
    });
    html+=`</div></div>`;
  }

  // Остатки (свёрнуто)
  html+=renderStockPanel(needs, containerId);

  document.getElementById(containerId).innerHTML=html;

  if(!flavorEntries.length){
    document.getElementById(containerId).innerHTML='<div class="empty-msg">План на этот период пуст</div>';
  }
}
function renderStockPanel(needs, containerId){
  const allItems=Object.entries(needs).filter(([,g])=>g>0).sort((a,b)=>a[0].localeCompare(b[0],'ru'));
  const hasAny=Object.keys(stockMap).length>0;
  let body=`<div class="stock-list">`;
  allItems.forEach(([name,grams])=>{
    const pr=PRICES[name];
    const sid=`stk-${containerId}-${name.replace(/[^a-zA-Zа-яА-ЯёЁ0-9]/g,'_')}`;
    const val=stockMap[name]||'';
    body+=`<div class="stock-item">
      <div class="si-name">${escHtml(name)}<div class="si-name-sub">нужно ${fmtG(grams)}</div></div>
      <input class="si-inp" id="${sid}" type="number" min="0" step="0.5" placeholder="0" value="${val}"
        oninput="onStockInput('${escHtml(name).replace(/'/g,"\\'")}', this.value, '${containerId}')">
      <span class="si-unit">${pr?'уп':'г'}</span>
    </div>`;
  });
  body+=`</div>`;
  if(hasAny){
    body+=`<button class="add-row-btn" style="margin-top:10px;color:var(--red);border-color:var(--red-light)" onclick="clearStock()">✕ Сбросить все остатки</button>`;
  }

  return `<div class="stock-panel${hasAny?' open':''}" id="stock-${containerId}">
    <div class="stock-head" onclick="toggleStock('stock-${containerId}')">
      <div>
        <div class="stock-title">Учесть остатки на складе${hasAny?` · ${Object.keys(stockMap).length} поз.`:''}</div>
        <div class="stock-title-sub">${hasAny?'сохранено на этом устройстве':'необязательно — пересчитает что купить'}</div>
      </div>
      <div class="stock-chev">▾</div>
    </div>
    <div class="stock-body">${body}</div>

}

function onStockInput(name,val,containerId){
  const v=parseFloat(val)||0;
  if(v>0) stockMap[name]=v; else delete stockMap[name];
  saveStock();
  // Перерисовываем активный экран (но сохраняем состояние свёрнутости)
  const openFlavs=new Set([...document.querySelectorAll('.flav-card.open')].map(el=>el.id));
  const openStock=document.getElementById('stock-'+containerId)?.classList.contains('open');
  // Перерисовка
  if(currentTab==='week') renderWeek();
  else if(currentTab==='day') renderDay();
  // Восстановить состояния
  openFlavs.forEach(id=>{const el=document.getElementById(id);if(el)el.classList.add('open');});
  if(openStock) document.getElementById('stock-'+containerId)?.classList.add('open');
  // Вернуть фокус в инпут
  const sid=`stk-${containerId}-${name.replace(/[^a-zA-Zа-яА-ЯёЁ0-9]/g,'_')}`;
  const inp=document.getElementById(sid);
  if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);}
}

function buildSupplierGroups(needs){
  // Возвращает { sasha:[{name,grams,m}], ashan:[...], ozon:[...], other:[...] }
  // Только позиции, которые надо купить (buy > 0).
  const groups={sasha:[],ashan:[],ozon:[],other:[]};
  Object.entries(needs).forEach(([name,grams])=>{
    const m=packMath(name,grams);
    if(m.covered) return; // уже есть на складе
    if(grams<=0) return;
    const sup=supplierOf(name);
    groups[sup].push({name,grams,m});
  });
  // Сортировка внутри группы по алфавиту
  Object.keys(groups).forEach(k=>groups[k].sort((a,b)=>a.name.localeCompare(b.name,'ru')));
  return groups;
}

function supplierCost(items){
  return items.reduce((sum,it)=>sum+(it.m?.cost||0),0);
}

function fmtSupplierLine(item){
  const {name,grams,m}=item;
  if(m.packs===null){
    return `• ${name} — ${fmtG(m.buyG)}`;
  }
  return `• ${name} — ${m.buyPacks} уп ×${m.packLabel}`;
}

function getPeriodLabel(containerId){
  if(containerId==='wk-content'&&PLAN_DATES.length){
    const s=parsePlanDate(PLAN_DATES[0]),e=parsePlanDate(PLAN_DATES[PLAN_DATES.length-1]);
    return `${s.getDate()}–${e.getDate()} ${e.toLocaleDateString('ru-RU',{month:'long'})}`;
  }
  if(containerId==='manual-content') return 'Ручной расчёт';
  return '';
}

function renderSupplierBlocks(needs, containerId){
  const groups=buildSupplierGroups(needs);
  const order=['sasha','ashan','ozon','other'];
  const blocks=order.filter(k=>groups[k].length>0);
  if(!blocks.length) return '';
  let html=`<div class="suppliers-wrap">`;

function setPlanStatus(text){

function fmtRelativeTime(d){
  const diff=Math.floor((Date.now()-d.getTime())/1000);
  if(diff<60) return 'только что';
  if(diff<3600) return Math.floor(diff/60)+' мин назад';
  if(diff<86400) return Math.floor(diff/3600)+' ч назад';
  return d.toLocaleDateString('ru-RU',{day:'numeric',month:'short'});
}

async function loadPlan(isManual){
  const btn=document.getElementById('refresh-btn');
  if(btn) btn.classList.add('loading');
  setPlanStatus(isManual?'Обновляю план...':'Загружаю план...');
  try{
    const r=await fetch(API+'?action=get_plan',{cache:'no-store'});
    const json=await r.json();
    if(!json.ok||!json.plan) throw new Error('Не удалось получить план');
    PLAN_DATA=json.plan;

    if(currentDayIdx>=PLAN_DATES.length) currentDayIdx=0;

const FRESH_INGREDIENTS = new Set(['Банан','Авокадо','Лимон','Лайм','Мята листья','Киви','Клубника ягода','Вишня ягода','Грепфрут']);

function parseLocalDate(v){
  const s=String(v||'').trim();
  let m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return new Date(Number(m[1]),Number(m[2])-1,Number(m[3]),0,0,0,0);
  m=s.match(/^(\d{2})\.(\d{2})\.(\d{4})/);
  if(m) return new Date(Number(m[3]),Number(m[2])-1,Number(m[1]),0,0,0,0);
  const d=new Date(s); if(!isNaN(d)){d.setHours(0,0,0,0);return d;}
  return null;
}
function localKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function sameLocalDay(a,b){return a&&b&&localKey(a)===localKey(b);}
function formatShortDate(d){return d?`${DAY_SHORT[d.getDay()]} ${d.getDate()} ${d.toLocaleDateString('ru-RU',{month:'long'})}`:'—';}
function formatRangeDates(dates){
  if(!dates||!dates.length) return 'Период не выбран';
  const a=parseLocalDate(dates[0]),b=parseLocalDate(dates[dates.length-1]);
  if(!a||!b) return 'Период';
  if(sameLocalDay(a,b)) return formatShortDate(a);
  const sameMonth=a.getMonth()===b.getMonth()&&a.getFullYear()===b.getFullYear();
  return sameMonth?`${a.getDate()}–${b.getDate()} ${b.toLocaleDateString('ru-RU',{month:'long'})}`:`${a.getDate()} ${a.toLocaleDateString('ru-RU',{month:'short'})} – ${b.getDate()} ${b.toLocaleDateString('ru-RU',{month:'short'})}`;
}
function sortedPlanDates(){return (PLAN_DATES||[]).slice().sort((a,b)=>parseLocalDate(a)-parseLocalDate(b));}
function getTodayPlanIndex(){
  const dates=sortedPlanDates(); if(!dates.length) return 0;
  const today=new Date(); today.setHours(0,0,0,0);
  let idx=dates.findIndex(ds=>sameLocalDay(parseLocalDate(ds),today));
  if(idx>=0) return idx;
  idx=dates.findIndex(ds=>parseLocalDate(ds)>=today);
  return idx>=0?idx:0;
}
function getRangeDates(mode){
  const dates=sortedPlanDates(); if(!dates.length) return [];
  const todayIdx=getTodayPlanIndex();
  if(mode==='today') return [dates[todayIdx]].filter(Boolean);
  if(mode==='tomorrow') return [dates[Math.min(todayIdx+1,dates.length-1)]].filter(Boolean);
  if(mode==='rest') return dates.slice(todayIdx);
  return dates;
}
function normProdDate(v){
  const d=parseLocalDate(v); if(!d) return String(v||'');
  return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+d.getFullYear();
}
function safeJsonSmart(v){try{return typeof v==='object'&&v!==null?v:JSON.parse(v||'{}');}catch(e){return {};}}
function parseProductionRows(rows){
  return (rows||[]).filter(r=>r&&r[0]).map(r=>({
    id:String(r[0]), person:String(r[1]||''), workType:String(r[2]||''), date:normProdDate(r[3]), dateObj:parseLocalDate(r[3]),
    flavors:safeJsonSmart(r[4]), newFlavors:Array.isArray(safeJsonSmart(r[5]))?safeJsonSmart(r[5]):[], total:Number(r[7]||0)
  })).filter(r=>r.dateObj).sort((a,b)=>b.dateObj-a.dateObj);
}
function ingredientStage(item){return DOUGH_INGREDIENTS.has(item.n)?'dough':'filling';}
function getWeekBounds(){
  const dates=sortedPlanDates(); if(!dates.length) return null;
  const start=parseLocalDate(dates[0]),end=parseLocalDate(dates[dates.length-1]);
  if(!start||!end) return null;
  start.setHours(0,0,0,0); end.setHours(23,59,59,999);
  return {start,end};
}
function getFactTotals(workType){
  const bounds=getWeekBounds(); const out={}; if(!bounds) return out;
  PROD_RECORDS.forEach(r=>{
    if(r.workType!==workType) return;
    if(r.dateObj<bounds.start||r.dateObj>bounds.end) return;
    Object.entries(r.flavors||{}).forEach(([name,qty])=>{out[name]=(out[name]||0)+Number(qty||0);});
    (r.newFlavors||[]).forEach(nf=>{if(nf&&nf.name)out[nf.name]=(out[nf.name]||0)+Number(nf.qty||0);});
  });
  return out;
}
function buildRemainingMap(){
  const dates=sortedPlanDates();
  const map={}; dates.forEach(ds=>map[ds]={});
  const planByFlavor={};
  dates.forEach(ds=>{
    const day=PLAN_DATA?.[ds]||{};
    Object.entries(day).forEach(([flavor,qty])=>{
      if(!planByFlavor[flavor]) planByFlavor[flavor]=[];
      planByFlavor[flavor].push({ds,qty:Number(qty||0)});
    });
  });
  const lepkaFact=getFactTotals('Лепка');
  const nachinkaFact=getFactTotals('Начинки');
  Object.entries(planByFlavor).forEach(([flavor,entries])=>{
    let lep=Number(lepkaFact[flavor]||0);
    entries.forEach(e=>{
      const used=Math.min(e.qty,lep); lep-=used;
      map[e.ds][flavor]={planQty:e.qty,lepkaDone:used,nachinkaDone:0,doughQty:e.qty-used,fillingQty:e.qty-used};
    });
    let nac=Number(nachinkaFact[flavor]||0);
    entries.forEach(e=>{
      const rec=map[e.ds][flavor];
      const available=Math.max(0,rec.planQty-rec.lepkaDone);
      const used=Math.min(available,nac); nac-=used;
      rec.nachinkaDone=used;
      rec.fillingQty=Math.max(0,available-used);
    });
  });
  return map;
}
function calcStageNeedsForDates(dates){
  const remaining=buildRemainingMap();
  const needs={},flavors={},stageStats={plan:0,dough:0,filling:0,lepkaDone:0,nachinkaDone:0};
  dates.forEach(ds=>{
    const day=remaining[ds]||{};
    Object.entries(day).forEach(([flavor,rec])=>{
      const r=RECIPES[flavor]; if(!r) return;
      stageStats.plan+=rec.planQty; stageStats.dough+=rec.doughQty; stageStats.filling+=rec.fillingQty; stageStats.lepkaDone+=rec.lepkaDone; stageStats.nachinkaDone+=rec.nachinkaDone;
      flavors[flavor]=(flavors[flavor]||0)+Math.max(rec.doughQty,rec.fillingQty);
      r.forEach(item=>{
        const qty=ingredientStage(item)==='dough'?rec.doughQty:rec.fillingQty;
        if(qty>0) needs[item.n]=(needs[item.n]||0)+item.w*qty;
      });
    });
  });
  return {needs,flavors,stageStats,dates};
}
function packLeftMath(name,grams,mode){
  const m=packMath(name,grams);
  const st=getPurchase(name);
  if(m.packs===null){
    const boughtG=Number(st.boughtG||0), orderedG=Number(st.orderedG||0);
    const closed=boughtG+(mode==='order'?orderedG:0)+(st.skip?m.buyG:0);
    const leftG=Math.max(0,m.buyG-closed);
    return {...m,leftG,leftPacks:null,closed:leftG<=0,ordered:orderedG,bought:boughtG,skip:!!st.skip,leftCost:0};
  }
  const ordered=Number(st.ordered||0), bought=Number(st.bought||0);
  const closed=bought+(mode==='order'?ordered:0)+(st.skip?m.buyPacks:0);
  const leftPacks=Math.max(0,m.buyPacks-closed);
  const packG=PRICES[name]?.pack||0;
  const leftG=leftPacks*packG;
  return {...m,leftPacks,leftG,leftCost:leftPacks*(PRICES[name]?PRICES[name].pack*PRICES[name].p:0),closed:leftPacks<=0,ordered,bought,skip:!!st.skip};
}
function buildSmartItems(needs,mode){
  return Object.entries(needs).map(([name,grams])=>{
    const m=packLeftMath(name,grams,mode);
    const pr=PRICES[name];
    const supplier=supplierOf(name);
    const leftQty=m.packs===null?m.leftG:m.leftPacks;
    const qtyLabel=m.packs===null?fmtG(m.leftG):`${m.leftPacks} уп ×${m.packLabel}`;
    const needLabel=m.packs===null?fmtG(m.buyG):`${m.buyPacks} уп ×${m.packLabel}`;
    const cost=m.packs===null?0:m.leftPacks*pr.pack*pr.p;
    return {name,grams,m,supplier,leftQty,qtyLabel,needLabel,cost,critical:BASE_INGREDIENTS.has(name)||DOUGH_INGREDIENTS.has(name),fresh:FRESH_INGREDIENTS.has(name),ozon:supplier==='ozon'};

    return a.name.localeCompare(b.name,'ru');
  });
}

function findIngredientByInput(input){

  let exact=names.find(n=>n.toLowerCase()===q); if(exact) return exact;

}

async function loadPlan(isManual){

    const [planResp,prodResp]=await Promise.all([
      fetch(API+'?action=get_plan',{cache:'no-store'}).then(r=>r.json()),
      fetch(API+'?action=get_production&limit=300',{cache:'no-store'}).then(r=>r.json()).catch(()=>null)
    ]);
    if(!planResp.ok||!planResp.plan) throw new Error('Не удалось получить план');
    PLAN_DATA=planResp.plan; PLAN_BASE=planResp.base||null; PLAN_DATES=Object.keys(PLAN_DATA).sort((a,b)=>parseLocalDate(a)-parseLocalDate(b)); PLAN_LOADED_AT=new Date();
    if(prodResp&&prodResp.ok) PROD_RECORDS=parseProductionRows(prodResp.rows||[]);
    currentSmartDayIdx=getTodayPlanIndex(); currentDayIdx=currentSmartDayIdx;
    setPlanStatus(`План ${PLAN_DATES.length} дн. · факт ${PROD_RECORDS.length} зап. · ${fmtRelativeTime(PLAN_LOADED_AT)}`);

}

  if(!val){list.style.display='none';return;}
  const matches=FLAVORS.filter(f=>f.toLowerCase().includes(val)).slice(0,8);
  if(!matches.length){list.style.display='none';return;}
  list.innerHTML=matches.map(f=>`<div class="ac-item" onmousedown="acSelect(${n},'${f.replace(/'/g,"\\'")}')">
    ${escHtml(f)}</div>`).join('');
  list.style.display='block';
}
function acSelect(n,val){
  document.getElementById('mn-'+n).value=val;
  document.getElementById('ac-'+n).style.display='none';
  document.getElementById('mq-'+n)&&document.getElementById('mq-'+n).focus();
}
function acBlur(n){setTimeout(()=>{const l=document.getElementById('ac-'+n);if(l)l.style.display='none';},150);}
function calcManual(){
  const flavors={};
  document.querySelectorAll('.manual-row').forEach(row=>{
    const id=row.id.replace('mr-','');
    const name=document.getElementById('mn-'+id)?.value.trim();
    const qty=parseInt(document.getElementById('mq-'+id)?.value)||0;
    if(name&&qty>0&&RECIPES[name]) flavors[name]=(flavors[name]||0)+qty;
  });
  if(!Object.keys(flavors).length){showToast('Добавь хотя бы один вкус',true);return;}
  lastManualFlavors=flavors;
  const total=Object.values(flavors).reduce((s,q)=>s+q,0);
  renderPlanContentManual(flavors,'manual-content',total,'Ручной расчёт');
}
function renderPlanContentManual(flavors, containerId, totalQty, periodLabel){
  // Аналог renderPlanContent, но без summary-bar над контентом
  const needs=calcNeeds(flavors);
  const byFlavor=calcByFlavor(flavors);
  const baseItems=[],flavorOnlyNeeds={};
  Object.entries(needs).forEach(([n,g])=>{if(BASE_INGREDIENTS.has(n))baseItems.push({name:n,grams:g});else flavorOnlyNeeds[n]=g;});
  baseItems.sort((a,b)=>a.name.localeCompare(b.name,'ru'));
  let totalCost=0,actualCost=0,buyCount=0;
  Object.entries(needs).forEach(([n,g])=>{const m=packMath(n,g);if(!m.covered){totalCost+=m.cost;actualCost+=m.actualCost;buyCount++;}});
  const leftover=totalCost-actualCost;
  const perPiece = totalQty>0 ? actualCost/totalQty : 0;
  const premQty=Object.entries(flavors).filter(([n])=>PREMIUM.has(n)).reduce((s,[,q])=>s+q,0);
  let html='';
  html+=`<div class="summary-bar" style="margin-top:14px"><div class="sb-left">
    <div class="sb-period">${escHtml(periodLabel)}</div>
    <div class="sb-total">${totalQty} шт · ${Object.keys(flavors).length} вкус(ов)
      <div class="sb-stat">~${perPiece.toFixed(1)} ₽/моти${premQty?` · <span class="prem">${premQty} премиум</span>`:''}</div>
    </div>
  </div><div class="sb-cost"><div class="sb-cost-label">Закупка</div>
    <div class="sb-cost-val">${Math.round(totalCost).toLocaleString('ru-RU')} ₽
      ${leftover>500?`<div class="sb-cost-sub">в запас ~${Math.round(leftover).toLocaleString('ru-RU')} ₽</div>`:''}
    </div>
  </div></div>`;
  if(baseItems.length){
    html+=`<div class="section"><div class="sec-head"><span class="sec-title">Основа</span><span class="sec-meta">${baseItems.length} позиций · в каждом замесе</span></div>
      <div class="ing-card">${baseItems.map(({name,grams})=>renderIngredientRow(name,grams)).join('')}</div></div>`;
  }
  const flavorEntries=Object.entries(byFlavor);
  if(flavorEntries.length){
    html+=`<div class="section"><div class="sec-head"><span class="sec-title">По вкусам</span><span class="sec-meta">нажми, чтобы раскрыть</span></div><div>`;
    flavorEntries.sort((a,b)=>a[0].localeCompare(b[0],'ru')).forEach(([fname,{qty,items}],idx)=>{
      const specific=items.filter(it=>!BASE_INGREDIENTS.has(it.name));
      const isPrem=PREMIUM.has(fname);
      const isMono=MONO.has(fname);
      const tag=isMono?'<span class="flav-tag mono">моно</span>':'<span class="flav-tag dual">двойная</span>';
      html+=`<div class="flav-card" id="flav-${containerId}-${idx}">
        <div class="flav-head" onclick="toggleFlav('flav-${containerId}-${idx}')">
          <div class="flav-name${isPrem?' premium':''}">${escHtml(fname)}${tag}</div>
          <div class="flav-meta">${qty} шт · ${specific.length} ингр.</div><div class="flav-chev">▾</div></div>
        <div class="flav-body">${specific.length?specific.map(({name,grams})=>renderIngredientRow(name,grams)).join(''):'<div style="padding:14px;font-size:12px;color:var(--muted);text-align:center">Только основа</div>'}</div>
      </div>`;
    });
    html+=`</div></div>`;
  }
  // Блоки поставщиков
  const supBlocks=renderSupplierBlocks(needs, containerId);
  if(supBlocks){
    html+=`<div class="section">
      <div class="sec-head"><span class="sec-title">К закупке</span><span class="sec-meta">${buyCount} ${buyCount===1?'позиция':buyCount<5?'позиции':'позиций'} по поставщикам</span></div>
    </div>`+supBlocks;
  }
  html+=renderStockPanel(needs, containerId);
  document.getElementById(containerId).innerHTML=html;
}

// ── INIT ───────────────────────────────────────────────────────────────────
addManualRow();addManualRow();addManualRow();
loadPlan(false);
</script>
