<body>
<div class="app">
  <div class="header">
    <div class="header-badge"><div class="header-dot"></div><span>OMOTI · продукты</span></div>
    <div class="header-title">Закупка без лишнего</div>
    <div class="header-sub"><span id="status">Загружаю план...</span><button class="refresh-btn" onclick="loadAll(true)">↻ Обновить</button></div>
    <div class="tabs">
      <button class="tab active" data-tab="now" onclick="switchTab('now')">Сейчас</button>
      <button class="tab" data-tab="lists" onclick="switchTab('lists')">Списки</button>
      <button class="tab" data-tab="days" onclick="switchTab('days')">Дни</button>
      <button class="tab" data-tab="more" onclick="switchTab('more')">Ещё</button>
    </div>
  </div>

  <div class="screen active" id="screen-now"></div>
  <div class="screen" id="screen-lists"></div>
  <div class="screen" id="screen-days"></div>
  <div class="screen" id="screen-more"></div>
</div>

<div class="modal-back" id="modal-back" onclick="closeModal()"></div>

<div class="toast" id="toast"></div>

<script>
const API='https://script.google.com/macros/s/AKfycbyItLqVWxgGSYuWXc4HT6qtaSeDwSeRqv67dJBFBPaLWFbXxKSIyl9jq_q4i3WT4IPC/exec';

// План загружается с сервера. Структура: { 'YYYY-MM-DD': { 'Вкус': qty, ... }, ... }
let PLAN_DATA = null;  // заполнится после fetch
let PLAN_DATES = [];   // массив дат недели
let PLAN_LOADED_AT = null;

function dateStr(d){
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function parsePlanDate(ds){
  const parts=String(ds).split('-').map(Number);
  if(parts.length===3 && parts.every(Number.isFinite)){
    return new Date(parts[0], parts[1]-1, parts[2]);
  }
  const d=new Date(ds);
  return Number.isNaN(d.getTime()) ? new Date() : d;
}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}

const PREMIUM=new Set(['Дубайский шоколад','Криспи','Мандарин','Пряник']);

// Моно-начинка (только однослойная, без сердцевины)
const MONO=new Set(['Кокосовый пломбир','Смородина','Шоколад']);

// Справочник поставщиков
const SUPPLIERS = {
  sasha:  { label: 'Саша',   color: '#2d7a3a', bg: '#e8f5e9' },
  ashan:  { label: 'Ашан',   color: '#e07c1a', bg: '#fff3e0' },
  ozon:   { label: 'Озон',   color: '#1a8c78', bg: '#e0f5f1' },
  other:  { label: 'Без поставщика', color: '#7a967a', bg: '#f0f4f0' },
};

// Карта: ингредиент → поставщик
const SUPPLIER_MAP = {
  // === Саша ===
  'Творожный сыр':'sasha', 'Сливки':'sasha', 'Масло сливочное':'sasha', 'Сухое молоко':'sasha',
  'Молочный шоколад':'sasha', 'Темный шоколад':'sasha', 'Белый шоколад':'sasha',
  'Фисташковая паста':'sasha', 'Арахис драблённый':'sasha',
  'Клубника пюре':'sasha', 'Малина пюре':'sasha', 'Манго пюре':'sasha', 'Дыня пюре':'sasha',

  'Яблочное пюре':'sasha', 'Гуава пюре':'sasha',
  'Мука рисовая':'sasha', 'Крахмал кукурузный':'sasha', 'Сахарная пудра':'sasha',
  'Инв. сироп':'sasha', 'Желатин':'sasha', 'Пектин':'sasha',
  'Криспи':'sasha', 'Кокос стружка':'sasha', 'Катаифи тесто':'sasha',
  'Сгущёнка':'sasha',
  // === Ашан ===
  'Сахар':'ashan', 'Масло растительное':'ashan', 'Маршмелоу':'ashan', 'Тримолин':'ashan',
  'Ванильная паста':'ashan', 'Шоколадная паста':'ashan', 'Тахини паста':'ashan', 'Арахисовая паста':'ashan',
  'Кокао':'ashan', 'Сыр белый (бри)':'ashan', 'Сыр голубой (блю)':'ashan',
  'Кофе':'ashan', 'Карамель':'ashan', 'Бобы тонка':'ashan', 'Крекер тук':'ashan', 'Матча':'ashan',
  'Желток':'ashan', 'Мука пшеничная':'ashan',
  'Лимон':'ashan', 'Лимон варенье':'ashan', 'Смородина варенье':'ashan', 'Алоэ варенье':'ashan',
  'Банан':'ashan', 'Грепфрут':'ashan', 'Киви':'ashan', 'Клубника ягода':'ashan',
  'Вишня ягода':'ashan', 'Мята листья':'ashan', 'Авокадо':'ashan', 'Лайм':'ashan',
  // === Озон ===
  'Бабл Гам сироп':'ozon', 'Лайм сироп':'ozon', 'Мята сироп':'ozon',
  'Арбуз сироп':'ozon', 'Зелёное яблоко сироп':'ozon', 'Глюкозный сироп':'ozon',
};
function supplierOf(name){ return SUPPLIER_MAP[name] || 'other'; }

// Свежие продукты — лучше брать ближе ко дню лепки, чтоб не выкидывать
const FRESH=new Set(['Банан','Мята листья','Лимон','Лайм','Киви','Клубника ягода','Вишня ягода']);

// «Основа» — фикс-список ингредиентов, что в почти каждой моти.
// Эти продукты не помечаются "для X" — они идут в любой замес.
const BASE_INGREDIENTS=new Set([
  'Творожный сыр','Мука рисовая','Сахар','Сливки',
  'Крахмал кукурузный','Масло растительное','Инв. сироп','Сахарная пудра'
]);

// Для какого вкуса используется данный ингредиент.
// Возвращает массив имён вкусов, отсортированный.
function flavorsForIngredient(name, flavorsInPlan){
  // flavorsInPlan - объект {вкус: qty}. Если задан, фильтруем только по тем, что в плане.
  const found=[];
  Object.entries(RECIPES).forEach(([fname,items])=>{
    if(flavorsInPlan && !(fname in flavorsInPlan)) return;
    if(items.some(it=>it.n===name)) found.push(fname);
  });
  return found.sort((a,b)=>a.localeCompare(b,'ru'));
}

// ── РЕЦЕПТУРЫ (граммы на 1 шт) — берём как есть из текущего файла ───────────
const RECIPES={

  'Бабл Гам':[{g:'1. Молочные',n:'Сливки',w:3.3333},{g:'1. Молочные',n:'Творожный сыр',w:13.3333},{g:'3. Сиропы',n:'Бабл Гам сироп',w:2.6667},{g:'8. Подсластители',n:'Маршмелоу',w:2},{g:'8. Подсластители',n:'Сахар',w:8.2},{g:'8. Подсластители',n:'Тримолин',w:1.3333},{g:'9. Основа',n:'Крахмал кукурузный',w:0.6667},{g:'9. Основа',n:'Мука рисовая',w:6.8667},{g:'Прочее',n:'Желатин',w:1.16},{g:'Прочее',n:'Масло растительное',w:0.8}],

function getState(name){return STATE[name]||{}}
function setState(name,patch){const cur=getState(name);STATE[name]={...cur,...patch,updatedAt:Date.now()};['stock','bought','ordered'].forEach(k=>{if(Number(STATE[name][k]||0)<=0)delete STATE[name][k]});if(!STATE[name].stock&&!STATE[name].bought&&!STATE[name].ordered&&!STATE[name].skip)delete STATE[name];saveState();render()}
function escHtml(s){return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;')}
function escJs(s){return String(s).replaceAll('\\','\\\\').replaceAll("'","\\'")}
function showToast(txt,err){const el=document.getElementById('toast');el.textContent=txt;el.className='toast show'+(err?' err':'');clearTimeout(showToast.t);showToast.t=setTimeout(()=>el.classList.remove('show'),2200)}
function setStatus(txt){document.getElementById('status').textContent=txt}
function fmtMoney(v){return Math.round(v||0).toLocaleString('ru-RU')+' ₽'}
function fmtG(g){g=Number(g||0);if(g>=1000)return (g/1000).toFixed(g>=10000?0:1).replace(/\.0$/,'')+' кг';return Math.round(g)+' г'}
function fmtPack(p){return p>=1000?(p/1000).toFixed(p%1000===0?0:2).replace(/\.00$/,'')+' кг':p+' г'}
function parseLocalDate(v){const s=String(v||'').trim();let m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);if(m)return new Date(+m[1],+m[2]-1,+m[3]);m=s.match(/^(\d{2})\.(\d{2})\.(\d{4})/);if(m)return new Date(+m[3],+m[2]-1,+m[1]);const d=new Date(s);if(!isNaN(d)){d.setHours(0,0,0,0);return d}return null}
function localKey(d){return d?d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'):''}
function sameDay(a,b){return localKey(a)===localKey(b)}
function formatDate(d){return d?`${DAY_SHORT[d.getDay()]} ${d.getDate()} ${RU_MONTHS_GEN[d.getMonth()]}`:'—'}
function formatRange(dates){if(!dates.length)return 'Период пустой';const a=parseLocalDate(dates[0]),b=parseLocalDate(dates[dates.length-1]);if(sameDay(a,b))return formatDate(a);if(a.getMonth()===b.getMonth())return `${a.getDate()}–${b.getDate()} ${RU_MONTHS_GEN[b.getMonth()]}`;return `${a.getDate()} ${RU_MONTHS_GEN[a.getMonth()]} – ${b.getDate()} ${RU_MONTHS_GEN[b.getMonth()]}`}
function normDate(v){const d=parseLocalDate(v);return d?String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+d.getFullYear():String(v||'')}
function safeJson(v){try{return typeof v==='object'&&v!==null?v:JSON.parse(v||'{}')}catch(e){return {}}}
function parseRecords(rows){return (rows||[]).filter(r=>r&&r[0]).map(r=>({id:String(r[0]),person:String(r[1]||''),workType:String(r[2]||''),date:normDate(r[3]),flavors:safeJson(r[4]),newFlavors:safeJson(r[5])||[],total:Number(r[7]||0)}))}
function sortedDates(){return (PLAN_DATES||[]).slice().sort((a,b)=>parseLocalDate(a)-parseLocalDate(b))}
function todayIndex(){const dates=sortedDates();if(!dates.length)return 0;const t=new Date();t.setHours(0,0,0,0);let i=dates.findIndex(ds=>sameDay(parseLocalDate(ds),t));if(i>=0)return i;i=dates.findIndex(ds=>parseLocalDate(ds)>=t);return i>=0?i:0}
function rangeDates(mode){const d=sortedDates();if(!d.length)return [];const i=todayIndex();if(mode==='today')return [d[i]].filter(Boolean);if(mode==='tomorrow')return [d[Math.min(i+1,d.length-1)]].filter(Boolean);if(mode==='rest')return d.slice(i);return d}
function planQtyForDates(dates){const out={};dates.forEach(ds=>{const p=PLAN_DATA?.[ds]||{};Object.entries(p).forEach(([f,q])=>{out[f]=(out[f]||0)+Number(q||0)})});return out}
function weekBounds(){const dates=sortedDates();if(!dates.length)return [null,null];return [parseLocalDate(dates[0]),parseLocalDate(dates[dates.length-1])]}
function factTotals(){const [from,to]=weekBounds();const lepka={},nachinka={};if(!from||!to)return {lepka,nachinka};PROD_RECORDS.forEach(r=>{const d=parseLocalDate(r.date);if(!d||d<from||d>to)return;const tgt=r.workType==='Лепка'?lepka:(r.workType==='Начинки'?nachinka:null);if(!tgt)return;Object.entries(r.flavors||{}).forEach(([f,q])=>{tgt[f]=(tgt[f]||0)+Number(q||0)});(r.newFlavors||[]).forEach(nf=>{tgt[nf.name]=(tgt[nf.name]||0)+Number(nf.qty||0)})});return {lepka,nachinka}}
function overproduction(){
  // Вкусы, по которым факт лепки превышает план
  const facts=factTotals();
  const planByFlavor={};
  sortedDates().forEach(ds=>{Object.entries(PLAN_DATA?.[ds]||{}).forEach(([f,q])=>{planByFlavor[f]=(planByFlavor[f]||0)+Number(q||0)})});
  const over=[];
  Object.entries(facts.lepka).forEach(([f,q])=>{const plan=planByFlavor[f]||0;if(q>plan)over.push({name:f,plan,fact:q,extra:q-plan})});
  return over;
}
function remainingByDay(){const dates=sortedDates(),facts=factTotals(),lf={...facts.lepka},nf={...facts.nachinka},out={};dates.forEach(ds=>{out[ds]={};Object.entries(PLAN_DATA?.[ds]||{}).forEach(([f,qty0])=>{let qty=Number(qty0||0);const usedL=Math.min(qty,lf[f]||0);qty-=usedL;lf[f]=(lf[f]||0)-usedL;let fill=qty;const usedN=Math.min(fill,nf[f]||0);fill-=usedN;nf[f]=(nf[f]||0)-usedN;out[ds][f]={plan:Number(qty0||0),dough:qty,filling:fill}})});return out}
function calcNeedsForDates(dates){const rem=remainingByDay();const needs={};let planTotal=0,doughTotal=0,fillTotal=0;dates.forEach(ds=>{Object.entries(rem[ds]||{}).forEach(([f,r])=>{planTotal+=r.plan;doughTotal+=r.dough;fillTotal+=r.filling;const rec=RECIPES[f];if(!rec)return;rec.forEach(it=>{const qty=DOUGH_INGREDIENTS.has(it.n)?r.dough:r.filling;if(qty>0)needs[it.n]=(needs[it.n]||0)+it.w*qty})})});return {needs,planTotal,doughTotal,fillTotal}}
function unitInfo(name){const pr=PRICES[name];return pr?{pack:pr.pack,unit:'уп',price:pr.p,packLabel:fmtPack(pr.pack)}:{pack:1,unit:'г',price:0,packLabel:'г'}}
function lineFor(name,grams){const u=unitInfo(name),st=getState(name);const needUnits=Math.ceil((grams||0)/u.pack);const stock=Number(st.stock||0),bought=Number(st.bought||0),ordered=Number(st.ordered||0);const physical=Math.max(0,grams-(stock+bought)*u.pack);const needPhysical=Math.ceil(physical/u.pack);const action=Math.max(0,needPhysical-ordered);const cost=action*u.pack*u.price;return {name,grams,needUnits,stock,bought,ordered,needPhysical,action,cost,pack:u.pack,unit:u.unit,packLabel:u.packLabel,price:u.price,covered:action<=0,physCovered:needPhysical<=0}}
function groupLines(needs){
  const groups={
    sasha:{base:[],flavor:[]},
    ashan:{base:[],flavor:[]},
    ozon:{base:[],flavor:[]},
    other:{base:[],flavor:[]}
  };
  Object.entries(needs).forEach(([n,g])=>{
    const line=lineFor(n,g);
    if(line.action<=0)return;
    const sup=supplierOf(n);
    const bucket=BASE_INGREDIENTS.has(n)?'base':'flavor';
    groups[sup][bucket].push(line);
  });
  // Сортировка: основа по алфавиту, вкусовые по алфавиту
  Object.keys(groups).forEach(k=>{
    groups[k].base.sort((a,b)=>a.name.localeCompare(b.name,'ru'));
    groups[k].flavor.sort((a,b)=>a.name.localeCompare(b.name,'ru'));
    // Для совместимости со старым кодом - объединённый items
    groups[k].items=[...groups[k].base,...groups[k].flavor];
  });
  return groups;
}
function groupTotals(groups){
  const out={};
  Object.keys(groups).forEach(k=>{
    const items=groups[k].items||[];
    out[k]={count:items.length,cost:items.reduce((s,x)=>s+x.cost,0),units:items.reduce((s,x)=>s+x.action,0)};
  });
  return out;
}
function allCurrentLines(dates){const {needs}=calcNeedsForDates(dates);return Object.entries(needs).map(([n,g])=>lineFor(n,g)).filter(l=>l.needUnits>0).sort((a,b)=>a.name.localeCompare(b.name,'ru'))}
function accountedLines(){return Object.entries(STATE).map(([name,s])=>({name,...s})).filter(x=>x.stock||x.bought||x.ordered||x.skip).sort((a,b)=>a.name.localeCompare(b.name,'ru'))}
function switchTab(tab){currentTab=tab;document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+tab).classList.add('active');render()}
function render(){if(currentTab==='now')renderNow();else if(currentTab==='lists')renderLists();else if(currentTab==='days')renderDays();else renderMore()}
function renderNow(){
  const el=document.getElementById('screen-now');
  if(!PLAN_DATA||!PLAN_DATES.length){el.innerHTML='<div class="empty">План пока не загружен</div>';return}

  const dates=rangeDates('today');
  const calc=calcNeedsForDates(dates);
  const groups=groupLines(calc.needs);
  const totals=groupTotals(groups);
  const ds=dates[0];
  const dayPlan=PLAN_DATA[ds]||{};
  const dayDate=parseLocalDate(ds);
  const isToday=sameDay(dayDate,new Date());

  let html=`<div class="hero">
    <div class="hero-kicker">${isToday?'Сегодня':'Ближайший план'}</div>
    <div class="hero-title">${formatDate(dayDate)}</div>
    <div class="hero-sub">${calc.planTotal} моти · ${Object.keys(dayPlan).length} вкус(ов)${calc.planTotal!==calc.doughTotal||calc.planTotal!==calc.fillTotal?'. Уже сделанное вычтено.':''}</div>
  </div>`;

  // Плашка про заказы, которые ждут приёмки
  const orderedCount=accountedLines().filter(x=>x.ordered).length;
  if(orderedCount){
    html+=`<div class="notice" onclick="openArrivedModal()" style="cursor:pointer">
      <div class="notice-title">🔔 Ждёт приёмки</div>
      <div class="notice-text">${orderedCount} ${orderedCount===1?'позиция':orderedCount<5?'позиции':'позиций'} заказано. Открыть отметку «приехало».</div>
    </div>`;
  }

  // Плашка про переработку (факт > план)
  const over=overproduction();
  if(over.length){
    const sample=over.slice(0,2).map(x=>`${x.name} +${x.extra}`).join(', ');
    html+=`<div class="notice">
      <div class="notice-title">ℹ Переработали по плану</div>
      <div class="notice-text">${sample}${over.length>2?` и ещё ${over.length-2}`:''}. Излишек уйдёт в запас.</div>
    </div>`;
  }

  const hasAny=SUP_ORDER.some(k=>totals[k].count>0);
  if(!hasAny){
    html+='<div class="empty">На ближайший день закупка закрыта. Ничего срочного не вижу.</div>';
  }else{
    html+=`<div class="section">
      <div class="section-head"><div class="section-title">Что сделать сейчас</div><div class="section-meta">на ближайший день</div></div>
      ${SUP_ORDER.map(k=>renderSupplierAction(k,groups[k],totals[k],'today')).join('')}
    </div>`;
  }

  html+=renderWeekSummary();

  const acc=accountedLines();
  html+=`<div class="bottom-actions"><button class="btn light" onclick="openAddModal()">У меня это есть</button><button class="btn light" onclick="openListsFor('today')">Списки на день</button></div>`;
  if(acc.length){
    html+=`<div class="section"><div class="section-head"><div class="section-title">Уже учтено</div><div class="section-meta">${acc.length} поз.</div></div><div class="soft-list">${acc.slice(0,4).map(renderAccountedRow).join('')}${acc.length>4?`<div class="soft-row"><span class="soft-name muted">Ещё ${acc.length-4} позиций</span><span class="soft-val">в Ещё</span></div>`:''}</div></div>`;
  }
  el.innerHTML=html;
}
function renderWeekSummary(){
  const dates=rangeDates('week');
  if(!dates.length)return '';
  const calc=calcNeedsForDates(dates);
  const groups=groupLines(calc.needs);
  const totals=groupTotals(groups);
  const totalCost=Object.values(totals).reduce((s,x)=>s+x.cost,0);
  const rows=['sasha','ashan','ozon'].map(k=>renderWeekSupplierRow(k,totals[k]||{count:0,cost:0})).join('');
  const other=(totals.other&&totals.other.count)?renderWeekSupplierRow('other',totals.other):'';
  return `<div class="section">
    <div class="section-head"><div class="section-title">На всю неделю</div><div class="section-meta">чтобы не искать</div></div>
    <div class="soft-list">
      <div class="soft-row"><span class="soft-name"><b>${formatRange(dates)}</b><br><span class="muted">${calc.planTotal} моти · ${dates.length} дн.</span></span><span class="week-total">${fmtMoney(totalCost)}</span></div>
      ${rows}${other}
    </div>
    <div class="bottom-actions" style="margin-left:0;margin-right:0"><button class="btn primary" onclick="openListsFor('week')">Открыть неделю</button></div>
  </div>`;
}
function renderWeekSupplierRow(key,total){
  const ui=SUP_UI[key];
  const desc=total.count?`${total.count} поз.`:'ничего не нужно';
  return `<div class="soft-row week-row" onclick="openSupplierList('${key}','week')"><span class="soft-name"><b>${ui.short}</b><br><span class="muted">${desc}</span></span><span class="soft-val">${fmtMoney(total.cost)}</span></div>`;
}

function renderSupplierAction(key,items,total,mode){
  const ui=SUP_UI[key];
  if(!total||!total.count)return `<div class="supplier-card ${ui.cls}"><div class="supplier-main"><div class="supplier-info"><div class="supplier-name">${ui.title}</div><div class="supplier-desc">ничего не нужно</div></div></div></div>`;
  const btnClass=key==='ashan'?'amber':(key==='ozon'?'teal':'primary');
  const openLabel=key==='sasha'?'Список Саши':(key==='ashan'?'Список магазина':(key==='ozon'?'Список Озона':'Открыть список'));
  const mainLabel=key==='sasha'?'Скопировать':'Открыть список';
  const mainAction=key==='sasha'?`copyAndAsk('${key}')`:`openSupplierList('${key}','${mode||'today'}')`;
  const secondAction=key==='sasha'?`openSupplierList('${key}','${mode||'today'}')`:`copyAndAsk('${key}')`;
  const secondLabel=key==='sasha'?openLabel:'Скопировать';
  return `<div class="supplier-card ${ui.cls}">
    <div class="supplier-main"><div class="supplier-info"><div class="supplier-name">${ui.title}</div><div class="supplier-desc">${total.count} поз. · примерно ${fmtMoney(total.cost)}</div></div><div class="supplier-sum"><div class="supplier-price">${fmtMoney(total.cost)}</div><div class="supplier-count">${total.count} поз.</div></div></div>
    <div class="card-actions"><button class="btn ${btnClass}" onclick="${mainAction}">${mainLabel}</button><button class="btn light" onclick="${secondAction}">${secondLabel}</button></div>
  </div>`;

function openListsFor(mode){listMode=mode;CUSTOM_DATES=null;openedSupplier='sasha';switchTab('lists')}
function openSupplierList(key,mode){if(mode){listMode=mode;if(mode!=='custom')CUSTOM_DATES=null;}openedSupplier=key;if(currentTab!=='lists')switchTab('lists');else renderLists();setTimeout(()=>{const el=document.getElementById('list-'+key);if(el){el.classList.add('open');el.scrollIntoView({block:'nearest',behavior:'smooth'});}},0)}
function renderLists(){
  const el=document.getElementById('screen-lists');
  if(!PLAN_DATA||!PLAN_DATES.length){el.innerHTML='<div class="empty">План пока не загружен</div>';return}
  const dates=rangeDates(listMode);
  const calc=calcNeedsForDates(dates);
  const groups=groupLines(calc.needs);
  const totals=groupTotals(groups);
  const totalCost=Object.values(totals).reduce((s,x)=>s+x.cost,0);
  const flavorsInPlan=planQtyForDates(dates);
  let html=`<div class="chips">${Object.entries(RANGE_LABELS).map(([k,v])=>`<button class="chip ${listMode===k?'active':''}" onclick="listMode='${k}';CUSTOM_DATES=null;renderLists()">${v}</button>`).join('')}</div>
  <div class="hero"><div class="hero-kicker">${RANGE_LABELS[listMode]||'Выбранный день'}</div><div class="hero-title">${formatRange(dates)}</div><div class="hero-sub">${calc.planTotal} моти · осталось к закупке примерно ${fmtMoney(totalCost)}</div></div>`;
  html+=`<div class="section"><div class="section-head"><div class="section-title">Списки</div><div class="section-meta">открывай по одному</div></div>${SUP_ORDER.map(k=>renderListCard(k,groups[k]||{base:[],flavor:[],items:[]},totals[k]||{count:0,cost:0},flavorsInPlan)).join('')}</div>`;
  html+=`<div class="bottom-actions"><button class="btn light" onclick="openAddModal()">Добавить остаток</button><button class="btn light" onclick="switchTab('more')">Уже учтено</button></div>`;
  el.innerHTML=html;
  const open=document.getElementById('list-'+openedSupplier);if(open)open.classList.add('open');
}
function renderListCard(key,group,total,flavorsInPlan){
  const ui=SUP_UI[key];
  const open=openedSupplier===key?' open':'';
  const btnClass=key==='ashan'?'amber':(key==='ozon'?'teal':'primary');
  const base=group.base||[];
  const flavor=group.flavor||[];
  const hasAny=base.length||flavor.length;
  // Подзаголовок: "Основа 6 · Под вкусы 7" или "пусто"
  let subText='пусто';
  if(hasAny){
    const parts=[];
    if(base.length) parts.push(`Основа ${base.length}`);
    if(flavor.length) parts.push(`Под вкусы ${flavor.length}`);
    subText=parts.join(' · ');
  }
  let bodyInner='';
  if(hasAny){
    bodyInner+=`<div class="card-actions" style="padding-top:12px"><button class="btn ${btnClass}" onclick="event.stopPropagation();copyAndAsk('${key}')">Скопировать</button><button class="btn light" onclick="event.stopPropagation();markSupplier('${key}','${ui.kind}')">${ui.done} всё</button></div>`;
    if(base.length){
      bodyInner+=`<div class="list-section-label">Основа · нужна для каждой моти</div>`;
      bodyInner+=base.map(it=>renderItem(key,it,null,true)).join('');
    }
    if(flavor.length){
      // Делим на "только для одного вкуса" и "общие для нескольких"
      const single={};   // {flavor: [items]}
      const shared=[];   // [items с >1 вкусом]
      flavor.forEach(it=>{
        const flavs=flavorsForIngredient(it.name,flavorsInPlan);
        if(flavs.length===1){
          const f=flavs[0];
          if(!single[f]) single[f]=[];
          single[f].push(it);
        } else if(flavs.length>1){
          shared.push({it,flavs});
        } else {
          // вкусов нет в плане - редкий кейс, в shared без подписи
          shared.push({it,flavs:[]});
        }
      });
      const singleFlavors=Object.keys(single).sort((a,b)=>a.localeCompare(b,'ru'));
      if(singleFlavors.length){
        bodyInner+=`<div class="list-section-label">Под конкретные вкусы</div>`;
        singleFlavors.forEach(f=>{
          bodyInner+=`<div class="flavor-group-label">${escHtml(f)}</div>`;
          bodyInner+=single[f].map(it=>renderItem(key,it,null,true)).join('');
        });
      }
      if(shared.length){
        bodyInner+=`<div class="list-section-label">Общие для нескольких вкусов</div>`;
        shared.sort((a,b)=>a.it.name.localeCompare(b.it.name,'ru'));
        bodyInner+=shared.map(({it,flavs})=>renderItem(key,it,flavorsInPlan,false,flavs)).join('');
      }
    }
  } else {
    bodyInner=`<div class="empty" style="box-shadow:none;margin:0;border-radius:0">По этому поставщику ничего не нужно</div>`;
  }
  return `<div class="list-card ${ui.cls}${open}" id="list-${key}"><div class="list-head" onclick="toggleList('${key}')"><div class="list-head-title"><div class="list-title">${ui.title}</div><div class="list-sub">${subText}</div></div><div class="list-total"><div class="sum">${fmtMoney(total.cost)}</div><div class="open">открыть</div></div></div><div class="list-body">${bodyInner}</div></div>`;
}
function toggleList(key){openedSupplier=openedSupplier===key?'':key;renderLists()}
function renderItem(key,it,flavorsInPlan,hideFor,presetFlavs){
  const note=[`нужно ${fmtG(it.grams)}`,`упаковка ${it.packLabel}`];
  if(it.stock)note.push(`есть ${it.stock} ${it.unit}`);
  if(it.bought)note.push(`куплено ${it.bought} ${it.unit}`);
  if(it.ordered)note.push(`заказано ${it.ordered} ${it.unit}`);
  let extraLines='';
  if(!hideFor){
    const flavs=presetFlavs||(flavorsInPlan?flavorsForIngredient(it.name,flavorsInPlan):null);
    if(flavs&&flavs.length){
      if(flavs.length<=3) extraLines+=`<div class="item-for">для: ${flavs.map(escHtml).join(', ')}</div>`;
      else extraLines+=`<div class="item-for">для ${flavs.length} вкусов</div>`;
    }
  }
  if(FRESH.has(it.name)){
    extraLines+=`<div class="item-fresh">🌿 лучше брать ближе ко дню лепки</div>`;
  }
  return `<div class="item" onclick="openEditModal('${escJs(it.name)}',${it.grams})"><div class="item-main"><div class="item-name">${escHtml(it.name)}</div><div class="item-note">${note.join(' · ')}</div>${extraLines}</div><div class="item-qty">${it.action} ${it.unit}</div><button class="item-edit" onclick="event.stopPropagation();openEditModal('${escJs(it.name)}',${it.grams})">изм.</button></div>`;
}
function renderDays(){const el=document.getElementById('screen-days');if(!PLAN_DATA||!PLAN_DATES.length){el.innerHTML='<div class="empty">План пока не загружен</div>';return}let html=`<div class="section"><div class="section-head"><div class="section-title">Дни</div><div class="section-meta">что не закрыто</div></div>`;sortedDates().forEach(ds=>{const date=parseLocalDate(ds);const calc=calcNeedsForDates([ds]);const groups=groupLines(calc.needs);const totals=groupTotals(groups);const count=Object.values(totals).reduce((s,x)=>s+x.count,0);const cost=Object.values(totals).reduce((s,x)=>s+x.cost,0);const flavCount=Object.keys(PLAN_DATA[ds]||{}).length;html+=`<div class="day-card" onclick="showDayLists('${escJs(ds)}')"><div class="day-date"><div class="day-dow">${DAY_SHORT[date.getDay()]}</div><div class="day-num">${date.getDate()}</div></div><div class="day-main"><div class="day-title">${calc.planTotal} шт · ${flavCount} вкус.</div><div class="day-sub">${count?count+' поз. к закупке':'всё закрыто'}</div></div><div class="day-status">${count?fmtMoney(cost): '✓'}<br><span class="muted">${count?count+' поз.':''}</span></div></div>`});html+='</div>';el.innerHTML=html}
let CUSTOM_DATES=null;
function showDayLists(ds){listMode='custom';CUSTOM_DATES=[ds];openedSupplier='sasha';switchTab('lists')}
const _origRangeDates=rangeDates;
rangeDates=function(mode){if(mode==='custom'&&CUSTOM_DATES&&CUSTOM_DATES.length)return CUSTOM_DATES;return _origRangeDates(mode)}
function renderMore(){const el=document.getElementById('screen-more');const acc=accountedLines();let html=`<div class="hero"><div class="hero-kicker">Ещё</div><div class="hero-title">Остатки и отметки</div><div class="hero-sub">Здесь можно добавить, что уже есть, купили или заказали. На главном экране это не мешает.</div></div><div class="bottom-actions"><button class="btn primary" onclick="openAddModal()">Добавить</button><button class="btn light" onclick="openArrivedModal()">Заказ приехал</button></div>`;if(acc.length){html+=`<div class="section"><div class="section-head"><div class="section-title">Уже учтено</div><div class="section-meta">${acc.length} поз.</div></div><div class="soft-list">${acc.map(renderAccountedRow).join('')}</div></div>`}else html+='<div class="empty">Пока ничего не отмечено</div>';html+=`<button class="danger-link" onclick="resetState()">Сбросить все отметки</button>`;el.innerHTML=html}
function renderAccountedRow(x){const parts=[];if(x.stock)parts.push(`есть ${x.stock}`);if(x.bought)parts.push(`куплено ${x.bought}`);if(x.ordered)parts.push(`заказано ${x.ordered}`);return `<div class="soft-row" onclick="openEditModal('${escJs(x.name)}',0)"><span class="soft-name">${escHtml(x.name)}<br><span class="muted">${parts.join(' · ')}</span></span><span class="soft-val">изм.</span></div>`}
function markItem(name,kind,qty){openEditModal(name,0,{[kind]:Number(qty||0)})}
function markSupplier(key,kind){const dates=rangeDates(listMode);const groups=groupLines(calcNeedsForDates(dates).needs);((groups[key]||{}).items||[]).forEach(it=>{const cur=getState(it.name);STATE[it.name]={...cur,[kind]:Number(cur[kind]||0)+it.action,updatedAt:Date.now()}});saveState();render();showToast(kind==='ordered'?'Список отмечен заказанным':'Список отмечен купленным')}
function copyMode(mode){
  const dates=rangeDates(mode);
  const groups=groupLines(calcNeedsForDates(dates).needs);
  const fmtLine=it=>`• ${it.name} — ${it.action} ${it.unit}${it.unit==='уп'?' × '+it.packLabel:''}`;
  const parts=[];
  let total=0;
  SUP_ORDER.forEach(k=>{
    const group=groups[k]||{base:[],flavor:[],items:[]};
    if(!group.items.length)return;
    const ui=SUP_UI[k];
    const sum=group.items.reduce((s,x)=>s+x.cost,0);
    total+=sum;
    const sections=[];
    if(group.base.length) sections.push('Основа:\n'+group.base.map(fmtLine).join('\n'));
    if(group.flavor.length) sections.push('Под вкусы:\n'+group.flavor.map(fmtLine).join('\n'));
    parts.push(`${ui.short}\n${sections.join('\n\n')}\nПримерно: ${fmtMoney(sum)}`);
  });
  if(!parts.length){showToast('На неделю всё закрыто');return;}
  const txt=`OMOTI · вся неделя\n${formatRange(dates)}\n\n${parts.join('\n\n')}\n\nИтого примерно: ${fmtMoney(total)}`;
  navigator.clipboard.writeText(txt).then(()=>showToast('Неделя скопирована')).catch(()=>showToast('Не получилось скопировать',true));
}

function copyAndAsk(key){
  const dates=rangeDates(listMode==='custom'?'custom':(currentTab==='now'?'today':listMode));
  const group=groupLines(calcNeedsForDates(dates).needs)[key]||{base:[],flavor:[],items:[]};
  const items=group.items||[];
  if(!items.length){showToast('Список пустой');return}
  const ui=SUP_UI[key];
  const total=items.reduce((s,x)=>s+x.cost,0);
  const fmtLine=it=>`• ${it.name} — ${it.action} ${it.unit}${it.unit==='уп'?' × '+it.packLabel:''}`;
  const sections=[];
  if(group.base.length) sections.push('Основа:\n'+group.base.map(fmtLine).join('\n'));
  if(group.flavor.length) sections.push('Под вкусы:\n'+group.flavor.map(fmtLine).join('\n'));
  const txt=`OMOTI · ${ui.short}\n${formatRange(dates)}\n\n${sections.join('\n\n')}\n\nПримерно: ${fmtMoney(total)}`;
  navigator.clipboard.writeText(txt).then(()=>{
    showToast('Список скопирован');
    if(key!=='ashan'&&confirm('Отметить этот список как заказанный?'))markSupplier(key,'ordered');
  }).catch(()=>showToast('Не получилось скопировать',true));
}
function openAddModal(){openModal(`<div class="modal-title">Что уже есть?</div><div class="modal-sub">Добавь только то, что реально важно. Не надо вести весь склад.</div><div class="field"><label>Продукт</label><select id="m-name">${ALL_INGREDIENTS.map(n=>`<option value="${escHtml(n)}">${escHtml(n)}</option>`).join('')}</select></div><div class="modal-row"><div class="field"><label>Есть</label><input id="m-stock" type="number" min="0" step="0.5" placeholder="0"></div><div class="field"><label>Купили</label><input id="m-bought" type="number" min="0" step="0.5" placeholder="0"></div><div class="field"><label>Заказали</label><input id="m-ordered" type="number" min="0" step="0.5" placeholder="0"></div></div><div class="modal-actions"><button class="btn light" onclick="closeModal()">Отмена</button><button class="btn primary" onclick="saveAddModal()">Сохранить</button></div>`)}
function saveAddModal(){const name=document.getElementById('m-name').value;const cur=getState(name);const patch={};['stock','bought','ordered'].forEach(k=>{const v=Number(document.getElementById('m-'+k).value||0);if(v>0)patch[k]=Number(cur[k]||0)+v});setState(name,patch);closeModal();showToast('Учёл')}
function openEditModal(name,grams,prefill){const line=grams?lineFor(name,grams):null;const st=getState(name);const unit=unitInfo(name).unit;const pf=prefill||{};const valStock=pf.stock!==undefined?pf.stock:(st.stock||'');const valBought=pf.bought!==undefined?pf.bought:(st.bought||'');const valOrdered=pf.ordered!==undefined?pf.ordered:(st.ordered||'');openModal(`<div class="modal-title">${escHtml(name)}</div><div class="modal-sub">${line?`Нужно по расчёту: ${fmtG(line.grams)} · ${line.needUnits} ${unit}`:'Ручная отметка'}<br>Единица: ${unit}</div><div class="modal-row"><div class="field"><label>Есть</label><input id="e-stock" type="number" min="0" step="0.5" value="${valStock}" placeholder="0"></div><div class="field"><label>Купили</label><input id="e-bought" type="number" min="0" step="0.5" value="${valBought}" placeholder="0"></div><div class="field"><label>Заказали</label><input id="e-ordered" type="number" min="0" step="0.5" value="${valOrdered}" placeholder="0"></div></div><div class="modal-actions"><button class="btn light" onclick="deleteItemState('${escJs(name)}')">Очистить</button><button class="btn primary" onclick="saveEditModal('${escJs(name)}')">Сохранить</button></div>`)}
function saveEditModal(name){setState(name,{stock:Number(document.getElementById('e-stock').value||0),bought:Number(document.getElementById('e-bought').value||0),ordered:Number(document.getElementById('e-ordered').value||0)});closeModal();showToast('Сохранено')}
function deleteItemState(name){delete STATE[name];saveState();closeModal();render();showToast('Удалено')}
function openArrivedModal(){const ordered=accountedLines().filter(x=>x.ordered);if(!ordered.length){showToast('Нет заказанных позиций');return}openModal(`<div class="modal-title">Заказ приехал?</div><div class="modal-sub">Нажми на продукт, и он перейдёт из “заказано” в “куплено”.</div><div class="soft-list">${ordered.map(x=>`<div class="soft-row" onclick="moveArrived('${escJs(x.name)}')"><span class="soft-name">${escHtml(x.name)}<br><span class="muted">заказано ${x.ordered}</span></span><span class="soft-val">приехало</span></div>`).join('')}</div><div class="modal-actions"><button class="btn light" onclick="closeModal()">Закрыть</button></div>`)}
function moveArrived(name){const st=getState(name);setState(name,{bought:Number(st.bought||0)+Number(st.ordered||0),ordered:0});closeModal();showToast('Перенёс в купленное')}
function openModal(html){document.getElementById('modal').innerHTML=html;document.getElementById('modal-back').style.display='block';document.getElementById('modal').style.display='block'}
function closeModal(){document.getElementById('modal-back').style.display='none';document.getElementById('modal').style.display='none'}
function resetState(){if(!confirm('Сбросить остатки, купленное и заказанное?'))return;STATE={};saveState();render();showToast('Сброшено')}
async function loadAll(manual){setStatus(manual?'Обновляю...':'Загружаю план...');try{const planResp=await fetch(API+'?action=get_plan',{cache:'no-store'});const plan=await planResp.json();if(!plan.ok||!plan.plan)throw new Error('plan');PLAN_DATA=plan.plan;PLAN_BASE=plan.base||null;PLAN_DATES=Object.keys(PLAN_DATA).sort((a,b)=>parseLocalDate(a)-parseLocalDate(b));PLAN_LOADED_AT=new Date();try{const prodResp=await fetch(API+'?action=get_production&limit=300',{cache:'no-store'});const prod=await prodResp.json();if(prod&&prod.ok&&Array.isArray(prod.rows))PROD_RECORDS=parseRecords(prod.rows);}catch(e){PROD_RECORDS=[]}setStatus(`План ${PLAN_DATES.length} дн.${PROD_RECORDS.length?` · факт ${PROD_RECORDS.length} зап.`:''}`);render();if(manual)showToast('Обновлено')}catch(e){setStatus('Нет связи с планом');showToast('План не загрузился',true);render()}}
loadAll(false);
</script>
