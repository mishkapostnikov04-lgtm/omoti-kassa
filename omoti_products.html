<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OMOTI · Расчёт продуктов</title>
<link rel="icon" type="image/png" href="grin.png">
<meta name="theme-color" content="#2d7a3a">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f0f4f0;
  --card:#fff;
  --border:#d6e4d6;
  --text:#1c2b1c;
  --muted:#7a967a;
  --muted2:#b8ccb8;
  --green:#2d7a3a;
  --green-light:#e8f5e9;
  --green-mid:#4caf62;
  --teal:#1a8c78;
  --teal-light:#e0f5f1;
  --amber:#e07c1a;
  --amber-light:#fff3e0;
  --red:#c0392b;
  --red-light:#fdecea;
  --radius:16px;
  --shadow:0 2px 12px rgba(0,0,0,.07);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:520px;margin:0 auto;padding-bottom:60px}

/* HEADER */
.header{background:var(--green);padding:20px 18px 0;position:sticky;top:0;z-index:20}
.header-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.18);border-radius:999px;padding:4px 10px;margin-bottom:8px}
.header-badge span{font-size:11px;font-weight:800;color:#fff;letter-spacing:.06em;text-transform:uppercase}
.header-dot{width:6px;height:6px;border-radius:999px;background:#7dff9a}
.header-title{font-size:22px;font-weight:700;color:#fff;line-height:1}
.header-sub{font-size:12px;color:rgba(255,255,255,.65);margin-top:4px;margin-bottom:14px}
.tab-row{display:flex;gap:4px;background:rgba(0,0,0,.18);border-radius:12px;padding:3px}
.tab-btn{flex:1;border:none;background:transparent;border-radius:10px;padding:8px 6px;font-size:13px;font-weight:600;font-family:inherit;color:rgba(255,255,255,.6);cursor:pointer;transition:.15s}
.tab-btn.active{background:#fff;color:var(--green)}

/* SCREENS */
.screen{display:none}.screen.active{display:block}

/* CARDS */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin:12px 14px 0;padding:16px}
.sec-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}

/* SPINNER */
.spinner{text-align:center;padding:28px;font-size:13px;color:var(--muted)}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1c2b1c;color:#fff;padding:10px 20px;border-radius:999px;font-size:13px;font-weight:600;opacity:0;transition:.25s;pointer-events:none;z-index:99;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--red)}

/* PLAN MODE */
.plan-flavor-list{display:flex;flex-direction:column;gap:4px}
.pf-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:14px}
.pf-row:last-child{border-bottom:none}
.pf-name{font-weight:600;color:var(--text)}
.pf-qty{font-weight:700;color:var(--green)}

/* MANUAL MODE */
.manual-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.manual-row:last-child{border-bottom:none}
.manual-num{font-size:12px;font-weight:700;color:var(--muted2);min-width:18px}
.manual-name-inp{flex:2;border:1.5px solid var(--border);background:#fff;border-radius:8px;padding:7px 10px;font-size:13px;font-weight:600;font-family:inherit;color:var(--text);outline:none}
.manual-name-inp:focus{border-color:var(--green)}
.manual-qty-inp{width:72px;border:1.5px solid var(--border);background:#fff;border-radius:8px;padding:7px 8px;font-size:13px;font-weight:700;font-family:inherit;color:var(--text);outline:none;text-align:center}
.manual-qty-inp:focus{border-color:var(--green)}
.manual-del{width:28px;height:28px;border:none;background:none;color:var(--muted2);cursor:pointer;font-size:16px;flex-shrink:0;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:.12s}
.manual-del:active{background:var(--red-light);color:var(--red)}
.add-row-btn{width:100%;border:1.5px dashed var(--border);background:transparent;border-radius:10px;padding:10px;font-size:13px;font-weight:600;font-family:inherit;color:var(--green);cursor:pointer;margin-top:8px;transition:.15s}
.add-row-btn:active{background:var(--green-light)}

/* AUTOCOMPLETE */
.ac-wrap{position:relative;flex:2}
.ac-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid var(--green);border-radius:8px;box-shadow:var(--shadow);z-index:50;max-height:180px;overflow-y:auto;margin-top:2px}
.ac-item{padding:8px 12px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text);border-bottom:1px solid var(--border)}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.selected{background:var(--green-light);color:var(--green)}

/* ОСТАТКИ */
.stock-toggle{display:flex;align-items:center;gap:10px;cursor:pointer;padding:2px 0}
.stock-toggle input[type=checkbox]{width:18px;height:18px;accent-color:var(--green);cursor:pointer}
.stock-toggle span{font-size:13px;font-weight:600;color:var(--muted)}
.stock-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:12px}
.stock-item{background:#f7faf7;border:1.5px solid var(--border);border-radius:10px;padding:8px 10px}
.stock-item-name{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stock-inp-row{display:flex;align-items:center;gap:6px}
.stock-inp{flex:1;border:1.5px solid var(--border);background:#fff;border-radius:6px;padding:5px 7px;font-size:13px;font-weight:700;font-family:inherit;color:var(--text);outline:none;text-align:center;min-width:0}
.stock-inp:focus{border-color:var(--green)}
.stock-unit{font-size:11px;color:var(--muted2);font-weight:600;white-space:nowrap}

/* РЕЗУЛЬТАТ */
.calc-btn{width:calc(100% - 28px);margin:12px 14px 0;background:var(--green);color:#fff;border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:.15s}
.calc-btn:active{opacity:.85}
.calc-btn:disabled{opacity:.5;cursor:default}

.result-section{margin:12px 14px 0}
.result-group{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:8px;overflow:hidden}
.result-group-header{padding:10px 14px;background:var(--green);color:#fff;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em}
.result-row{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--border)}
.result-row:last-child{border-bottom:none}
.result-row.need{background:var(--red-light)}
.result-row.ok{background:var(--green-light)}
.rr-name{flex:1;font-size:13px;font-weight:600;color:var(--text);min-width:0}
.rr-need{font-size:12px;color:var(--muted);min-width:60px;text-align:right}
.rr-have{font-size:12px;min-width:60px;text-align:right}
.rr-buy{font-size:13px;font-weight:700;min-width:70px;text-align:right}
.rr-buy.none{color:var(--green)}
.rr-buy.buy{color:var(--red)}
.rr-price{font-size:11px;color:var(--muted);min-width:55px;text-align:right}

.result-summary{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin:8px 0;padding:14px 16px}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px}
.sum-row:last-child{border-bottom:none}
.sum-label{color:var(--muted);font-weight:600}
.sum-val{font-weight:700;color:var(--text)}
.sum-val.red{color:var(--red)}
.sum-val.green{color:var(--green)}

.col-headers{display:flex;align-items:center;gap:8px;padding:4px 14px 4px;margin-bottom:2px}
.ch{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.ch.name{flex:1}
.ch.need{min-width:60px;text-align:right}
.ch.have{min-width:60px;text-align:right}
.ch.buy{min-width:70px;text-align:right}
.ch.price{min-width:55px;text-align:right}

.empty-result{padding:32px;text-align:center;color:var(--muted);font-size:14px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-badge"><div class="header-dot"></div><span>OMOTI · Продукты</span></div>
    <div class="header-title">Расчёт продуктов</div>
    <div class="header-sub">Сколько нужно закупить под план</div>
    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('plan')">По плану</button>
      <button class="tab-btn" onclick="switchTab('manual')">Вручную</button>
    </div>
  </div>

  <!-- ПО ПЛАНУ -->
  <div class="screen active" id="screen-plan">
    <div class="spinner" id="plan-spinner">Загружаю план...</div>
    <div id="plan-flavor-card" style="display:none">
      <div class="card">
        <div class="sec-label">Вкусы из плана на неделю</div>
        <div class="plan-flavor-list" id="plan-flavor-list"></div>
      </div>
    </div>
    <div id="plan-stock-card" style="display:none">
      <div class="card">
        <label class="stock-toggle">
          <input type="checkbox" id="plan-stock-toggle" onchange="toggleStock('plan')">
          <span>Указать остатки на складе (необязательно)</span>
        </label>
        <div id="plan-stock-grid" style="display:none" class="stock-grid"></div>
      </div>
    </div>
    <button class="calc-btn" id="plan-calc-btn" onclick="calcPlan()" disabled>Рассчитать</button>
    <div id="plan-result"></div>
  </div>

  <!-- ВРУЧНУЮ -->
  <div class="screen" id="screen-manual">
    <div class="card">
      <div class="sec-label">Вкусы и количество</div>
      <div id="manual-rows"></div>
      <button class="add-row-btn" onclick="addManualRow()">+ Добавить вкус</button>
    </div>
    <div class="card" id="manual-stock-outer">
      <label class="stock-toggle">
        <input type="checkbox" id="manual-stock-toggle" onchange="toggleStock('manual')">
        <span>Указать остатки на складе (необязательно)</span>
      </label>
      <div id="manual-stock-grid" style="display:none" class="stock-grid"></div>
    </div>
    <button class="calc-btn" id="manual-calc-btn" onclick="calcManual()">Рассчитать</button>
    <div id="manual-result"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

(function loadPlan(){
  fetch(API+'?action=get_plan',{cache:'no-store'})
    .then(r=>r.json())
    .then(json=>{
      document.getElementById('plan-spinner').style.display='none';
      if(!json.ok||!json.plan){showToast('Не удалось загрузить план',true);return;}

      const totals={};

        Object.entries(dayPlan).forEach(([name,qty])=>{
          totals[name]=(totals[name]||0)+qty;

      });
      planData=totals;

// ── ОСТАТКИ ───────────────────────────────────────────────────────────────────
function getIngredientsForFlavors(flavors){
  // flavors: {name: qty}
  const ingSet=new Set();
  Object.entries(flavors).forEach(([fname,qty])=>{
    if(qty<=0) return;
    const recipe=RECIPES[fname];
    if(!recipe) return;
    recipe.forEach(({n})=>ingSet.add(n));
  });
  return [...ingSet].sort((a,b)=>a.localeCompare(b,'ru'));
}

function buildStockGrid(mode, ingredients){
  const grid=document.getElementById(mode+'-stock-grid');
  grid.innerHTML=ingredients.map(name=>{
    const pr=PRICES[name];
    const unit=pr?`уп × ${pr.pack}г`:'г';
    return `<div class="stock-item">
      <div class="stock-item-name" title="${escHtml(name)}">${escHtml(name)}</div>
      <div class="stock-inp-row">
        <input class="stock-inp" type="number" min="0" step="0.1" placeholder="0" id="st-${mode}-${name.replace(/[^a-zA-Zа-яА-ЯёЁ0-9]/g,'_')}">
        <span class="stock-unit">${unit}</span>
      </div>
    </div>`;
  }).join('');
}

function toggleStock(mode){
  const checked=document.getElementById(mode+'-stock-toggle').checked;
  const grid=document.getElementById(mode+'-stock-grid');
  if(checked){
    // Если вручную — нужно сначала собрать ингредиенты из введённых вкусов
    if(mode==='manual'){
      const flavors=getManualFlavors();
      const ings=getIngredientsForFlavors(flavors);
      if(!ings.length){showToast('Сначала добавьте вкусы',false);document.getElementById('manual-stock-toggle').checked=false;return;}
      buildStockGrid('manual',ings);
    }
    grid.style.display='grid';
  } else {
    grid.style.display='none';
  }
}

function getStockGrams(mode, ingName){
  const pr=PRICES[ingName];
  const id='st-'+mode+'-'+ingName.replace(/[^a-zA-Zа-яА-ЯёЁ0-9]/g,'_');
  const el=document.getElementById(id);
  if(!el) return 0;
  const val=parseFloat(el.value)||0;
  if(!val) return 0;
  return pr ? val*pr.pack : val;
}

// ── РАСЧЁТ ────────────────────────────────────────────────────────────────────
function calcIngredients(flavors){
  // flavors: {name: qty}
  const needs={}; // ingName -> totalGrams
  Object.entries(flavors).forEach(([fname,qty])=>{
    if(qty<=0) return;
    const recipe=RECIPES[fname];
    if(!recipe){return;}
    recipe.forEach(({n,w})=>{
      needs[n]=(needs[n]||0)+w*qty;
    });
  });
  return needs;
}

function getManualFlavors(){
  const flavors={};
  document.querySelectorAll('.manual-row').forEach(row=>{
    const id=row.id.replace('mr-','');
    const nameEl=document.getElementById('mn-'+id);
    const qtyEl=document.getElementById('mq-'+id);
    if(!nameEl||!qtyEl) return;
    const name=nameEl.value.trim();
    const qty=parseInt(qtyEl.value)||0;
    if(name&&qty>0) flavors[name]=(flavors[name]||0)+qty;
  });
  return flavors;
}

function renderResult(needs, mode, containerId){
  const stockEnabled=document.getElementById(mode+'-stock-toggle').checked;

  // Группируем по группам
  const groups={};
  Object.entries(needs).forEach(([name,totalG])=>{
    const pr=PRICES[name];
    const group=findGroup(name);
    if(!groups[group]) groups[group]=[];
    const haveG=stockEnabled?getStockGrams(mode,name):0;
    const needG=Math.max(0,totalG-haveG);
    const packs=pr?Math.ceil(needG/pr.pack):null;
    const cost=pr?(needG*pr.p):null;
    groups[group].push({name,totalG,haveG,needG,packs,cost,pr});
  });

  const groupOrder=['1. Молочные','2. Пюре','3. Сиропы','4. Ягоды','5. Варенье','6. Шоколад','7. Орехи и пасты','8. Подсластители','9. Основа','Прочее'];
  let totalCost=0;
  let html='<div class="result-section">';

  // Колонки
  html+=`<div class="col-headers">
    <span class="ch name">Продукт</span>
    <span class="ch need">Нужно</span>
    ${stockEnabled?'<span class="ch have">Есть</span>':''}
    <span class="ch buy">${stockEnabled?'Докупить':'Упаковок'}</span>
    <span class="ch price">Сумма</span>
  </div>`;

  groupOrder.forEach(g=>{
    const items=groups[g];
    if(!items||!items.length) return;
    html+=`<div class="result-group">
      <div class="result-group-header">${escHtml(g)}</div>`;
    items.sort((a,b)=>a.name.localeCompare(b.name,'ru')).forEach(({name,totalG,haveG,needG,packs,cost,pr})=>{
      const isNeed=needG>0;
      const rowClass=isNeed?'need':'ok';
      const buyText=packs!==null?(isNeed?`${packs} уп`:'✓'):(isNeed?`${Math.round(needG)}г`:'✓');
      const buyClass=isNeed?'buy':'none';
      const costText=cost!==null&&isNeed?`${Math.round(cost)} ₽`:'';
      if(cost&&isNeed) totalCost+=cost;
      const needText=pr?`${Math.ceil(totalG/pr.pack)} уп`:`${Math.round(totalG)}г`;
      const haveText=stockEnabled?(pr?`${Math.round(haveG/pr.pack*10)/10} уп`:`${Math.round(haveG)}г`):'';
      html+=`<div class="result-row ${rowClass}">
        <span class="rr-name">${escHtml(name)}</span>
        <span class="rr-need">${needText}</span>
        ${stockEnabled?`<span class="rr-have">${haveText}</span>`:''}
        <span class="rr-buy ${buyClass}">${buyText}</span>
        <span class="rr-price">${costText}</span>
      </div>`;
    });
    html+='</div>';
  });

  // Итого
  html+=`<div class="result-summary">
    <div class="sum-row"><span class="sum-label">Позиций к закупке</span><span class="sum-val red">${countNeed(groups)}</span></div>
    <div class="sum-row"><span class="sum-label">Итого сумма закупки</span><span class="sum-val red">${Math.round(totalCost).toLocaleString('ru-RU')} ₽</span></div>
  </div>`;
  html+='</div>';
  document.getElementById(containerId).innerHTML=html;
}

function countNeed(groups){
  let n=0;
  Object.values(groups).forEach(items=>items.forEach(({needG})=>{if(needG>0)n++;}));
  return n;
}

function findGroup(name){
  // Определяем группу по первому вхождению в рецептах
  for(const recipe of Object.values(RECIPES)){
    const ing=recipe.find(i=>i.n===name);
    if(ing) return ing.g;
  }
  return 'Прочее';
}

function calcPlan(){
  if(!planData) return;
  const needs=calcIngredients(planData);
  renderResult(needs,'plan','plan-result');
}

function calcManual(){
  const flavors=getManualFlavors();
  if(!Object.keys(flavors).length){showToast('Добавьте хотя бы один вкус',true);return;}
  // Обновляем stock grid если включён
  if(document.getElementById('manual-stock-toggle').checked){
    const ings=getIngredientsForFlavors(flavors);
    buildStockGrid('manual',ings);
    document.getElementById('manual-stock-grid').style.display='grid';
  }
  const needs=calcIngredients(flavors);
  renderResult(needs,'manual','manual-result');
}
</script>
