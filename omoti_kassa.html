<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>OMOTI · Касса</title>
<script type="text/javascript" src="https://gc.kis.v2.scr.kaspersky-labs.com/FD126C42-EBFA-4E12-B309-BB3FDD723AC1/main.js?attr=wv0J03Wb7S8N8Ag-P00D_mVg3o-8mFkeRNttegWwLCbRqTdmXihZ89ujiVjublBQFw3_l9BoZjy9EnLju9Iv6i79aQL2Ns-WMRg8rbeK5zfMZDr465b1bNC9FweokdRmHy676tJ5Cw31NfobpVI9JokKpCbeS_U5PqPQgDIuX8mtHLcsF_0MoCBMfD3bV09K1Q5U1sn4rclJWGos_EECHgWukY3pxRl4Q-POFFhHDLVxPBjuz0IwjopQ42Eu3Vu9eRmMM5J2RPDuSeLAJGb01w" charset="UTF-8"></script><style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f7f6f2;--card:#ffffff;--text:#1a1a1a;--muted:#888;--border:#e0ddd6;
  --accent:#1a1a1a;--accent-fg:#fff;--gold:#d3aa4f;--radius:16px;
  --success-bg:#edf8ef;--success-border:#cfe5d3;--success-text:#234b2b;
  --danger:#d95555;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:var(--bg);color:var(--text);
}
.app{max-width:460px;margin:0 auto;min-height:100vh;padding-bottom:24px}
.topbar{
  position:sticky;top:0;z-index:30;background:rgba(247,246,242,.94);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border);padding:14px 14px 10px
}
.topbar-title{display:block;font-size:16px;font-weight:700;margin-bottom:10px}
.tab-switcher{display:flex;gap:4px;background:#ebe7df;padding:4px;border-radius:16px}
.tab-btn{flex:1;border:none;background:transparent;border-radius:12px;padding:8px 10px;font-size:13px;color:#666;cursor:pointer}
.tab-btn.active{background:#fff;color:var(--text);font-weight:700;box-shadow:0 1px 2px rgba(0,0,0,.06)}
.screen{display:none;padding:14px}
.screen.active{display:block}
.sec-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin:2px 0 8px}
.seller-row{display:flex;gap:8px;flex-wrap:wrap}
.seller-btn,.pay-btn,.self-sub-btn,.modal-btn{
  border:1px solid var(--border);background:#fff;border-radius:12px;padding:11px 12px;font-size:13px;color:var(--text);cursor:pointer
}
.seller-btn{flex:1 1 calc(33.333% - 6px);min-width:110px}
.seller-btn.active,.pay-btn.active,.self-sub-btn.active{background:var(--accent);color:var(--accent-fg);border-color:var(--accent)}
.add-btn{font-weight:700}
.flavors-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.flavor-btn{
  position:relative;border:1px solid var(--border);background:#fff;color:var(--text);
  border-radius:12px;min-height:48px;padding:8px 6px;font-size:12px;line-height:1.15;cursor:pointer;text-align:center
}
.flavor-btn.gold{border-color:var(--gold)}
.flavor-btn.active{background:#fff8eb;border-color:var(--gold);font-weight:600}
.qty-badge{
  position:absolute;right:6px;top:6px;min-width:18px;height:18px;padding:0 4px;border-radius:999px;
  background:var(--accent);color:#fff;font-size:11px;line-height:18px;font-weight:700
}
.pay-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.self-clarify{display:none;gap:8px;align-items:center;margin-top:10px}
.self-clarify.visible{display:flex}
.cart-box{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:14px}
.cart-empty{text-align:center;color:var(--muted);font-size:14px;padding:8px 0}
.cart-item{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:10px 0;border-top:1px solid var(--border)}
.cart-item:first-child{border-top:none}
.ci-name{font-size:13px}
.ci-ctrl{display:flex;align-items:center;gap:10px}
.c-btn{
  width:28px;height:28px;border-radius:999px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:16px
}
.ci-qty{font-size:13px;min-width:12px;text-align:center}
.ci-price{font-size:13px;font-weight:700;min-width:52px;text-align:right}
.cart-total{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);margin-top:6px;padding-top:10px;font-size:15px;font-weight:700}
.close-btn{
  width:100%;border:none;border-radius:14px;padding:15px 16px;background:var(--accent);color:#fff;
  font-size:18px;font-weight:700;cursor:pointer
}
.close-btn:disabled{opacity:.45;cursor:not-allowed}
.close-btn.loading{opacity:.7}
.spinner{font-size:13px;color:var(--muted);text-align:center;padding:28px 0}
.spinner.visible{display:block}

/* Журнал */
.journal-item{border:1px solid var(--border);border-radius:var(--radius);padding:11px 13px;margin-bottom:8px;background:var(--card)}
.ji-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:4px}
.ji-who{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px}
.ji-meta{font-size:11px;color:var(--muted)}
.ji-pay{font-size:12px;font-weight:700;margin-bottom:4px;color:var(--text)}
.ji-flavors{font-size:11px;color:var(--muted);line-height:1.5}
.ji-foot{display:flex;justify-content:space-between;align-items:center;margin-top:7px}
.ji-sum{font-size:14px;font-weight:700;color:var(--text)}
.ji-edit{font-size:12px;color:#1a73e8;cursor:pointer;border:none;background:none;font-family:inherit;padding:0}
.edited-dot{display:inline-block;width:8px;height:8px;border-radius:999px;background:var(--danger);vertical-align:middle}

/* Итоги */
.period-row{display:flex;gap:5px;margin-bottom:14px}
.period-btn{padding:7px 13px;border:1px solid var(--border);border-radius:18px;background:var(--bg);font-size:12px;cursor:pointer;font-family:inherit;color:var(--muted)}
.period-btn.active{background:var(--accent);color:var(--accent-fg);border-color:var(--accent)}
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.metric-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px}
.m-label{font-size:11px;color:var(--muted);margin-bottom:3px}
.m-val{font-size:22px;font-weight:700;color:var(--text)}
.m-sub{font-size:11px;color:var(--muted);margin-top:2px}
.payout-card{border:1px solid var(--success-border);border-radius:var(--radius);padding:13px;margin-bottom:14px;background:var(--success-bg)}
.payout-title{font-size:11px;color:var(--success-text);margin-bottom:3px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.payout-period{font-size:11px;color:var(--success-text);margin-bottom:10px;opacity:.75}
.payout-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;color:var(--success-text)}
.payout-row.total{font-weight:700;font-size:16px;border-top:1px solid var(--success-border);margin-top:7px;padding-top:9px}
.flavor-stat-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.fs-name{font-size:13px;flex:1;color:var(--text)}
.fs-bar-wrap{flex:1.1;height:6px;background:#ece8df;border-radius:4px;overflow:hidden}
.fs-bar{height:100%;background:var(--accent);border-radius:4px}
.fs-qty{font-size:13px;font-weight:700;min-width:24px;text-align:right;color:var(--text)}

/* Modal + toast */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.18);z-index:40}
.modal{
  display:none;position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:41;
  width:min(92vw,360px);background:#fff;border:1px solid var(--border);border-radius:18px;padding:16px
}
.modal-title{font-size:15px;font-weight:700;margin-bottom:10px}
.modal-input{
  width:100%;border:1px solid var(--border);border-radius:12px;padding:12px 13px;font-size:14px;outline:none;margin-bottom:10px
}
.modal-btn{width:100%;font-weight:700}
.toast{
  position:fixed;left:50%;bottom:16px;transform:translateX(-50%);background:#1f1f1f;color:#fff;
  padding:11px 14px;border-radius:999px;font-size:13px;opacity:0;pointer-events:none;transition:.2s;z-index:50
}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <span class="topbar-title">OMOTI · Новогодняя</span>
    <div class="tab-switcher">
      <button class="tab-btn active" onclick="switchTab('kassa')">Касса</button>
      <button class="tab-btn" onclick="switchTab('journal')">Журнал</button>
      <button class="tab-btn" onclick="switchTab('stats')">Итоги</button>
    </div>
  </div>

  <div class="screen active" id="screen-kassa">
    <div class="sec-label">Имя</div>
    <div class="seller-row" id="seller-row"></div>

    <div class="sec-label" style="margin-top:16px">Вкус</div>
    <div class="flavors-grid" id="flavors-grid"></div>

    <div class="sec-label" style="margin-top:16px">Оплата</div>
    <div class="pay-grid" id="pay-grid"></div>

    <div class="self-clarify" id="self-clarify">
      <span style="font-size:11px;color:var(--muted);white-space:nowrap">Как оплатили:</span>
      <button class="self-sub-btn active" onclick="setSelfPay(this,'Наличные')">Наличные</button>
      <button class="self-sub-btn" onclick="setSelfPay(this,'Перевод')">Перевод</button>
    </div>

    <div class="sec-label" style="margin-top:16px">Чек</div>
    <div class="cart-box">
      <div class="cart-empty" id="cart-empty">Выбери вкусы</div>
      <div id="cart-items"></div>
      <div class="cart-total" id="cart-total" style="display:none"><span>Итого</span><span id="total-sum"></span></div>
    </div>

    <button class="close-btn" id="close-btn" onclick="closeCheck()" disabled>Закрыть чек</button>
  </div>

  <div class="screen" id="screen-journal">
    <div class="spinner" id="journal-spinner">Загружаю...</div>
    <div id="journal-list"></div>
  </div>

  <div class="screen" id="screen-stats">
    <div class="period-row">
      <button class="period-btn active" onclick="setPeriod(this,'week')">Неделя</button>
      <button class="period-btn" onclick="setPeriod(this,'month')">Месяц</button>
      <button class="period-btn" onclick="setPeriod(this,'all')">Всё время</button>
    </div>
    <div class="spinner" id="stats-spinner">Загружаю...</div>
    <div id="stats-content" style="display:none">
      <div class="metrics-grid">
        <div class="metric-card"><div class="m-label">Продано, шт</div><div class="m-val" id="s-qty">—</div><div class="m-sub" id="s-sub"></div></div>
        <div class="metric-card"><div class="m-label">Заработано</div><div class="m-val" id="s-earn">—</div><div class="m-sub">30 ₽/шт</div></div>
        <div class="metric-card"><div class="m-label">Наличные</div><div class="m-val" id="s-cash">—</div><div class="m-sub">вычтется</div></div>
        <div class="metric-card"><div class="m-label">Яндекс, шт</div><div class="m-val" id="s-ya">—</div><div class="m-sub">засчитаны</div></div>
      </div>
      <div class="payout-card">
        <div class="payout-title">К выплате</div>
        <div class="payout-period" id="payout-period"></div>
        <div class="payout-row"><span>Продажи × 30₽</span><span id="p-sales">—</span></div>
        <div class="payout-row"><span>Наличные от клиентов</span><span id="p-cash">—</span></div>
        <div class="payout-row"><span>Себе без оплаты</span><span id="p-self">—</span></div>
        <div class="payout-row total"><span>К выплате</span><span id="p-total">—</span></div>
      </div>
      <div class="sec-label" style="margin-top:0">Топ вкусов</div>
      <div id="flavor-stat-list"></div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="hideModal()"></div>
<div class="modal" id="modal">
  <div class="modal-title" id="modal-title">Добавить имя</div>
  <input class="modal-input" id="modal-input" placeholder="Введите имя">
  <button class="modal-btn" onclick="modalConfirm()">Добавить</button>
</div>
<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbyIji64r8q217pHVTpW0bA_eNRP9SJUELxWiW6VARz8khIYPIeUv7D5UvSEq8gAJIPs3g/exec';
const POINT = 'Новогодняя';

const FLAVORS = [
  'Арбуз-Дыня','Бабл Гам','Банан-Нутелла','Вишня-Тонка','Дубайский шоколад',
  'Киви-Алоэ','Клубника','Кокос-Маракуйя','Кокосовый пломбир','Кофе-Карамель',
  'Криспи','Малина-Ваниль','Матча-Манго','Мохито','Печенье',
  'Сливочный лимон','Смородина','Сникерс','Трюфель','Твикс','Шоколад'
].sort((a,b)=>a.localeCompare(b,'ru'));

const PREMIUM = new Set(['Дубайский шоколад','Криспи']);
const PAY_TYPES = ['Безналичный','Наличный','Перевод','Яндекс','Себе оплачено','Себе без оплаты'];

let sellers = loadSellers();
let cart = {};
let seller = sellers[0] || 'Алексей';
let payType = 'Безналичный';
let selfPayType = 'Наличные';
let currentPeriod = 'week';
let allChecks = [];
let editNum = null;
let editDate = '';
let editTime = '';
let modalMode = 'seller';

function loadSellers(){
  try{
    const x = JSON.parse(localStorage.getItem('omoti_sellers') || 'null');
    return Array.isArray(x) && x.length ? x : ['Алексей','Галина','Кирилл'];
  }catch(e){
    return ['Алексей','Галина','Кирилл'];
  }
}
function saveSellers(){
  localStorage.setItem('omoti_sellers', JSON.stringify(sellers));
}

function getPrice(name, pay) {
  const p = PREMIUM.has(name);
  if (pay === 'Яндекс') return p ? 250 : 200;
  if (pay === 'Себе оплачено' || pay === 'Себе без оплаты') return p ? 110 : 100;
  return p ? 200 : 180;
}

function renderSellers(){
  const row = document.getElementById('seller-row');
  row.innerHTML = sellers.map(name =>
    `<button class="seller-btn ${name===seller?'active':''}" onclick="setSeller(this,'${escJs(name)}')">${escHtml(name)}</button>`
  ).join('') + `<button class="seller-btn add-btn" onclick="showModal('seller')">+</button>`;
}

function renderPayBtns(){
  document.getElementById('pay-grid').innerHTML = PAY_TYPES.map(type =>
    `<button class="pay-btn ${type===payType?'active':''}" onclick="setPay(this,'${escJs(type)}')">${escHtml(type)}</button>`
  ).join('');
}

function renderFlavors() {
  document.getElementById('flavors-grid').innerHTML = FLAVORS.map(f => {
    const q = cart[f] || 0;
    return `<button class="flavor-btn ${PREMIUM.has(f)?'gold':''} ${q>0?'active':''}" onclick="changeQty('${escJs(f)}',1)">
      ${escHtml(f)}${q?`<span class="qty-badge">${q}</span>`:''}
    </button>`;
  }).join('');
}

function changeQty(name, delta){
  cart[name] = (cart[name] || 0) + delta;
  if (cart[name] <= 0) delete cart[name];
  updateCart();
}

function updateCart() {
  const items = Object.entries(cart).filter(([k,v])=>v>0);
  const empty = document.getElementById('cart-empty');
  const itemsEl = document.getElementById('cart-items');
  const totalEl = document.getElementById('cart-total');
  const closeBtn = document.getElementById('close-btn');

  renderFlavors();

  if (!items.length) {
    empty.style.display='block';
    itemsEl.innerHTML='';
    totalEl.style.display='none';
    closeBtn.disabled=true;
    return;
  }

  empty.style.display='none';
  closeBtn.disabled = !(seller && payType && (payType !== 'Себе оплачено' || selfPayType));

  let total = 0;
  itemsEl.innerHTML = items.map(([n,q]) => {
    const p = getPrice(n, payType);
    total += p*q;
    return `<div class="cart-item">
      <span class="ci-name">${escHtml(n)}</span>
      <div class="ci-ctrl">
        <button class="c-btn" onclick="changeQty('${escJs(n)}',-1)">−</button>
        <span class="ci-qty">${q}</span>
        <button class="c-btn" onclick="changeQty('${escJs(n)}',1)">+</button>
        <span class="ci-price">${money(p*q)}</span>
      </div>
    </div>`;
  }).join('');

  totalEl.style.display='flex';
  document.getElementById('total-sum').textContent = money(total);
}

function setSeller(el, name) {
  seller = name;
  document.querySelectorAll('.seller-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  updateCart();
}
function setPay(el, type) {
  payType = type;
  document.querySelectorAll('.pay-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('self-clarify').className = 'self-clarify' + (type==='Себе оплачено'?' visible':'');
  updateCart();
}
function setSelfPay(el, type) {
  selfPayType = type;
  document.querySelectorAll('.self-sub-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  updateCart();
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['kassa','journal','stats'][i]===tab));
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+tab).classList.add('active');
  if (tab==='journal') renderJournal();
  if (tab==='stats') loadStats(currentPeriod);
}

function nextCheckNum(){
  return allChecks.length ? Math.max(...allChecks.map(x => Number(x.num)||0)) + 1 : 1;
}

function nowDate(){
  const now = new Date();
  return String(now.getDate()).padStart(2,'0') + '.' + String(now.getMonth()+1).padStart(2,'0') + '.' + now.getFullYear();
}
function nowTime(){
  const now = new Date();
  return String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
}

async function closeCheck() {
  const items = Object.entries(cart).filter(([k,v])=>v>0);
  if (!items.length) return;

  const isEdit = !!editNum;
  const num = isEdit ? editNum : nextCheckNum();
  const date = isEdit ? editDate : nowDate();
  const time = isEdit ? editTime : nowTime();

  const itemsData = items.map(([n,q]) => ({name:n, qty:q, price:getPrice(n,payType)}));

  const payload = {
    action:'save_check',
    num,
    date,
    time,
    point: POINT,
    seller,
    pay: payType,
    selfPay: payType==='Себе оплачено' ? selfPayType : '',
    edited: isEdit,
    items: itemsData
  };

  const btn = document.getElementById('close-btn');
  btn.textContent = isEdit ? 'Сохраняю...' : 'Сохраняю...';
  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const res = await fetch(API, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify(payload)
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'Ошибка сохранения');

    resetForm();
    await loadRemoteData();
    switchTab('journal');
    showToast(isEdit ? `Чек №${num} обновлён` : `Чек №${num} сохранён`);
  } catch(e) {
    showToast('Ошибка сохранения');
    btn.textContent = isEdit ? 'Сохранить изменения' : 'Закрыть чек';
    btn.classList.remove('loading');
    updateCart();
  }
}

function resetForm(){
  cart = {};
  payType = 'Безналичный';
  selfPayType = 'Наличные';
  seller = sellers[0] || seller;
  editNum = null;
  editDate = '';
  editTime = '';
  document.getElementById('close-btn').textContent = 'Закрыть чек';
  document.getElementById('close-btn').classList.remove('loading');
  document.getElementById('self-clarify').className = 'self-clarify';
  renderSellers();
  renderPayBtns();
  document.querySelectorAll('.self-sub-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  updateCart();
}

function renderJournal() {
  const el = document.getElementById('journal-list');
  document.getElementById('journal-spinner').style.display = allChecks.length ? 'none' : 'block';

  if (!allChecks.length) {
    el.innerHTML='<div style="font-size:13px;color:var(--muted);text-align:center;padding:28px 0">Чеков пока нет</div>';
    return;
  }

  el.innerHTML = allChecks.map(j => {
    const flavors = j.items.map(x => x.qty>1 ? `${escHtml(x.name)} ×${x.qty}` : escHtml(x.name)).join(', ');
    const payLabel = j.selfPay ? `${escHtml(j.pay)} · ${escHtml(j.selfPay)}` : escHtml(j.pay);
    const editDot = j.edited ? '<span class="edited-dot"></span>' : '';
    return `<div class="journal-item">
      <div class="ji-head">
        <span class="ji-who">${editDot} №${escHtml(j.num)} · ${escHtml(j.seller)}</span>
        <span class="ji-meta">${escHtml(j.date)} ${escHtml(j.time)}</span>
      </div>
      <div class="ji-pay">${payLabel}</div>
      <div class="ji-flavors">${flavors}</div>
      <div class="ji-foot">
        <span class="ji-sum">${money(j.sum)}</span>
        <button class="ji-edit" onclick="editCheck('${escJs(j.num)}')">Редактировать</button>
      </div>
    </div>`;
  }).join('');
}

function editCheck(num) {
  const j = allChecks.find(x => String(x.num) === String(num));
  if (!j) return;
  cart = {};
  j.items.forEach(it => cart[it.name] = it.qty);
  payType = j.pay;
  seller = j.seller;
  selfPayType = j.selfPay || 'Наличные';
  editNum = j.num;
  editDate = j.date;
  editTime = j.time;

  renderSellers();
  renderPayBtns();
  document.getElementById('self-clarify').className = 'self-clarify' + (payType==='Себе оплачено'?' visible':'');
  document.querySelectorAll('.self-sub-btn').forEach(b=>b.classList.toggle('active', b.textContent===selfPayType));
  document.getElementById('close-btn').textContent = 'Сохранить изменения';
  updateCart();
  switchTab('kassa');
  showToast('Чек №' + j.num + ' открыт для правки');
}

function setPeriod(btn, period) {
  document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  loadStats(period);
}

function loadStats(period) {
  currentPeriod = period;
  document.getElementById('stats-spinner').className='spinner visible';
  document.getElementById('stats-content').style.display='none';

  const range = getRange(period);
  const from = range.from, to = range.to;

  const inRange = allChecks.filter(j => {
    const d = parseDate(j.date);
    if (!d) return false;
    if (!from && !to) return true;
    return d >= from && d <= to;
  });

  const soldRecords = inRange.filter(j => j.pay !== 'Себе оплачено' && j.pay !== 'Себе без оплаты');
  const selfDebtRecords = inRange.filter(j => j.pay === 'Себе без оплаты');
  const cashRecords = inRange.filter(j => j.pay === 'Наличный');
  const yaRecords = soldRecords.filter(j => j.pay === 'Яндекс');

  const soldQty = soldRecords.reduce((a,j)=>a + j.items.reduce((s,x)=>s + x.qty,0), 0);
  const earn = soldQty * 30;
  const cash = cashRecords.reduce((a,j)=>a + j.sum, 0);
  const yaQty = yaRecords.reduce((a,j)=>a + j.items.reduce((s,x)=>s + x.qty,0), 0);
  const selfDebt = selfDebtRecords.reduce((a,j)=>a + j.sum, 0);
  const payout = earn - cash - selfDebt;

  document.getElementById('s-qty').textContent = soldQty;
  document.getElementById('s-earn').textContent = money(earn);
  document.getElementById('s-cash').textContent = money(cash);
  document.getElementById('s-ya').textContent = yaQty;
  document.getElementById('s-sub').textContent = range.label;
  document.getElementById('payout-period').textContent = range.label;
  document.getElementById('p-sales').textContent = money(earn);
  document.getElementById('p-cash').textContent = money(cash);
  document.getElementById('p-self').textContent = money(selfDebt);
  document.getElementById('p-total').textContent = money(payout);

  const flavorMap = {};
  soldRecords.forEach(j => j.items.forEach(x => flavorMap[x.name] = (flavorMap[x.name] || 0) + x.qty));
  const flavors = Object.entries(flavorMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const max = flavors.length ? flavors[0][1] : 1;

  document.getElementById('flavor-stat-list').innerHTML = flavors.length
    ? flavors.map(([name, qty]) => `<div class="flavor-stat-row">
        <div class="fs-name">${escHtml(name)}</div>
        <div class="fs-bar-wrap"><div class="fs-bar" style="width:${Math.max(6, qty/max*100)}%"></div></div>
        <div class="fs-qty">${qty}</div>
      </div>`).join('')
    : `<div style="font-size:13px;color:var(--muted);text-align:center;padding:16px 0">Нет данных</div>`;

  document.getElementById('stats-spinner').className='spinner';
  document.getElementById('stats-content').style.display='block';
}

function getRange(period){
  const now = new Date();
  const weekStart = getWeekStart(now);
  const weekEnd = new Date(weekStart); weekEnd.setDate(weekEnd.getDate()+6); weekEnd.setHours(23,59,59,999);
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  const monthEnd = new Date(now.getFullYear(), now.getMonth()+1, 0); monthEnd.setHours(23,59,59,999);

  if (period === 'week') return {from:weekStart, to:weekEnd, label:`${formatDate(weekStart)} - ${formatDate(weekEnd)}`};
  if (period === 'month') return {from:monthStart, to:monthEnd, label:monthStart.toLocaleDateString('ru-RU',{month:'long',year:'numeric'})};
  return {from:null, to:null, label:'Всё время'};
}

function getWeekStart(d) {
  const x = new Date(d);
  const day = x.getDay() || 7;
  x.setHours(0,0,0,0);
  x.setDate(x.getDate() - day + 1);
  return x;
}
function parseDate(s) {
  const p = String(s).split('.');
  if (p.length !== 3) return null;
  return new Date(Number(p[2]), Number(p[1])-1, Number(p[0]), 0, 0, 0, 0);
}
function formatDate(d) {
  return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+d.getFullYear();
}

async function loadRemoteData(){
  document.getElementById('journal-spinner').style.display = 'block';
  document.getElementById('stats-spinner').className = 'spinner visible';

  try{
    const res = await fetch(API);
    const json = await res.json();
    const rows = Array.isArray(json.rows) ? json.rows : [];
    const dataRows = rows.length && String(rows[0][0]).trim() === '№' ? rows.slice(1) : rows;

    const map = new Map();
    dataRows.forEach(r => {
      if (!r || !r[0]) return;
      const num = String(r[0]).trim();
      if (!map.has(num)) {
        map.set(num, {
          num,
          date: normalizeDate(r[1]),
          time: normalizeTime(r[2]),
          point: String(r[3] || '').trim(),
          seller: String(r[4] || '').trim(),
          pay: String(r[5] || '').trim(),
          selfPay: String(r[6] || '').trim(),
          edited: String(r[13] || '').trim().toLowerCase() === 'да',
          items:[]
        });
      }
      map.get(num).items.push({
        name:String(r[7] || '').trim(),
        qty:toNum(r[8]),
        price:toNum(r[9]),
        sum:toNum(r[10])
      });
    });

    allChecks = [...map.values()].map(x => {
      x.sum = x.items.reduce((a,it)=>a+it.sum,0);
      return x;
    }).sort((a,b)=>(Number(b.num)||0)-(Number(a.num)||0));

    renderJournal();
    loadStats(currentPeriod);
  }catch(e){
    document.getElementById('journal-list').innerHTML = '<div style="font-size:13px;color:var(--muted);text-align:center;padding:28px 0">Не удалось загрузить журнал</div>';
  }
}

function normalizeDate(v){
  const s = String(v || '').trim();
  if (/^\d{2}\.\d{2}\.\d{4}$/.test(s)) return s;
  if (/^\d{4}-\d{2}-\d{2}T/.test(s)) {
    const d = new Date(s);
    if (!isNaN(d)) return formatDate(d);
  }
  return s;
}
function normalizeTime(v){
  const s = String(v || '').trim();
  if (/^\d{2}:\d{2}$/.test(s)) return s;
  if (/^\d{4}-\d{2}-\d{2}T/.test(s)) {
    const d = new Date(s);
    if (!isNaN(d)) return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  }
  return s;
}
function toNum(v){ return Number(String(v || '0').replace(/\s/g,'').replace(',', '.')) || 0; }
function money(n){ return Number(n || 0).toLocaleString('ru-RU') + ' ₽'; }
function escHtml(s){ return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;"); }
function escJs(s){ return String(s).replaceAll('\\','\\\\').replaceAll("'","\\'"); }

function showModal(mode){
  modalMode = mode;
  document.getElementById('modal-title').textContent = 'Добавить имя';
  document.getElementById('modal-input').value = '';
  document.getElementById('overlay').style.display = 'block';
  document.getElementById('modal').style.display = 'block';
  setTimeout(()=>document.getElementById('modal-input').focus(), 50);
}
function hideModal(){
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('modal').style.display = 'none';
}
function modalConfirm(){
  if (modalMode === 'seller') {
    const v = document.getElementById('modal-input').value.trim();
    if (!v) return;
    if (!sellers.includes(v)) {
      sellers.push(v);
      sellers.sort((a,b)=>a.localeCompare(b,'ru'));
      saveSellers();
    }
    seller = v;
    renderSellers();
    updateCart();
  }
  hideModal();
}
function showToast(text){
  const el = document.getElementById('toast');
  el.textContent = text;
  el.classList.add('show');
  clearTimeout(showToast.t);
  showToast.t = setTimeout(()=>el.classList.remove('show'), 1800);
}

renderSellers();
renderPayBtns();
renderFlavors();
updateCart();
loadRemoteData();
</script>
