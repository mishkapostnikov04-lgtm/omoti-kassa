<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>OMOTI - Касса</title>
  <script type="text/javascript" src="https://gc.kis.v2.scr.kaspersky-labs.com/FD126C42-EBFA-4E12-B309-BB3FDD723AC1/main.js?attr=1ldS-w3IYxLu1SRaoTAf7iMmgGsPp3L6NYAIV_lpHvWFhKGbzqJpr6C8LJXmuyqcs7SH4P7d87_mg3wZm60VovVT9t_Xgx6nD3vbl5Ej-mapdukBQOAMET6Mb-7ZRpud3RNgTnHLEZ4jnyEEEnDSNkQ6FDYZ3ny33DyeQg75m2TagZrYR_7nHvRhvoow7eqBPIkeKN1DH3-Ety9TkRQk74tI8E9DFXQc2aJCL8iiwvr46IdSoi6X9MzWpwH2Rx6ULGW_PZx-Tm_IWbJdFhF_1Q" charset="UTF-8"></script><style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root{
      --bg:#f7f6f2;
      --card:#ffffff;
      --text:#1a1a1a;
      --muted:#8a8a8a;
      --border:#e4e0d8;
      --accent:#1a1a1a;
      --accentText:#ffffff;
      --gold:#caa453;
      --danger:#ce4a4a;
      --ok:#eaf4ed;
    }
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    }
    .wrap{ max-width:460px; margin:0 auto; min-height:100vh; }
    .topbar{
      position:sticky; top:0; z-index:20;
      background:rgba(247,246,242,.96);
      backdrop-filter: blur(8px);
      border-bottom:1px solid var(--border);
      padding:14px 14px 10px;
    }
    .topline{
      display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px;
    }
    .title{ font-size:16px; font-weight:700; }
    .tabs{ display:flex; gap:4px; background:#ece8df; padding:4px; border-radius:16px; }
    .tab{
      border:0; background:transparent; padding:8px 12px; border-radius:12px;
      color:#666; font-size:13px; cursor:pointer;
    }
    .tab.active{ background:var(--card); color:var(--text); font-weight:700; box-shadow:0 1px 2px rgba(0,0,0,.06); }
    .screen{ display:none; padding:14px; }
    .screen.active{ display:block; }
    .label{
      font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin:2px 0 8px;
    }
    .card{
      background:var(--card); border:1px solid var(--border); border-radius:16px; padding:12px; margin-bottom:14px;
    }
    .row{ display:flex; gap:8px; flex-wrap:wrap; }
    .btn{
      border:1px solid var(--border); background:var(--card); color:var(--text);
      border-radius:12px; padding:11px 10px; font-size:13px; cursor:pointer; min-height:44px;
    }
    .btn.active{ background:var(--accent); color:var(--accentText); border-color:var(--accent); }
    .seller-btn{ flex:1 1 calc(33.333% - 6px); min-width:110px; }
    .flavors{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .flavor{
      min-height:48px; padding:8px 6px; font-size:12px; line-height:1.15; text-align:center; position:relative;
    }
    .flavor.gold{ border-color:var(--gold); }
    .flavor.active{ background:#fff7e7; border-color:var(--gold); color:var(--text); }
    .flavor-qty{
      position:absolute; right:6px; top:6px; min-width:18px; height:18px; padding:0 4px;
      border-radius:999px; background:var(--accent); color:#fff; font-size:11px; line-height:18px; font-weight:700;
    }
    .pay-grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .pay-btn{ width:100%; font-size:14px; }
    .cart-empty{ color:var(--muted); font-size:14px; text-align:center; padding:8px 0; }
    .cart-row{
      display:grid; grid-template-columns:1fr auto auto; gap:10px; align-items:center; padding:10px 0; border-top:1px solid var(--border);
    }
    .cart-row:first-child{ border-top:0; }
    .qty{ display:flex; align-items:center; gap:10px; white-space:nowrap; }
    .qty button{
      width:28px; height:28px; border-radius:999px; border:1px solid var(--border); background:#fff; cursor:pointer;
    }
    .sum{ font-weight:700; white-space:nowrap; }
    .total{
      display:flex; justify-content:space-between; align-items:center; border-top:1px solid var(--border);
      padding-top:10px; margin-top:6px; font-weight:700;
    }
    .main-action{
      width:100%; border:0; border-radius:14px; padding:15px 16px; background:var(--accent);
      color:var(--accentText); font-size:18px; font-weight:700; cursor:pointer;
    }
    .main-action:disabled{ opacity:.45; cursor:not-allowed; }
    .muted{ color:var(--muted); }
    .check{
      background:var(--card); border:1px solid var(--border); border-radius:16px; padding:12px; margin-bottom:10px;
    }
    .check-head{
      display:flex; justify-content:space-between; gap:10px; align-items:flex-start; margin-bottom:8px;
    }
    .check-num-wrap{ display:flex; align-items:center; gap:7px; margin-bottom:4px; }
    .check-num{ font-weight:800; font-size:26px; line-height:1; }
    .edited-dot{
      width:10px; height:10px; border-radius:999px; background:var(--danger); flex:0 0 auto;
    }
    .check-meta{ color:var(--muted); font-size:12px; line-height:1.35; }
    .badge{
      display:inline-block; padding:7px 10px; border-radius:999px; border:1px solid var(--border);
      font-size:13px; font-weight:800; white-space:nowrap;
    }
    .items{ margin:8px 0 10px; font-size:13px; line-height:1.5; }
    .item-qty{ font-weight:700; }
    .check-actions{ display:flex; justify-content:flex-end; }
    .edit-btn{
      border:1px solid var(--border); background:#fff; border-radius:10px; padding:9px 12px; cursor:pointer; font-size:13px;
    }
    .summary-box{
      background:var(--card); border:1px solid var(--border); border-radius:16px; padding:14px; margin-bottom:12px;
    }
    .summary-title{ font-weight:700; margin-bottom:8px; }
    .summary-row{
      display:flex; justify-content:space-between; gap:12px; padding:7px 0; border-top:1px solid var(--border);
    }
    .summary-row:first-child{ border-top:0; }
    .note{
      background:var(--ok); border:1px solid #d5e8db; padding:11px 12px; border-radius:12px; font-size:13px; line-height:1.35;
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="topline">
      <div class="title">OMOTI - Новогодняя</div>
      <div class="tabs">
        <button class="tab active" data-tab="cashbox">Касса</button>
        <button class="tab" data-tab="journal">Журнал</button>
        <button class="tab" data-tab="summary">Итоги</button>
      </div>
    </div>
  </div>

  <section class="screen active" id="cashbox">
    <div class="label">Имя</div>
    <div class="row" id="sellerRow"></div>

    <div class="label" style="margin-top:16px;">Вкус</div>
    <div class="flavors" id="flavorGrid"></div>

    <div class="label" style="margin-top:16px;">Оплата</div>
    <div class="pay-grid" id="payGrid"></div>

    <div id="selfPayWrap" style="display:none;">
      <div class="label" style="margin-top:16px;">Как оплатили себе</div>
      <div class="pay-grid" id="selfPayGrid"></div>
    </div>

    <div class="label" style="margin-top:16px;">Чек</div>
    <div class="card">
      <div id="cart"></div>
    </div>

    <button class="main-action" id="saveBtn" disabled>Закрыть чек</button>
  </section>

  <section class="screen" id="journal">
    <div id="journalList" class="muted">Загрузка...</div>
  </section>

  <section class="screen" id="summary">
    <div id="summaryContent" class="muted">Загрузка...</div>
  </section>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwJUNri2OdJ5gHOQPeJVqQs3IkYTb-ypc26l4JqKAzVREKhkr4a7qqIXFknyPfV4w4CRw/exec';
const POINT_NAME = 'Новогодняя';

const DEFAULT_SELLERS = ['Алексей', 'Галина', 'Кирилл'];
const PREMIUM = new Set(['Дубайский шоколад', 'Криспи']);
const FLAVORS = [
  'Арбуз-Дыня','Бабл Гам','Банан-Нутелла','Вишня-Тонка','Дубайский шоколад',
  'Киви-Алоэ','Клубника','Кокос-Маракуйя','Кокосовый пломбир','Кофе-Карамель',
  'Криспи','Малина-Ваниль','Матча-Манго','Мохито','Печенье','Сливочный лимон',
  'Смородина','Сникерс','Твикс','Трюфель','Шоколад'
].sort((a,b)=>a.localeCompare(b,'ru'));

const PAYMENTS = ['Безналичный','Наличный','Перевод','Яндекс','Себе оплачено','Себе без оплаты'];
const SELF_PAYMENTS = ['Наличный','Перевод'];

let sellers = loadSellers_();
let selectedSeller = '';
let selectedPay = '';
let selectedSelfPay = '';
let cart = {};
let allChecks = [];
let editCheckNum = null;
let editOriginalDate = '';
let editOriginalTime = '';

const tabs = [...document.querySelectorAll('.tab')];
tabs.forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));
document.getElementById('saveBtn').addEventListener('click', saveCheck);

function switchTab(tabName){
  tabs.forEach(t => t.classList.toggle('active', t.dataset.tab === tabName));
  document.querySelectorAll('.screen').forEach(s => s.classList.toggle('active', s.id === tabName));
  if (tabName === 'journal') renderJournal();
  if (tabName === 'summary') renderSummary();
}

function loadSellers_(){
  try{
    const raw = localStorage.getItem('omoti_sellers');
    if (!raw) return [...DEFAULT_SELLERS];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) && parsed.length ? parsed : [...DEFAULT_SELLERS];
  }catch(e){
    return [...DEFAULT_SELLERS];
  }
}
function saveSellers_(){ localStorage.setItem('omoti_sellers', JSON.stringify(sellers)); }

function renderSellers(){
  const row = document.getElementById('sellerRow');
  row.innerHTML = '';
  sellers.forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'btn seller-btn' + (selectedSeller === name ? ' active' : '');
    btn.textContent = name;
    btn.onclick = () => {
      selectedSeller = name;
      renderSellers();
      updateSaveBtn();
    };
    row.appendChild(btn);
  });

  const addBtn = document.createElement('button');
  addBtn.className = 'btn seller-btn';
  addBtn.textContent = '+';
  addBtn.onclick = () => {
    const name = prompt('Новое имя');
    if (!name) return;
    const clean = name.trim();
    if (!clean) return;
    if (!sellers.includes(clean)) {
      sellers.push(clean);
      sellers.sort((a,b)=>a.localeCompare(b,'ru'));
      saveSellers_();
    }
    selectedSeller = clean;
    renderSellers();
    updateSaveBtn();
  };
  row.appendChild(addBtn);
}

function renderFlavors(){
  const grid = document.getElementById('flavorGrid');
  grid.innerHTML = '';
  FLAVORS.forEach(flavor => {
    const qty = cart[flavor] || 0;
    const btn = document.createElement('button');
    btn.className = 'btn flavor' + (PREMIUM.has(flavor) ? ' gold' : '') + (qty > 0 ? ' active' : '');
    btn.innerHTML = `${escapeHtml(flavor)}${qty > 0 ? `<span class="flavor-qty">${qty}</span>` : ''}`;
    btn.onclick = () => {
      cart[flavor] = (cart[flavor] || 0) + 1;
      renderFlavors();
      renderCart();
      updateSaveBtn();
    };
    grid.appendChild(btn);
  });
}

function renderPayments(){
  const wrap = document.getElementById('payGrid');
  wrap.innerHTML = '';
  PAYMENTS.forEach(pay => {
    const btn = document.createElement('button');
    btn.className = 'btn pay-btn' + (selectedPay === pay ? ' active' : '');
    btn.textContent = pay;
    btn.onclick = () => {
      selectedPay = pay;
      if (pay !== 'Себе оплачено') selectedSelfPay = '';
      document.getElementById('selfPayWrap').style.display = pay === 'Себе оплачено' ? 'block' : 'none';
      renderPayments();
      renderSelfPayments();
      renderCart();
      updateSaveBtn();
    };
    wrap.appendChild(btn);
  });
}

function renderSelfPayments(){
  const wrap = document.getElementById('selfPayGrid');
  wrap.innerHTML = '';
  SELF_PAYMENTS.forEach(pay => {
    const btn = document.createElement('button');
    btn.className = 'btn pay-btn' + (selectedSelfPay === pay ? ' active' : '');
    btn.textContent = pay;
    btn.onclick = () => {
      selectedSelfPay = pay;
      renderSelfPayments();
      updateSaveBtn();
    };
    wrap.appendChild(btn);
  });
}

function getPrice(flavor, pay){
  const premium = PREMIUM.has(flavor);
  if (pay === 'Яндекс') return premium ? 250 : 200;
  if (pay === 'Себе оплачено' || pay === 'Себе без оплаты') return premium ? 110 : 100;
  return premium ? 200 : 180;
}

function renderCart(){
  const cartWrap = document.getElementById('cart');
  const entries = Object.entries(cart).filter(([,qty]) => qty > 0);

  if (!entries.length){
    cartWrap.innerHTML = '<div class="cart-empty">Выбери вкусы</div>';
    renderFlavors();
    return;
  }

  let total = 0;
  cartWrap.innerHTML = '';
  entries.sort((a,b)=>a[0].localeCompare(b[0],'ru')).forEach(([name, qty]) => {
    const price = getPrice(name, selectedPay);
    const sum = price * qty;
    total += sum;

    const row = document.createElement('div');
    row.className = 'cart-row';
    row.innerHTML = `
      <div>${escapeHtml(name)}</div>
      <div class="qty">
        <button type="button">−</button>
        <span>${qty}</span>
        <button type="button">+</button>
      </div>
      <div class="sum">${formatMoney(sum)}</div>
    `;
    const [minus, plus] = row.querySelectorAll('button');
    minus.onclick = () => {
      cart[name] = (cart[name] || 0) - 1;
      if (cart[name] <= 0) delete cart[name];
      renderFlavors();
      renderCart();
      updateSaveBtn();
    };
    plus.onclick = () => {
      cart[name] = (cart[name] || 0) + 1;
      renderFlavors();
      renderCart();
      updateSaveBtn();
    };
    cartWrap.appendChild(row);
  });

  const totalRow = document.createElement('div');
  totalRow.className = 'total';
  totalRow.innerHTML = `<span>Итого</span><span>${formatMoney(total)}</span>`;
  cartWrap.appendChild(totalRow);
}

function updateSaveBtn(){
  const hasItems = Object.keys(cart).length > 0;
  const needSelfPay = selectedPay === 'Себе оплачено';
  const disabled = !selectedSeller || !selectedPay || !hasItems || (needSelfPay && !selectedSelfPay);
  document.getElementById('saveBtn').disabled = disabled;
}

function nextCheckNum(){
  if (!allChecks.length) return '1';
  const maxNum = Math.max(...allChecks.map(c => Number(c.num) || 0), 0);
  return String(maxNum + 1);
}

function getNowDate(){
  const d = new Date();
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const yyyy = d.getFullYear();
  return `${dd}.${mm}.${yyyy}`;
}
function getNowTime(){
  const d = new Date();
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  return `${hh}:${mm}`;
}

async function saveCheck(){
  const items = Object.entries(cart).filter(([,qty]) => qty > 0).map(([name, qty]) => ({
    name,
    qty,
    price: getPrice(name, selectedPay)
  }));
  if (!items.length) return;

  const isEdit = !!editCheckNum;
  const num = editCheckNum || nextCheckNum();
  const date = isEdit ? editOriginalDate : getNowDate();
  const time = isEdit ? editOriginalTime : getNowTime();

  const payload = {
    action: 'save_check',
    num,
    date,
    time,
    point: POINT_NAME,
    seller: selectedSeller,
    pay: selectedPay,
    selfPay: selectedPay === 'Себе оплачено' ? selectedSelfPay : '',
    includedInPayout: 'нет',
    edited: isEdit,
    items
  };

  document.getElementById('saveBtn').disabled = true;

  try{
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: {'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify(payload)
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'Ошибка сохранения');

    resetForm();
    await loadChecks();
    switchTab('journal');
  }catch(err){
    alert('Не удалось сохранить чек. ' + err.message);
    updateSaveBtn();
  }
}

function resetForm(){
  selectedSeller = '';
  selectedPay = '';
  selectedSelfPay = '';
  cart = {};
  editCheckNum = null;
  editOriginalDate = '';
  editOriginalTime = '';
  document.getElementById('selfPayWrap').style.display = 'none';
  document.getElementById('saveBtn').textContent = 'Закрыть чек';
  renderSellers();
  renderPayments();
  renderSelfPayments();
  renderFlavors();
  renderCart();
  updateSaveBtn();
}

function renderJournal(){
  const box = document.getElementById('journalList');
  if (!allChecks.length){
    box.innerHTML = '<div class="muted">Чеков пока нет</div>';
    return;
  }

  box.innerHTML = '';
  allChecks.forEach(check => {
    const sum = check.items.reduce((acc,i)=>acc + i.sum, 0);
    const editedDot = check.edited ? '<span class="edited-dot" title="Чек редактировался"></span>' : '';
    const div = document.createElement('div');
    div.className = 'check';
    div.innerHTML = `
      <div class="check-head">
        <div>
          <div class="check-num-wrap">${editedDot}<div class="check-num">№${escapeHtml(check.num)}</div></div>
          <div class="check-meta"><strong>${escapeHtml(check.date)}</strong> · <strong>${escapeHtml(check.time)}</strong><br>${escapeHtml(check.seller)} · ${escapeHtml(check.point)}</div>
        </div>
        <div class="badge"><strong>${escapeHtml(check.pay)}</strong>${check.selfPay ? ' · ' + escapeHtml(check.selfPay) : ''}</div>
      </div>
      <div class="items">${check.items.map(i => `${escapeHtml(i.name)} - <span class="item-qty">${i.qty}</span> шт - <strong>${formatMoney(i.sum)}</strong>`).join('<br>')}</div>
      <div class="total"><strong>Итого</strong><strong>${formatMoney(sum)}</strong></div>
      <div class="check-actions" style="margin-top:10px;">
        <button class="edit-btn" type="button">Редактировать</button>
      </div>
    `;
    div.querySelector('.edit-btn').onclick = () => loadToForm(check);
    box.appendChild(div);
  });
}

function loadToForm(check){
  editCheckNum = check.num;
  editOriginalDate = check.date;
  editOriginalTime = check.time;
  selectedSeller = check.seller;
  selectedPay = check.pay;
  selectedSelfPay = check.selfPay || '';
  cart = {};
  check.items.forEach(i => cart[i.name] = i.qty);
  document.getElementById('selfPayWrap').style.display = selectedPay === 'Себе оплачено' ? 'block' : 'none';

  document.getElementById('saveBtn').textContent = 'Сохранить изменения';
  renderSellers();
  renderPayments();
  renderSelfPayments();
  renderFlavors();
  renderCart();
  updateSaveBtn();
  switchTab('cashbox');
  window.scrollTo({top:0, behavior:'smooth'});
}

function renderSummary(){
  const box = document.getElementById('summaryContent');
  if (!allChecks.length){
    box.innerHTML = '<div class="muted">Данных пока нет</div>';
    return;
  }

  const now = new Date();
  const monday = startOfWeek(now);
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);

  const inWeek = allChecks.filter(check => {
    const d = parseRuDate(check.date);
    return d && d >= monday && d <= endOfDay(sunday);
  });

  const soldChecks = inWeek.filter(c => c.pay !== 'Себе оплачено' && c.pay !== 'Себе без оплаты');
  const soldQty = soldChecks.reduce((acc, c) => acc + c.items.reduce((s, i) => s + i.qty, 0), 0);
  const earnings = soldQty * 30;
  const cash = inWeek.filter(c => c.pay === 'Наличный').reduce((acc,c)=>acc + c.items.reduce((s,i)=>s+i.sum,0),0);
  const selfDebt = inWeek.filter(c => c.pay === 'Себе без оплаты').reduce((acc,c)=>acc + c.items.reduce((s,i)=>s+i.sum,0),0);
  const selfCash = inWeek.filter(c => c.pay === 'Себе оплачено' && c.selfPay === 'Наличный').reduce((acc,c)=>acc + c.items.reduce((s,i)=>s+i.sum,0),0);
  const payout = earnings - cash - selfDebt - selfCash;
  const bySeller = {};

  inWeek.forEach(c => {
    const name = c.seller || 'Без имени';
    if (!bySeller[name]) bySeller[name] = {qty:0, earn:0};
    if (c.pay !== 'Себе оплачено' && c.pay !== 'Себе без оплаты') {
      const qty = c.items.reduce((s,i)=>s+i.qty,0);
      bySeller[name].qty += qty;
      bySeller[name].earn += qty * 30;
    }
  });

  const sellerHtml = Object.entries(bySeller)
    .sort((a,b)=>a[0].localeCompare(b[0],'ru'))
    .map(([name, info]) => `<div class="summary-row"><span>${escapeHtml(name)}</span><span>${info.qty} шт · ${formatMoney(info.earn)}</span></div>`)
    .join('');

  box.innerHTML = `
    <div class="summary-box">
      <div class="summary-title">Текущая неделя</div>
      <div class="summary-row"><span>Период</span><span>${formatDate(monday)} - ${formatDate(sunday)}</span></div>
      <div class="summary-row"><span>Продано штук</span><span>${soldQty}</span></div>
      <div class="summary-row"><span>Начислено по 30 ₽</span><span>${formatMoney(earnings)}</span></div>
      <div class="summary-row"><span>Наличные клиентов</span><span>${formatMoney(cash)}</span></div>
      <div class="summary-row"><span>Себе без оплаты</span><span>${formatMoney(selfDebt)}</span></div>
      <div class="summary-row"><span>Себе оплачено наличными</span><span>${formatMoney(selfCash)}</span></div>
      <div class="summary-row"><strong>К выплате</strong><strong>${formatMoney(payout)}</strong></div>
    </div>
    <div class="summary-box">
      <div class="summary-title">По именам</div>
      ${sellerHtml || '<div class="muted">Нет данных</div>'}
    </div>
    <div class="note">Красная точка в журнале означает, что чек уже редактировали.</div>
  `;
}

async function loadChecks(){
  try{
    const res = await fetch(SCRIPT_URL);
    const json = await res.json();
    if (!json.ok && json.ok !== undefined) throw new Error(json.error || 'Ошибка загрузки');

    const rows = Array.isArray(json.rows) ? json.rows : [];
    const dataRows = rows.length && String(rows[0][0]).trim() === '№' ? rows.slice(1) : rows;

    const map = new Map();
    dataRows.forEach(r => {
      if (!r || !r[0]) return;
      const num = String(r[0]).trim();
      if (!map.has(num)) {
        map.set(num, {
          num,
          date: String(r[1] || '').trim(),
          time: String(r[2] || '').trim(),
          point: String(r[3] || '').trim(),
          seller: String(r[4] || '').trim(),
          pay: String(r[5] || '').trim(),
          selfPay: String(r[6] || '').trim(),
          edited: String(r[13] || '').trim().toLowerCase() === 'да',
          items: []
        });
      }
      map.get(num).items.push({
        name: String(r[7] || '').trim(),
        qty: Number(String(r[8] || '0').replace(',', '.')) || 0,
        price: Number(String(r[9] || '0').replace(/\s/g,'').replace(',', '.')) || 0,
        sum: Number(String(r[10] || '0').replace(/\s/g,'').replace(',', '.')) || 0
      });
    });

    allChecks = [...map.values()].sort((a,b) => (Number(b.num) || 0) - (Number(a.num) || 0));
    renderJournal();
    renderSummary();
  }catch(err){
    document.getElementById('journalList').innerHTML = '<div class="muted">Не удалось загрузить журнал</div>';
    document.getElementById('summaryContent').innerHTML = '<div class="muted">Не удалось загрузить итоги</div>';
  }
}

function formatMoney(v){ return `${Number(v || 0).toLocaleString('ru-RU')} ₽`; }
function escapeHtml(str){
  return String(str)
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'","&#039;");
}
function parseRuDate(str){
  const parts = String(str).split('.');
  if (parts.length !== 3) return null;
  const [dd,mm,yyyy] = parts.map(Number);
  return new Date(yyyy, mm - 1, dd, 0, 0, 0, 0);
}
function formatDate(d){
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const yyyy = d.getFullYear();
  return `${dd}.${mm}.${yyyy}`;
}
function startOfWeek(date){
  const d = new Date(date);
  const day = d.getDay() || 7;
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() - day + 1);
  return d;
}
function endOfDay(date){
  const d = new Date(date);
  d.setHours(23,59,59,999);
  return d;
}
