<style>
@import url('https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d0d0f;--card:#16161a;--card2:#1e1e24;--border:#2a2a32;
  --text:#f0ede8;--muted:#6b6b78;--muted2:#44444e;
  --accent:#c8a84b;--accent2:#e8c96b;
  --green:#4caf82;--red:#e05555;--blue:#5b8def;--radius:16px;
}
body{font-family:'Onest',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:520px;margin:0 auto;padding:0 0 40px}

.topbar{position:sticky;top:0;z-index:30;background:rgba(13,13,15,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 16px 12px}
.topbar-title{font-size:17px;font-weight:800;letter-spacing:-.02em;color:var(--text);margin-bottom:2px}
.topbar-sub{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.period-scroll{display:flex;gap:6px;padding:14px 16px 0;overflow-x:auto;scrollbar-width:none}
.period-scroll::-webkit-scrollbar{display:none}
.period-row{display:flex;gap:6px;padding:0 16px;margin-top:0}
.period-btn{white-space:nowrap;border:1px solid var(--border);background:transparent;border-radius:20px;padding:7px 14px;font-size:12px;font-family:'Onest',sans-serif;color:var(--muted);cursor:pointer;transition:.15s}
.period-btn.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700}
.period-dropdown{position:relative;display:inline-block;flex-shrink:0}
.period-dd-menu{display:none;position:absolute;top:calc(100% + 4px);left:0;z-index:100;background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:0 4px 20px rgba(0,0,0,.5);min-width:210px;overflow:hidden;max-height:260px;overflow-y:auto}
.period-dd-menu.open{display:block}
.period-dd-item{display:block;width:100%;border:none;background:none;text-align:left;padding:10px 14px;font-size:13px;font-family:'Onest',sans-serif;color:var(--text);cursor:pointer;white-space:nowrap}
.period-dd-item:hover{background:var(--card2)}
.period-dd-item.selected{font-weight:700;color:var(--accent)}

.refresh-row{display:flex;justify-content:flex-end;padding:10px 16px 0}
.refresh-btn{border:none;background:none;font-size:12px;color:var(--muted);cursor:pointer;font-family:'Onest',sans-serif;display:flex;align-items:center;gap:4px;padding:4px 0}
.refresh-btn:hover{color:var(--text)}
.refresh-icon{display:inline-block}
.refresh-btn.spinning .refresh-icon{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* SUMMARY */
.summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 16px 0}
.sum-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 15px}
.sum-card.accent{background:linear-gradient(135deg,#1e1a0e 0%,#1a1608 100%);border-color:#3a3010}
.sum-card.wide{grid-column:1/-1;display:flex;justify-content:space-between;align-items:center}
.sum-label{font-size:11px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.07em}
.sum-val{font-size:26px;font-weight:800;line-height:1;color:var(--text)}
.sum-card.accent .sum-val{color:var(--accent2)}
.sum-sub{font-size:11px;color:var(--muted);margin-top:4px}
.sum-card.accent .sum-sub{color:#8a7a40}
.cash-badge{background:#1e2218;border:1px solid #3a4a2a;border-radius:10px;padding:8px 14px;display:flex;align-items:center;gap:8px}
.cash-badge-label{font-size:11px;color:#7a9a6a;text-transform:uppercase;letter-spacing:.07em}
.cash-badge-val{font-size:18px;font-weight:800;color:#a8d48a}

/* SECTION */
.section{padding:18px 16px 0}
.sec-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}

/* POINTS */
.points-grid{display:flex;flex-direction:column;gap:8px}
.point-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.point-head{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--border)}
.point-name{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.point-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.point-stats{display:grid;grid-template-columns:repeat(3,1fr)}
.ps-cell{padding:10px 14px;border-right:1px solid var(--border);text-align:center}
.ps-cell:last-child{border-right:none}
.ps-val{font-size:15px;font-weight:700;color:var(--text)}
.ps-label{font-size:10px;color:var(--muted);margin-top:2px}
.point-extra{display:grid;border-top:1px solid var(--border)}
.point-extra-cell{padding:8px 14px;border-right:1px solid var(--border);text-align:center}
.point-extra-cell:last-child{border-right:none}
.pec-val{font-size:13px;font-weight:700}
.pec-label{font-size:10px;color:var(--muted);margin-top:1px}

/* CHANNEL BLOCK */
.ch-block{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.ch-block-title{padding:10px 14px;background:var(--card2);border-bottom:1px solid var(--border);font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;display:flex;justify-content:space-between;align-items:center}
.ch-row{display:grid;grid-template-columns:1fr 44px 80px 80px;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border)}
.ch-row:last-child{border-bottom:none}
.ch-row.header{padding:7px 14px;background:rgba(255,255,255,.02)}
.ch-name{font-size:13px;color:var(--text)}
.ch-hdr{font-size:10px;color:var(--muted);text-align:right}
.ch-qty{font-size:13px;font-weight:700;text-align:right;color:var(--text)}
.ch-sum{font-size:13px;font-weight:700;text-align:right;color:var(--text)}
.ch-profit{font-size:13px;font-weight:700;text-align:right}
.ch-row.total-row{background:var(--card2);border-top:2px solid var(--border)}
.ch-row.total-row .ch-name{font-weight:700}
.cost-hint{padding:8px 14px;font-size:11px;color:var(--muted2);border-top:1px solid var(--border);line-height:1.6}

/* BRAK / INFO */
.info-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--card)}
.info-row:last-child{border-bottom:none}
.info-label{font-size:13px;color:var(--muted)}
.info-val{font-size:13px;font-weight:700;color:var(--red)}

.skeleton{background:linear-gradient(90deg,var(--card) 25%,var(--card2) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:12px;height:80px;margin:10px 16px 0}
@keyframes shimmer{to{background-position:-200% 0}}

.profit-pos{color:var(--accent)}
.profit-neg{color:var(--red)}

.color-a{background:#4caf82}
.color-s{background:#5b8def}
.color-n{background:#c8a84b}

<script>
// βîÄβîÄβîÄ –Δ–û–ß–ö–‰ βîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄ
const POINTS = [
  { name:'–ê–Ϋ–Η–Κ–Η–Ϋ–Α',    key:'a', color:'color-a', payPoint:false,
    api:'https://script.google.com/macros/s/AKfycbwP7_mB2CklN-iNzv8lquiQYy-Kx2hYO6JVqjkuP1mcRqbHji7uXmG0y_HHQpHUNMVlUA/exec' },
  { name:'–Γ–Ψ–≤–Β―²―¹–Κ–Α―è',  key:'s', color:'color-s', payPoint:true,
    api:'https://script.google.com/macros/s/AKfycbyT9qeLuDVhEsM_keCToMuzjVoG6K0Mrq-7Fw-KafWk6NyKrNQ9eH_GJimizoXjF-Rk/exec' },
  { name:'–ù–Ψ–≤–Ψ–≥–Ψ–¥–Ϋ―è―è', key:'n', color:'color-n', payPoint:true,
    api:'https://script.google.com/macros/s/AKfycbz3ItZC39czYtZjmM_I6bmGWXov6BOPUoW7HhniV5pRs4KxoB1b1825mCxmRb1TAGzJkw/exec' },
];

// βîÄβîÄβîÄ –½–ê–Δ–†–ê–Δ–Ϊ βîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄ
// –†–Ψ–Ζ–Ϋ–Η―Ü–Α: –Ω―Ä–Ψ–¥―É–Κ―²―΄ + ―É–Ω–Α–Κ–Ψ–≤–Κ–Α + –Θ–Γ–ù 6% + ―ç–Κ–≤–Α–Ι―Ä–Η–Ϋ–≥ 1% + [30β²Ϋ ―²–Ψ―΅–Κ–Β]
// –·–Ϋ–¥–Β–Κ―¹:  –Ω―Ä–Ψ–¥―É–Κ―²―΄ + ―É–Ω–Α–Κ–Ψ–≤–Κ–Α + –Θ–Γ–ù 6% + –Α–≥―Ä–Β–≥–Α―²–Ψ―Ä 45% + [30β²Ϋ ―²–Ψ―΅–Κ–Β] (―ç–Κ–≤–Α–Ι―Ä–Η–Ϋ–≥–Α –Ϋ–Β―²)
// –Γ–Β–±–Β –Ψ–Ω–Μ–Α―΅–Β–Ϋ–Ψ: –Ω―Ä–Ψ–¥―É–Κ―²―΄ + –Κ–Α–Ω―¹―É–Μ–Α + –Ω–Α–Κ–Β―² (–±–Β–Ζ –Θ–Γ–ù, –±–Β–Ζ ―ç–Κ–≤–Α–Ι―Ä–Η–Ϋ–≥–Α, –±–Β–Ζ ―²–Ψ―΅–Κ–Η)
// –Γ–Β–±–Β –±–Β–Ζ –Ψ–Ω–Μ–Α―²―΄: –Ϋ–Β ―¹―΅–Η―²–Α–Β–Φ (–≤―΄―΅–Η―²–Α–Β―²―¹―è –Η–Ζ –≤―΄–Ω–Μ–Α―²―΄ ―²–Ψ―΅–Κ–Β)
// –ë―Ä–Α–Κ: ―¹–Ω–Η―¹–Α–Ϋ–Η–Β = –Ω―Ä–Ψ–¥―É–Κ―²―΄ + –Κ–Α–Ω―¹―É–Μ–Α (–Φ–Η–Ϋ–Η–Φ–Α–Μ―¨–Ϋ―΄–Β –Ζ–Α―²―Ä–Α―²―΄ –Ϋ–Α –Ω―Ä–Ψ–¥―É–Κ―²)

const C = {
  products: 22.25,
  box: 3.00, sticker: 0.60, card: 0.80, package: 2.00, capsule: 0.50,
  package_self: 0.05,
  usn: 0.06,
  acquiring: 0.01,
  aggregator: 0.45,
  point_fee: 30,
};

// ―³–Η–Κ―¹ –Ζ–Α―²―Ä–Α―²―΄ –Ϋ–Α ―É–Ω–Α–Κ–Ψ–≤–Κ―É (―Ä–Ψ–Ζ–Ϋ–Η―Ü–Α –Η ―è–Ϋ–¥–Β–Κ―¹)
const PACK_COST = C.box + C.sticker + C.card + C.package + C.capsule; // 6.90

function calcRetailProfit(qty, revenue, payPoint) {
  const fixedCost = qty * (C.products + PACK_COST);
  const pctCost   = revenue * (C.usn + C.acquiring);
  const pointCost = payPoint ? qty * C.point_fee : 0;
  return revenue - fixedCost - pctCost - pointCost;
}

function calcYandexProfit(qty, revenue, payPoint) {
  const fixedCost = qty * (C.products + PACK_COST);
  const pctCost   = revenue * (C.usn + C.aggregator); // –Ϋ–Β―² ―ç–Κ–≤–Α–Ι―Ä–Η–Ϋ–≥–Α
  const pointCost = payPoint ? qty * C.point_fee : 0;
  return revenue - fixedCost - pctCost - pointCost;
}

function calcSelfPaidProfit(qty, revenue) {
  // –¥–Β–Ϋ―¨–≥–Η –Ω―Ä–Η―à–Μ–Η, –Ζ–Α―²―Ä–Α―²―΄ ―²–Ψ–Μ―¨–Κ–Ψ –Ω―Ä–Ψ–¥―É–Κ―² + –Κ–Α–Ω―¹―É–Μ–Α + –Ω–Α–Κ–Β―², –±–Β–Ζ –Θ–Γ–ù –Η ―²–Ψ―΅–Β–Κ
  const fixedCost = qty * (C.products + C.capsule + C.package_self);
  return revenue - fixedCost;
}

function calcBrakLoss(qty) {
  // ―΅–Η―¹―²–Ψ–Β ―¹–Ω–Η―¹–Α–Ϋ–Η–Β –Ω―Ä–Ψ–¥―É–Κ―²–Ψ–≤
  return -(qty * (C.products + C.capsule));
}

// βîÄβîÄβîÄ –Δ–‰–ü–Ϊ –û–ü–¦–ê–Δ–Ϊ βîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄ
const PAY_RETAIL    = ['–ù–Α–Μ–Η―΅–Ϋ―΄–Ι','–ë–Β–Ζ–Ϋ–Α–Μ–Η―΅–Ϋ―΄–Ι','–ü–Β―Ä–Β–≤–Ψ–¥'];
const PAY_YANDEX    = ['–·–Ϋ–¥–Β–Κ―¹'];
const PAY_SELF_PAID = ['–Γ–Β–±–Β –Ψ–Ω–Μ–Α―΅–Β–Ϋ–Ψ'];
const PAY_SELF_FREE = ['–Γ–Β–±–Β –±–Β–Ζ –Ψ–Ω–Μ–Α―²―΄'];
const PAY_BRAK      = ['–ë―Ä–Α–Κ'];

function getPayGroup(pay) {
  if(PAY_RETAIL.includes(pay))    return 'retail';
  if(PAY_YANDEX.includes(pay))    return 'yandex';
  if(PAY_SELF_PAID.includes(pay)) return 'self_paid';
  if(PAY_SELF_FREE.includes(pay)) return 'self_free';
  if(PAY_BRAK.includes(pay))      return 'brak';
  return null;
}

// βîÄβîÄβîÄ –î–ê–ù–ù–Ϊ–ï βîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄ
let allData = {};
let period  = 'week';
let loading = false;

function toNum(v){ return Number(String(v||'0').replace(/\s/g,'').replace(',','.'))||0; }

function parseDate(s){
  const p = String(s||'').split('.');
  if(p.length===3) return new Date(Number(p[2]),Number(p[1])-1,Number(p[0]));
  return null;
}

function normalizeDate(v){
  const s = String(v||'').trim();
  if(/^\d{2}\.\d{2}\.\d{4}$/.test(s)) return s;
  if(/^\d{4}-\d{2}-\d{2}T/.test(s)){
    const d = new Date(s);
    if(!isNaN(d)) return pad(d.getDate())+'.'+pad(d.getMonth()+1)+'.'+d.getFullYear();
  }
  return s;
}
function pad(n){ return String(n).padStart(2,'0'); }

function parseRows(rows){
  const map  = new Map();
  const data = rows.length && String(rows[0][0]).trim()==='β³•' ? rows.slice(1) : rows;
  data.forEach(r => {
    if(!r||!r[0]) return;
    const num = String(r[0]).trim();
    if(!map.has(num)) map.set(num, {
      num,
      date:    normalizeDate(r[1]),
      point:   String(r[3]||'').trim(),
      seller:  String(r[4]||'').trim(),
      pay:     String(r[5]||'').trim(),
      selfPay: String(r[6]||'').trim(),
      items:   []
    });
    map.get(num).items.push({
      name:  String(r[7]||'').trim(),
      qty:   toNum(r[8]),
      price: toNum(r[9]),
      sum:   toNum(r[10])
    });
  });
  return Array.from(map.values());
}

function getPeriodRange(){
  // –ï―¹–Μ–Η period βÄî –Ψ–±―ä–Β–Κ―² ―¹ from/to (–¥–Β–Ϋ―¨ –Η–Μ–Η –Ϋ–Β–¥–Β–Μ―è –Η–Ζ –¥―Ä–Ψ–Ω–¥–Α―É–Ϋ–Α)
  if(period && typeof period === 'object') return period;
  const now   = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  if(period==='week'){
    const day = now.getDay()||7;
    const ws  = new Date(today); ws.setDate(ws.getDate()-day+1);
    const we  = new Date(ws);    we.setDate(we.getDate()+6); we.setHours(23,59,59,999);
    return { from:ws, to:we };
  }
  if(period==='month')
    return { from:new Date(now.getFullYear(),now.getMonth(),1),
             to:  new Date(now.getFullYear(),now.getMonth()+1,0,23,59,59,999) };
  if(period==='prev_month')
    return { from:new Date(now.getFullYear(),now.getMonth()-1,1),
             to:  new Date(now.getFullYear(),now.getMonth(),0,23,59,59,999) };
  return null;
}

function inRange(check){
  const r = getPeriodRange();
  if(!r) return true;
  const d = parseDate(check.date);
  if(!d) return false;
  return d >= r.from && d <= r.to;
}

// βîÄβîÄβîÄ –ê–™–†–ï–™–ê–Π–‰–· βîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄ
function zero(){ return {qty:0, revenue:0, profit:0}; }

function aggregatePoint(checks, payPoint){
  const retail   = zero();
  const yandex   = zero();
  const selfPaid = zero();
  const selfFree = {qty:0, revenue:0}; // –Ϋ–Β ―¹―΅–Η―²–Α–Β–Φ –Ω―Ä–Η–±―΄–Μ―¨
  const brak     = {qty:0, loss:0};
  const byPay    = {}; // ―Ä–Ψ–Ζ–Ϋ–Η―Ü–Α –Ω–Ψ ―²–Η–Ω―É –Ψ–Ω–Μ–Α―²―΄

  // –Ϋ–Α–Μ–Η―΅–Ϋ―΄–Β = –ù–Α–Μ–Η―΅–Ϋ―΄–Ι (―Ä–Ψ–Ζ–Ϋ–Η―Ü–Α) + –Γ–Β–±–Β –Ψ–Ω–Μ–Α―΅–Β–Ϋ–Ψ –Ϋ–Α–Μ–Η―΅–Ϋ―΄–Φ–Η
  let cash = 0;

  checks.filter(inRange).forEach(ck => {
    const group = getPayGroup(ck.pay);
    if(!group) return;
    const qty = ck.items.reduce((a,it)=>a+Number(it.qty||0), 0);
    const rev = ck.items.reduce((a,it)=>a+Number(it.sum||0), 0);

    if(group==='retail'){
      const profit = calcRetailProfit(qty, rev, payPoint);
      retail.qty += qty; retail.revenue += rev; retail.profit += profit;
      if(!byPay[ck.pay]) byPay[ck.pay] = zero();
      byPay[ck.pay].qty     += qty;
      byPay[ck.pay].revenue += rev;
      byPay[ck.pay].profit  += calcRetailProfit(qty, rev, payPoint);
      if(ck.pay==='–ù–Α–Μ–Η―΅–Ϋ―΄–Ι') cash += rev;
    } else if(group==='yandex'){
      const profit = calcYandexProfit(qty, rev, payPoint);
      yandex.qty += qty; yandex.revenue += rev; yandex.profit += profit;
    } else if(group==='self_paid'){
      const profit = calcSelfPaidProfit(qty, rev);
      selfPaid.qty += qty; selfPaid.revenue += rev; selfPaid.profit += profit;
      // –Ϋ–Α–Μ–Η―΅–Ϋ―΄–Β –Ψ―² ―¹–Β–±–Β –Ψ–Ω–Μ–Α―΅–Β–Ϋ–Ψ βÄî –Β―¹–Μ–Η selfPay=–ù–Α–Μ–Η―΅–Ϋ―΄–Β
      if(ck.selfPay==='–ù–Α–Μ–Η―΅–Ϋ―΄–Β') cash += rev;
    } else if(group==='self_free'){
      selfFree.qty += qty; selfFree.revenue += rev;
    } else if(group==='brak'){
      brak.qty += qty; brak.loss += Math.abs(calcBrakLoss(qty));
    }
  });

  return { retail, yandex, selfPaid, selfFree, brak, byPay, cash };
}

// βîÄβîÄβîÄ –½–ê–™–†–Θ–½–ö–ê βîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄ

let activeDDType = null; // 'day' | 'week'

function fmtDate(d){ return pad(d.getDate())+'.'+pad(d.getMonth()+1)+'.'+d.getFullYear(); }

function getWeekStart(d){
  const x=new Date(d); const day=x.getDay()||7;
  x.setHours(0,0,0,0); x.setDate(x.getDate()-day+1); return x;
}

function getPastDays(n){
  const result=[];
  const now=new Date();
  for(let i=0;i<n;i++){
    const d=new Date(now.getFullYear(),now.getMonth(),now.getDate()-i);
    const label = i===0?'–Γ–Β–≥–Ψ–¥–Ϋ―è':i===1?'–£―΅–Β―Ä–Α':fmtDate(d);
    result.push({date:d, label});
  }
  return result;
}

function getPastWeeks(n){
  const result=[];
  const now=new Date();
  const curWS=getWeekStart(now);
  for(let i=0;i<n;i++){
    const ws=new Date(curWS); ws.setDate(ws.getDate()-i*7);
    const we=new Date(ws); we.setDate(we.getDate()+6); we.setHours(23,59,59,999);
    const label = i===0?`${fmtDate(ws)} βÄî ${fmtDate(we)} (―²–Β–Κ―É―â–Α―è)`:`${fmtDate(ws)} βÄî ${fmtDate(we)}`;
    result.push({from:ws, to:we, label});
  }
  return result;
}

function buildDropdowns(){
  // –î–Ϋ–Η
  const days=getPastDays(30);
  document.getElementById('menu-day').innerHTML=days.map((d,i)=>

  ).join('');

  // –ù–Β–¥–Β–Μ–Η

  render();

// βîÄβîÄβîÄ –Θ–Δ–‰–¦–‰–Δ–Ϊ βîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄ
function money(n){ return Math.round(n).toLocaleString('ru-RU')+'\u00a0β²Ϋ'; }
function fmtK(n){
  n = Math.round(n);
  if(Math.abs(n)>=10000) return (n/1000).toFixed(1).replace('.',',')+'\u00a0–Κ\u00a0β²Ϋ';
  return money(n);
}
function pc(n){ return n>=0?'profit-pos':'profit-neg'; }
function sg(n){ return n>=0?'+':''; }
function esc(s){ return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;'); }

        <div class="sum-sub">–≤―¹–Β –Κ–Α–Ϋ–Α–Μ―΄ βà£ –±―Ä–Α–Κ ¬Ζ –Φ–Α―Ä–Ε–Α ${marginPct}%</div>

        <div class="sum-sub" style="color:#5a4a28">―Ä–Ψ–Ζ–Ϋ–Η―Ü–Α –Ϋ–Α–Μ + ―¹–Β–±–Β –Ϋ–Α–Μ</div>

            </div>
            ${extras.length?`<div class="point-extra" style="grid-template-columns:repeat(${extras.length},1fr)">
