function acClientInput(){
  const val=document.getElementById('o-client-inp').value.trim().toLowerCase();
  const list=document.getElementById('o-client-list');
  if(!val){list.style.display='none';return;}
  const matches=ALL_CLIENTS.filter(c=>c.toLowerCase().includes(val)).slice(0,8);
  if(!matches.length){list.style.display='none';return;}
  list.innerHTML=matches.map(c=>`<div onclick="acClientSelect('${esc(c)}')" style="padding:10px 14px;font-size:14px;font-weight:600;cursor:pointer;border-bottom:1px solid var(--border);color:var(--text)" onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background=''">${esc(c)}</div>`).join('');
  list.style.display='block';
}
function acClientSelect(name){
  selectedClient=name;
  document.getElementById('o-client-inp').value=name;
  document.getElementById('o-client-list').style.display='none';
  // Show address dropdown
  const points=CONTRAGENTS[name]||[];
  const addrSel=document.getElementById('o-addr-sel');
  addrSel.innerHTML='<option value="">— выберите адрес —</option>';
  points.forEach((p,i)=>addrSel.innerHTML+=`<option value="${i}">${esc(p.addr)}</option>`);
  if(points.length===1){addrSel.value='0';onAddrSelect();}
  document.getElementById('o-addr-field').style.display='block';
  document.getElementById('o-entity-field').style.display='none';
  document.getElementById('o-entity').value='';
}
function acClientBlur(){setTimeout(()=>{document.getElementById('o-client-list').style.display='none';},150);}

function onAddrSelect(){
  const idx=document.getElementById('o-addr-sel').value;
  if(idx===''){document.getElementById('o-entity-field').style.display='none';return;}
  const points=CONTRAGENTS[selectedClient]||[];
  const p=points[parseInt(idx)];
  if(p){
    document.getElementById('o-entity').value=p.entity||'';
    document.getElementById('o-entity-field').style.display='block';
  }
}

  selectedClient='';

  document.getElementById('o-entity-field').style.display='none';

function orderFor(name){
  switchTab('order');
  setTimeout(()=>{
    document.getElementById('o-client-inp').value=name;

}

function fmt(n){return Math.round(n).toLocaleString('ru-RU');}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(t,ok){const e=document.getElementById('toast');e.textContent=t;e.className='toast show'+(ok?' ok':'');clearTimeout(toast._t);toast._t=setTimeout(()=>e.classList.remove('show'),2500);}

function switchTab(t){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['clients','order','analytics'][i]===t));
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+t).classList.add('active');
  if(t==='analytics')renderAnalytics();
  if(t==='order')initOrderForm();
  if(t!=='clients')showList();
}

function showList(){document.getElementById('client-page').style.display='none';document.getElementById('clients-main').style.display='block';}

function renderFlavors(){
  document.getElementById('flavor-grid').innerHTML=FLAVORS.map(f=>{
    const q=fq[f]||0;
    const id='fq_'+f.replace(/[^а-яёa-z0-9]/gi,'_');
    return `<div class="fi${q>0?' has':''}" id="fi_${id}">
      <div class="fi-name">${esc(f)}</div>
      <div class="fi-row">
        <button class="fi-btn" onclick="chQ('${esc(f)}',-1)">−</button>
        <input class="fi-num${q>0?' has':''}" id="${id}" type="number" min="0" step="1" value="${q||''}" placeholder="·" oninput="chQDirect('${esc(f)}',this.value)" style="border:none;outline:none;background:transparent;width:100%;text-align:center;font-size:15px;font-weight:800;font-family:inherit">
        <button class="fi-btn" onclick="chQ('${esc(f)}',1)">+</button>
      </div></div>`;
  }).join('');
}

function chQ(f,d){
  fq[f]=Math.max(0,(fq[f]||0)+d);
  const id='fq_'+f.replace(/[^а-яёa-z0-9]/gi,'_');
  const el=document.getElementById(id);
  const fi=document.getElementById('fi_'+id);
  if(el){el.value=fq[f]||'';el.className='fi-num'+(fq[f]>0?' has':'');}
  if(fi){fi.className='fi'+(fq[f]>0?' has':'');}
  updateTotal();
}

function chQDirect(f,val){
  fq[f]=Math.max(0,parseInt(val)||0);
  const id='fq_'+f.replace(/[^а-яёa-z0-9]/gi,'_');
  const el=document.getElementById(id);
  const fi=document.getElementById('fi_'+id);
  if(el) el.className='fi-num'+(fq[f]>0?' has':'');
  if(fi) fi.className='fi'+(fq[f]>0?' has':'');
  updateTotal();
}

function updateTotal(){
  const t=Object.values(fq).reduce((a,b)=>a+b,0);
  document.getElementById('o-total-qty').textContent=t+' шт';
}

function submitOrder(){
  const client=document.getElementById('o-client-inp').value.trim();
  const addrIdx=document.getElementById('o-addr-sel').value;
  const date=document.getElementById('o-date').value;
  const entity=document.getElementById('o-entity').value.trim();
  const sum=parseFloat(document.getElementById('o-sum').value)||0;
  const comment=document.getElementById('o-comment').value.trim();
  const totalQty=Object.values(fq).reduce((a,b)=>a+b,0);
  if(!client){toast('Выберите клиента');return;}
  if(!date){toast('Укажите дату');return;}
  if(totalQty===0){toast('Добавьте хотя бы один вкус');return;}
  const points=CONTRAGENTS[client]||[];
  const addr=addrIdx!==''&&points[parseInt(addrIdx)]?points[parseInt(addrIdx)].addr:'';
  const flavors=Object.entries(fq).filter(([,q])=>q>0).map(([f,q])=>f+': '+q).join(', ');
  const o={client,addr,entity,date:date.split('-').reverse().join('.'),sum,comment,totalQty,flavors,created:new Date().toISOString()};
  orders.unshift(o);
  try{localStorage.setItem('omoti_b2b_orders',JSON.stringify(orders));}catch(e){}
  toast('Заказ сохранён ✓',true);
  fq={};renderFlavors();
  document.getElementById('o-sum').value='';
  document.getElementById('o-comment').value='';
  updateTotal();
}

function renderAnalytics(){
  const byR=[...CD].sort((a,b)=>b.total_revenue-a.total_revenue).slice(0,8);
  const mx=byR[0]?.total_revenue||1;
  const byO=[...CD].sort((a,b)=>b.orders-a.orders).slice(0,5);
  const byC=[...CD].filter(c=>c.orders>=3).sort((a,b)=>b.avg_check-a.avg_check).slice(0,5);
  const a=CD.filter(c=>c.status==='active').length,s=CD.filter(c=>c.status==='sleeping').length,l=CD.filter(c=>c.status==='lost').length,tot=CD.length;
  const tr=CD.reduce((a,c)=>a+c.total_revenue,0);
  document.getElementById('analytics-content').innerHTML=`
    <div class="anal-card"><div class="anal-title">Статусы</div>
      <div class="bar-row"><span class="bar-lbl" style="color:var(--green)">Активные</span><div class="bar-bg"><div class="bar-fill green" style="width:${a/tot*100}%"></div></div><span class="bar-val">${a} (${Math.round(a/tot*100)}%)</span></div>
      <div class="bar-row"><span class="bar-lbl" style="color:var(--amber)">Засыпают</span><div class="bar-bg"><div class="bar-fill amber" style="width:${s/tot*100}%"></div></div><span class="bar-val">${s} (${Math.round(s/tot*100)}%)</span></div>
      <div class="bar-row"><span class="bar-lbl" style="color:var(--red)">Потеряны</span><div class="bar-bg"><div class="bar-fill red" style="width:${l/tot*100}%"></div></div><span class="bar-val">${l} (${Math.round(l/tot*100)}%)</span></div>
    </div>
    <div class="anal-card"><div class="anal-title">Топ по выручке</div>
      ${byR.map(c=>`<div class="bar-row"><span class="bar-lbl">${esc(c.name)}</span><div class="bar-bg"><div class="bar-fill" style="width:${c.total_revenue/mx*100}%"></div></div><span class="bar-val">${fmt(c.total_revenue/1000)}к</span></div>`).join('')}
    </div>
    <div class="anal-card"><div class="anal-title">Топ по заказам</div>
      ${byO.map((c,i)=>`<div class="top-row"><span class="top-num">${i+1}</span><span class="top-name">${esc(c.name)}</span><span class="top-val">${c.orders} заказов</span></div>`).join('')}
    </div>
    <div class="anal-card"><div class="anal-title">Топ по среднему чеку (≥3 заказов)</div>
      ${byC.map((c,i)=>`<div class="top-row"><span class="top-num">${i+1}</span><span class="top-name">${esc(c.name)}</span><span class="top-val">${fmt(c.avg_check)} ₽</span></div>`).join('')}
    </div>
    <div class="anal-card"><div class="anal-title">Итого за всё время</div>
      <div style="font-size:28px;font-weight:800;color:var(--text);letter-spacing:-.5px">${fmt(tr)} ₽</div>
      <div style="font-size:12px;color:var(--muted);margin-top:4px">${tot} клиентов · ${CD.reduce((a,c)=>a+c.orders,0)} заказов</div>
    </div>`;
}

renderMetrics();renderAlertBlock();renderClients();initOrderForm();
</script>
</body>
</html>
